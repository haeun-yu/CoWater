<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoWater 알림</title>
    <style>
      body {
        min-height: 100vh;
      }
      main.page-main-grid {
        grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr);
        align-items: stretch;
        min-height: calc(100vh - 56px);
      }
      main.page-main-grid > .stack {
        align-content: start;
        max-height: none;
        min-height: 0;
      }
      .stack {
        max-height: none;
      }
      .card {
        height: 100%;
      }
      #alerts,
      #approvals,
      #insights,
      #events,
      #stats {
        min-height: 0;
      }
    </style>
    <link rel="stylesheet" href="assets/common.css" />
  </head>
  <body>
    <nav class="topbar">
      <div class="brand">
        <div class="brand-icon">🌊</div>
        <h1>CoWater<span>알림</span></h1>
      </div>
      <div class="nav">
        <a href="index.html">3D 지도</a>
        <a href="alerts.html" class="active">알림</a>
        <a href="ops.html">운영 관제</a>
        <a href="mission.html">미션</a>
        <a href="device.html">디바이스</a>
      </div>
    </nav>

    <main class="page-main-grid">
      <div class="stack">
        <section class="card">
          <h2>신호 개요</h2>
          <div class="stats" id="stats"></div>
        </section>

        <section class="card">
          <h2>알림</h2>
          <div class="toolbar">
            <button class="active" data-filter="all">전체</button>
            <button data-filter="registered">등록됨</button>
            <button data-filter="processing">처리중</button>
            <button data-filter="completed">완료</button>
            <button data-filter="failed">실패</button>
          </div>
          <div class="list" id="alerts"></div>
        </section>
      </div>

      <div class="stack">
        <section class="card">
          <h2>승인</h2>
          <div class="list" id="approvals"></div>
        </section>

        <section class="card">
          <h2>인사이트</h2>
          <div class="list" id="insights"></div>
        </section>

        <section class="card">
          <h2>이벤트</h2>
          <div class="list" id="events"></div>
        </section>
      </div>
    </main>

    <script src="assets/common.js"></script>
    <script>
      const { registryBase: REGISTRY } = window.CoWaterUI.config;
      const { escapeHtml } = window.CoWaterUI;
      let hasLoadedOnce = false;
      let state = {
        alerts: [],
        approvals: [],
        insights: [],
        events: [],
        filter: "all",
      };

      function setLoadingState() {
        const loading = '<div class="empty">데이터를 불러오는 중…</div>';
        document.getElementById("stats").innerHTML = loading;
        document.getElementById("alerts").innerHTML = loading;
        document.getElementById("approvals").innerHTML = loading;
        document.getElementById("insights").innerHTML = loading;
        document.getElementById("events").innerHTML = loading;
      }

      async function load() {
        const settled = await Promise.allSettled([
          fetch(`${REGISTRY}/alerts`).then((r) => r.json()),
          fetch(`${REGISTRY}/approvals`).then((r) => r.json()),
          fetch(`${REGISTRY}/insights`).then((r) => r.json()),
          fetch(`${REGISTRY}/events`).then((r) => r.json()),
        ]);
        const anySuccess = settled.some(
          (result) => result.status === "fulfilled",
        );
        if (!anySuccess) {
          if (!hasLoadedOnce) setLoadingState();
          return;
        }
        state = {
          ...state,
          alerts:
            settled[0].status === "fulfilled" ? settled[0].value : state.alerts,
          approvals:
            settled[1].status === "fulfilled"
              ? settled[1].value
              : state.approvals,
          insights:
            settled[2].status === "fulfilled"
              ? settled[2].value
              : state.insights,
          events:
            settled[3].status === "fulfilled" ? settled[3].value : state.events,
        };
        hasLoadedOnce = true;
        render();
      }

      function pill(text, cls = "") {
        return `<span class="pill ${cls}">${escapeHtml(text || "-")}</span>`;
      }

      function renderStats() {
        const alerts = state.alerts || [];
        const approvals = state.approvals || [];
        const rows = [
          ["Alerts", alerts.length],
          ["Pending", alerts.filter((a) => a.status === "registered").length],
          ["Approvals", approvals.length],
          ["Waiting", approvals.filter((a) => a.status === "pending").length],
        ];
        document.getElementById("stats").innerHTML = rows
          .map(
            ([k, v]) =>
              `<div class="stat"><div>${escapeHtml(k)}</div><b>${escapeHtml(v)}</b></div>`,
          )
          .join("");
      }

      function renderAlerts() {
        const alerts = (state.alerts || []).filter((alert) =>
          state.filter === "all" ? true : alert.status === state.filter,
        );
        document.getElementById("alerts").innerHTML =
          alerts
            .map(
              (alert) => `
          <div class="item">
            <strong>${escapeHtml(alert.alert_type)}</strong> ${pill(alert.severity, alert.severity === "CRITICAL" ? "critical" : alert.severity === "WARNING" ? "warning" : "")} ${pill(alert.status)}
            <div>${escapeHtml(alert.message)}</div>
            <div class="meta">
              <span>${escapeHtml(alert.alert_id)}</span>
              <span>${escapeHtml(alert.event_id || "-")}</span>
              <span>${escapeHtml(alert.created_at || "-")}</span>
            </div>
            <div class="actions">
              ${alert.status === "registered" ? `<button class="action" onclick="ackAlert('${alert.alert_id}')">Claim</button>` : ""}
            </div>
          </div>
        `,
            )
            .join("") || `<div class="empty">No alerts.</div>`;
      }

      function renderApprovals() {
        document.getElementById("approvals").innerHTML =
          (state.approvals || [])
            .map(
              (item) => `
          <div class="item">
            <strong>${escapeHtml(item.summary)}</strong> ${pill(item.status, item.status === "pending" ? "pending" : "")}
            <div class="meta">
              <span>${escapeHtml(item.approval_id)}</span>
              <span>${escapeHtml(item.target_type)}:${escapeHtml(item.target_id)}</span>
            </div>
            ${
              item.status === "pending"
                ? `
              <div class="actions">
                <button class="action" onclick="decideApproval('${item.approval_id}', true)">Approve</button>
                <button class="action danger" onclick="decideApproval('${item.approval_id}', false)">Reject</button>
              </div>`
                : ""
            }
          </div>
        `,
            )
            .join("") || `<div class="empty">No approvals.</div>`;
      }

      function renderInsights() {
        document.getElementById("insights").innerHTML =
          (state.insights || [])
            .map(
              (item) => `
          <div class="item">
            <strong>${escapeHtml(item.summary)}</strong> ${pill(item.severity)}
            <div>${escapeHtml(item.reason_summary || "")}</div>
            <div class="meta">
              <span>${escapeHtml(item.insight_id)}</span>
              <span>${escapeHtml(item.recommended_action || "-")}</span>
            </div>
          </div>
        `,
            )
            .join("") || `<div class="empty">No insights.</div>`;
      }

      function renderEvents() {
        document.getElementById("events").innerHTML =
          (state.events || [])
            .slice(-8)
            .reverse()
            .map(
              (item) => `
          <div class="item">
            <strong>${escapeHtml(item.event_type)}</strong> ${pill(item.severity)}
            <div>${escapeHtml(item.message)}</div>
            <div class="meta">
              <span>${escapeHtml(item.event_id)}</span>
              <span>${escapeHtml(item.created_at || "")}</span>
            </div>
          </div>
        `,
            )
            .join("") || `<div class="empty">No events.</div>`;
      }

      function render() {
        renderStats();
        renderAlerts();
        renderApprovals();
        renderInsights();
        renderEvents();
      }

      async function ackAlert(alertId) {
        await fetch(`${REGISTRY}/alerts/${encodeURIComponent(alertId)}/ack`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            approved: true,
            notes: "claimed from alerts page",
          }),
        });
        await load();
      }

      async function decideApproval(approvalId, approved) {
        await fetch(
          `${REGISTRY}/approvals/${encodeURIComponent(approvalId)}/decision`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ approved, decided_by: "user" }),
          },
        );
        await load();
      }

      document.querySelectorAll("[data-filter]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("[data-filter]")
            .forEach((item) => item.classList.remove("active"));
          btn.classList.add("active");
          state.filter = btn.dataset.filter;
          renderAlerts();
        });
      });

      window.ackAlert = ackAlert;
      window.decideApproval = decideApproval;
      setLoadingState();
      load();
    </script>
  </body>
</html>
