<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoWater Mission Detail</title>
    <style>
      :root {
        --bg: #f3f1eb;
        --card: #fffdfa;
        --ink: #1e2b2a;
        --muted: #687370;
        --line: #dadfd5;
        --accent: #006d5b;
        --danger: #aa3131;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans KR", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(0,109,91,0.1), transparent 26%),
          linear-gradient(180deg, #f7f5ef, #eef1e7);
        color: var(--ink);
      }
      header {
        padding: 24px 20px;
        border-bottom: 1px solid var(--line);
      }
      h1 { margin: 0; font-size: 28px; }
      .sub { color: var(--muted); margin-top: 6px; }
      main {
        padding: 20px;
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 16px;
      }
      .stack { display: grid; gap: 16px; }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 10px 24px rgba(30,43,42,0.05);
      }
      .card h2 { margin: 0 0 12px; font-size: 18px; }
      .pill {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        background: #e6f2ef;
        color: var(--accent);
        font-size: 11px;
      }
      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 12px;
      }
      .step, .entry, .timeline-item {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: rgba(255,255,255,0.75);
      }
      .task {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed var(--line);
      }
      .timeline-item {
        border-left: 4px solid var(--accent);
      }
      .event-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 6px;
        background: var(--accent);
        color: white;
        font-size: 11px;
        font-weight: 600;
        margin-right: 8px;
      }
      .actor-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        background: #f0f0f0;
        color: #666;
        font-size: 10px;
        margin-left: 4px;
      }
      .task-state {
        display: inline-block;
        padding: 3px 7px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 600;
        margin-left: 4px;
      }
      .task-state.pending { background: #e8e8e8; color: #666; }
      .task-state.assigned { background: #d4e6ff; color: #006d5b; }
      .task-state.running { background: #fff4e6; color: #c85e00; }
      .task-state.completed { background: #d4edda; color: #155724; }
      .task-state.failed { background: #f8d7da; color: #721c24; }
      .task-state.rejected { background: #f5c6cb; color: #721c24; }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #f5f6f2;
        border-radius: 12px;
        padding: 10px;
        overflow: auto;
      }
      a { color: var(--accent); text-decoration: none; }
      .empty { color: var(--muted); }
      @media (max-width: 900px) {
        main { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title">Mission</h1>
      <div class="sub" id="summary">Loading…</div>
    </header>
    <main>
      <div class="stack">
        <section class="card">
          <h2>Mission Status</h2>
          <div id="overview"></div>
        </section>
        <section class="card">
          <h2>Steps & Tasks</h2>
          <div id="steps"></div>
        </section>
        <section class="card">
          <h2>Device Execution Results</h2>
          <div id="results"></div>
        </section>
      </div>
      <div class="stack">
        <section class="card">
          <h2>Timeline</h2>
          <div id="timeline"></div>
        </section>
        <section class="card">
          <h2>Final Result</h2>
          <div id="final-result"></div>
        </section>
      </div>
    </main>
    <script>
      const REGISTRY = "http://127.0.0.1:8280";
      const missionId = new URLSearchParams(location.search).get("id");

      async function load() {
        if (!missionId) {
          document.getElementById("summary").textContent = "Mission ID is missing.";
          return;
        }
        const res = await fetch(`${REGISTRY}/missions/${encodeURIComponent(missionId)}`);
        if (!res.ok) {
          document.getElementById("summary").textContent = "Mission not found.";
          return;
        }
        const mission = await res.json();
        render(mission);
      }

      function pill(text) {
        return `<span class="pill">${text || "-"}</span>`;
      }

      function render(mission) {
        document.getElementById("title").textContent = mission.title || mission.mission_id;
        document.getElementById("summary").textContent = mission.goal || mission.summary || "";
        document.getElementById("overview").innerHTML = `
          <div class="meta">
            <span>${pill(mission.status)}</span>
            <span>${mission.mission_id}</span>
            <span>${mission.mission_type || "-"}</span>
            <span>Proposal: ${mission.proposal_id || "-"}</span>
            <span>Approval: ${mission.approval_id || "-"}</span>
          </div>
          <pre>${JSON.stringify({
            created_at: mission.created_at,
            approved_at: mission.approved_at,
            started_at: mission.started_at,
            completed_at: mission.completed_at,
            operation_plan_id: mission.operation_plan_id,
            insight_id: mission.insight_id,
            alert_id: mission.alert_id,
            event_id: mission.event_id
          }, null, 2)}</pre>`;

        document.getElementById("steps").innerHTML = (mission.steps || []).map(step => `
          <div class="step">
            <strong>${step.step_id}</strong> <span class="task-state ${step.status || "pending"}">${step.status || "pending"}</span>
            <div class="meta">
              <span>Type: ${step.step_type || "-"}</span>
              <span>Policy: ${step.evaluation_policy || "-"}</span>
            </div>
            ${(step.tasks || []).map(task => {
              const taskStatus = task.execution_status || task.dispatch_status || "pending";
              return `
                <div class="task">
                  <div><strong>${task.task_id}</strong> <span class="task-state ${taskStatus}">${taskStatus}</span></div>
                  <div class="meta">
                    <span>Action: ${task.action || "-"}</span>
                    <span>Target: ${task.target_device_name || task.target_device_id || "-"}</span>
                    <span>Route: ${task.route_agent_name || task.route_agent_id || "-"}</span>
                  </div>
                  ${task.failure_category ? `<div class="meta" style="color: #c85e00"><span>Failure: ${task.failure_category} - ${task.failure_message || ""}</span></div>` : ""}
                  <pre>${JSON.stringify({
                    acceptance_status: task.acceptance_status,
                    dispatch_status: task.dispatch_status,
                    attempt: task.attempt,
                    attempted_device_ids: task.attempted_device_ids,
                    params: task.params,
                    completed_at: task.completed_at,
                    failure_category: task.failure_category
                  }, null, 2)}</pre>
                </div>
              `;
            }).join("")}
          </div>
        `).join("") || `<div class="empty">No steps.</div>`;

        document.getElementById("results").innerHTML = (mission.device_execution_results || []).map(result => {
          return `
            <div class="entry">
              <strong>${result.task_id}</strong> ${pill(result.task_status || result.status)}
              <div class="meta">
                <span>Reporter: ${result.reporter || "-"}</span>
                <span>Device: ${result.device_id || "-"}</span>
                <span>Step: ${result.step_id || "-"}</span>
                <span>Reported: ${result.received_at || "-"}</span>
              </div>
              <pre>${JSON.stringify({
                task_status: result.task_status || result.status,
                acceptance_status: result.acceptance_status,
                started_at: result.started_at,
                finished_at: result.finished_at,
                success: result.success,
                failure_reason: result.failure_reason,
                location: result.location,
                data_summary: result.data_summary,
                raw_data_ref: result.raw_data_ref,
                device_state_changes: result.device_state_changes,
                device_agent_judgement: result.device_agent_judgement
              }, null, 2)}</pre>
            </div>`;
        }).join("") || `<div class="empty">No execution results yet.</div>`;

        document.getElementById("timeline").innerHTML = (mission.timeline || []).map(item => {
          // Support both old and new timeline formats
          const eventType = item.event_type || item.type || "event";
          const timestamp = item.timestamp || "-";
          const actor = item.actor || "system";
          const details = item.details || item.data || {};
          const taskId = item.related_task_id || item.task_id || "-";

          return `
            <div class="timeline-item">
              <div style="margin-bottom: 8px;">
                <span class="event-badge">${eventType}</span>
                <span class="actor-badge">${actor}</span>
                <span style="font-size: 11px; color: var(--muted);">${new Date(timestamp).toLocaleString('ko-KR')}</span>
              </div>
              ${item.message ? `<div style="font-size: 13px; margin-bottom: 8px;">${item.message}</div>` : ""}
              ${taskId !== "-" ? `<div style="font-size: 12px; color: var(--muted);">Task: ${taskId}</div>` : ""}
              <pre>${JSON.stringify({...details}, null, 2)}</pre>
            </div>
          `;
        }).join("") || `<div class="empty">No timeline entries yet.</div>`;

        document.getElementById("final-result").innerHTML = Object.keys(mission.final_result || {}).length
          ? `<pre>${JSON.stringify(mission.final_result, null, 2)}</pre>`
          : `<div class="empty">Mission final result not available yet.</div>`;
      }

      load();
      setInterval(load, 5000);
    </script>
  </body>
</html>
