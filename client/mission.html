<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoWater 미션 상세</title>
    <style>
      body {
        min-height: 100vh;
      }
      header {
        padding-bottom: 18px;
      }
      main.page-main-grid {
        grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr);
        align-items: stretch;
        min-height: calc(100vh - 56px - 108px);
      }
      main.page-main-grid > .stack {
        align-content: start;
        max-height: none;
        min-height: 0;
      }
      .stack {
        max-height: none;
      }
      .card {
        height: 100%;
      }
      #timeline,
      #final-result,
      #overview,
      #steps,
      #results {
        min-height: 0;
      }
    </style>
    <link rel="stylesheet" href="assets/common.css" />
  </head>
  <body>
    <nav class="topbar">
      <div class="brand">
        <div class="brand-icon">🌊</div>
        <h1>CoWater<span>Mission</span></h1>
      </div>
      <div class="nav">
        <a href="index.html">3D 지도</a>
        <a href="alerts.html">알림</a>
        <a href="ops.html">운영 관제</a>
        <a href="mission.html" class="active">미션</a>
        <a href="device.html">디바이스</a>
      </div>
    </nav>
    <header>
      <h1 id="title">미션</h1>
      <div class="sub" id="summary">Loading…</div>
    </header>
    <main class="page-main-grid">
      <div class="stack">
        <section class="card">
          <h2>미션 상태</h2>
          <div id="overview"></div>
        </section>
        <section class="card">
          <h2>단계 및 작업</h2>
          <div id="steps"></div>
        </section>
        <section class="card">
          <h2>디바이스 실행 결과</h2>
          <div id="results"></div>
        </section>
      </div>
      <div class="stack">
        <section class="card">
          <h2>타임라인</h2>
          <div id="timeline"></div>
        </section>
        <section class="card">
          <h2>최종 결과</h2>
          <div id="final-result"></div>
        </section>
      </div>
    </main>
    <script src="assets/common.js"></script>
    <script>
      const { registryBase: REGISTRY, mothWsBase: MOTH_BASE } =
        window.CoWaterUI.config;
      const missionId = new URLSearchParams(location.search).get("id");
      const { escapeHtml } = window.CoWaterUI;
      const missionSocketState = {};

      async function load() {
        if (!missionId) {
          document.getElementById("summary").textContent =
            "미션 ID가 없습니다.";
          return;
        }
        const res = await fetch(
          `${REGISTRY}/missions/${encodeURIComponent(missionId)}`,
        );
        if (!res.ok) {
          document.getElementById("summary").textContent =
            "미션을 찾을 수 없습니다.";
          return;
        }
        const mission = await res.json();
        render(mission);
      }

      function pill(text) {
        return `<span class="pill">${escapeHtml(text || "-")}</span>`;
      }

      function render(mission) {
        document.getElementById("title").textContent =
          mission.title || mission.mission_id;
        document.getElementById("summary").textContent =
          mission.goal || mission.summary || "";
        document.getElementById("overview").innerHTML = `
          <div class="meta">
            <span>${pill(mission.status)}</span>
            <span>${escapeHtml(mission.mission_id)}</span>
            <span>${escapeHtml(mission.mission_type || "-")}</span>
            <span>제안: ${escapeHtml(mission.proposal_id || "-")}</span>
            <span>승인: ${escapeHtml(mission.approval_id || "-")}</span>
          </div>
          <pre>${escapeHtml(
            JSON.stringify(
              {
                created_at: mission.created_at,
                approved_at: mission.approved_at,
                started_at: mission.started_at,
                completed_at: mission.completed_at,
                operation_plan_id: mission.operation_plan_id,
                insight_id: mission.insight_id,
                alert_id: mission.alert_id,
                event_id: mission.event_id,
              },
              null,
              2,
            ),
          )}</pre>`;

        document.getElementById("steps").innerHTML =
          (mission.steps || [])
            .map(
              (step) => `
          <div class="step">
            <strong>${escapeHtml(step.step_id)}</strong> <span class="task-state ${escapeHtml(step.status || "pending")}">${escapeHtml(step.status || "pending")}</span>
            <div class="meta">
              <span>유형: ${escapeHtml(step.step_type || "-")}</span>
              <span>정책: ${escapeHtml(step.evaluation_policy || "-")}</span>
            </div>
            ${(step.tasks || [])
              .map((task) => {
                const taskStatus =
                  task.execution_status || task.dispatch_status || "pending";
                return `
                <div class="task">
                  <div><strong>${escapeHtml(task.task_id)}</strong> <span class="task-state ${escapeHtml(taskStatus)}">${escapeHtml(taskStatus)}</span></div>
                  <div class="meta">
                    <span>액션: ${escapeHtml(task.action || "-")}</span>
                    <span>대상: ${escapeHtml(task.target_device_name || task.target_device_id || "-")}</span>
                    <span>경유: ${escapeHtml(task.route_agent_name || task.route_agent_id || "-")}</span>
                  </div>
                  ${task.failure_category ? `<div class="meta" style="color: #c85e00"><span>실패: ${escapeHtml(task.failure_category)} - ${escapeHtml(task.failure_message || "")}</span></div>` : ""}
                  <pre>${escapeHtml(
                    JSON.stringify(
                      {
                        acceptance_status: task.acceptance_status,
                        dispatch_status: task.dispatch_status,
                        attempt: task.attempt,
                        attempted_device_ids: task.attempted_device_ids,
                        params: task.params,
                        completed_at: task.completed_at,
                        failure_category: task.failure_category,
                      },
                      null,
                      2,
                    ),
                  )}</pre>
                </div>
              `;
              })
              .join("")}
          </div>
        `,
            )
            .join("") || `<div class="empty">단계 정보가 없습니다.</div>`;

        document.getElementById("results").innerHTML =
          (mission.device_execution_results || [])
            .map((result) => {
              return `
            <div class="entry">
              <strong>${escapeHtml(result.task_id)}</strong> ${pill(result.task_status || result.status)}
              <div class="meta">
                <span>보고자: ${escapeHtml(result.reporter || "-")}</span>
                <span>디바이스: ${escapeHtml(result.device_id || "-")}</span>
                <span>단계: ${escapeHtml(result.step_id || "-")}</span>
                <span>보고 시각: ${escapeHtml(result.received_at || "-")}</span>
              </div>
              <pre>${escapeHtml(
                JSON.stringify(
                  {
                    task_status: result.task_status || result.status,
                    acceptance_status: result.acceptance_status,
                    started_at: result.started_at,
                    finished_at: result.finished_at,
                    success: result.success,
                    failure_reason: result.failure_reason,
                    location: result.location,
                    data_summary: result.data_summary,
                    raw_data_ref: result.raw_data_ref,
                    device_state_changes: result.device_state_changes,
                    device_agent_judgement: result.device_agent_judgement,
                  },
                  null,
                  2,
                ),
              )}</pre>
            </div>`;
            })
            .join("") || `<div class="empty">아직 실행 결과가 없습니다.</div>`;

        document.getElementById("timeline").innerHTML =
          (mission.timeline || [])
            .map((item) => {
              // Support both old and new timeline formats
              const eventType = item.event_type || item.type || "event";
              const timestamp = item.timestamp || "-";
              const actor = item.actor || "system";
              const details = item.details || item.data || {};
              const taskId = item.related_task_id || item.task_id || "-";

              return `
            <div class="timeline-item">
              <div style="margin-bottom: 8px;">
                <span class="event-badge">${escapeHtml(eventType)}</span>
                <span class="actor-badge">${escapeHtml(actor)}</span>
                <span style="font-size: 11px; color: var(--cowater-muted);">${escapeHtml(new Date(timestamp).toLocaleString("ko-KR"))}</span>
              </div>
              ${item.message ? `<div style="font-size: 13px; margin-bottom: 8px;">${escapeHtml(item.message)}</div>` : ""}
              ${taskId !== "-" ? `<div style="font-size: 12px; color: var(--cowater-muted);">작업: ${escapeHtml(taskId)}</div>` : ""}
              <pre>${escapeHtml(JSON.stringify({ ...details }, null, 2))}</pre>
            </div>
          `;
            })
            .join("") || `<div class="empty">타임라인 항목이 없습니다.</div>`;

        document.getElementById("final-result").innerHTML = Object.keys(
          mission.final_result || {},
        ).length
          ? `<pre>${escapeHtml(JSON.stringify(mission.final_result, null, 2))}</pre>`
          : `<div class="empty">미션 최종 결과가 아직 없습니다.</div>`;
      }

      load();

      function scheduleReconnect() {
        const entry =
          missionSocketState.mission || (missionSocketState.mission = {});
        if (entry.timer) return;
        entry.timer = setTimeout(() => {
          entry.timer = null;
          subscribeToMission();
        }, 5000);
      }

      const wsUrl = `${MOTH_BASE}/pang/ws/meb?channel=instant&name=mission.${missionId}&source=mission-client&track=mission-client`;
      let missionWs = null;

      function subscribeToMission() {
        try {
          missionWs = new WebSocket(wsUrl);
          const entry =
            missionSocketState.mission || (missionSocketState.mission = {});
          entry.ws = missionWs;
          if (entry.timer) {
            clearTimeout(entry.timer);
            entry.timer = null;
          }

          missionWs.onopen = () => {
            missionWs.send(
              JSON.stringify({
                type: "subscribe",
                channel: `mission.${missionId}`,
                channel_type: "meb",
              }),
            );
            console.log(`[Moth] Subscribed to mission.${missionId}`);
          };

          missionWs.onmessage = async (e) => {
            try {
              const rawText =
                typeof e.data === "string" ? e.data : await e.data.text();
              if (!rawText || rawText.trim() === "ping") return;
              const raw = JSON.parse(rawText);
              const payload = raw.payload || raw.data || raw;
              if (!payload) return;

              // Moth에서 받은 미션 데이터 직접 렌더링
              const mission = payload.mission || payload;
              if (mission && mission.mission_id === missionId) {
                render(mission);
              }
            } catch (err) {
              console.debug("[Moth] mission parse error:", err);
            }
          };

          missionWs.onerror = () => {
            console.warn("[Moth] mission connection error");
            if (missionSocketState.mission?.ws === missionWs)
              scheduleReconnect();
          };

          missionWs.onclose = () => {
            if (missionSocketState.mission?.ws === missionWs)
              scheduleReconnect();
          };
        } catch (err) {
          console.warn("[Moth] Failed to subscribe to mission:", err);
          scheduleReconnect();
        }
      }

      if (missionId) {
        subscribeToMission();
      }

      window.addEventListener("beforeunload", () => {
        const entry = missionSocketState.mission;
        if (entry?.timer) clearTimeout(entry.timer);
        if (missionWs) {
          try {
            missionWs.close();
          } catch (e) {}
        }
      });
    </script>
  </body>
</html>
