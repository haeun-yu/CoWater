<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoWater 디바이스 상세보기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            overflow-x: hidden;
        }

        header {
            background: rgba(10, 17, 32, 0.95);
            border-bottom: 1px solid rgba(96, 165, 250, 0.25);
            backdrop-filter: blur(12px);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: #60a5fa;
            color: #60a5fa;
        }

        .header-title h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f1f5f9;
        }

        .header-title p {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 2px;
        }

        .header-status {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .status-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .status-label {
            font-size: 0.65rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.online { background: #4ade80; }
        .status-dot.offline { background: #f87171; }
        .status-dot.connecting { background: #fbbf24; }

        main {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
        }

        .panel h2 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #475569;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px 12px;
        }

        .info-label {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .info-value {
            color: #e2e8f0;
            font-size: 0.85rem;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .info-value.status-ok { color: #4ade80; }
        .info-value.status-warn { color: #fbbf24; }
        .info-value.status-error { color: #f87171; }

        .sensor-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .sensor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .sensor-name {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 0.9rem;
        }

        .sensor-type {
            font-size: 0.7rem;
            color: #64748b;
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .sensor-value {
            color: #4ade80;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sensor-timestamp {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 6px;
        }

        .chart-container {
            height: 300px;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            margin-top: 12px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #60a5fa 0%, #3b82f6 100%);
            border-radius: 4px 4px 0 0;
            position: relative;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .chart-bar:hover {
            opacity: 1;
        }

        .chart-bar-label {
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.65rem;
            color: #64748b;
        }

        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 40px 20px;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #475569;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .refresh-btn {
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid #334155;
            color: #60a5fa;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: rgba(96, 165, 250, 0.2);
            border-color: #60a5fa;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 10px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #60a5fa;
            border-bottom-color: #60a5fa;
            font-weight: 600;
        }

        .tab-btn:hover {
            color: #e2e8f0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .alert-banner {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            color: #fecaca;
            font-size: 0.85rem;
        }

        .success-banner {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            color: #bbf7d0;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="back-btn" onclick="window.history.back()">← 돌아가기</button>
        <div class="header-title">
            <h1 id="device-name">디바이스 로딩 중...</h1>
            <p id="device-type">—</p>
        </div>
    </div>
    <div class="header-status">
        <div class="status-item">
            <div class="status-label">상태</div>
            <div class="status-value">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">연결 중</span>
            </div>
        </div>
        <button class="refresh-btn" onclick="refreshSensorData()">새로고침</button>
    </div>
</header>

<main>
    <div id="connection-alert" class="connection-status" style="display:none;">
        <div class="loading-spinner"></div>
        <span id="connection-text">센서 스트림 연결 중...</span>
    </div>

    <div class="grid">
        <!-- 기본 정보 패널 -->
        <div class="panel">
            <h2>🔍 기본 정보</h2>
            <div class="info-grid">
                <div class="info-label">디바이스 ID</div>
                <div class="info-value" id="info-device-id">—</div>

                <div class="info-label">Registry ID</div>
                <div class="info-value" id="info-registry-id">—</div>

                <div class="info-label">위도</div>
                <div class="info-value" id="info-latitude">—</div>

                <div class="info-label">경도</div>
                <div class="info-value" id="info-longitude">—</div>

                <div class="info-label">고도/수심</div>
                <div class="info-value" id="info-altitude">—</div>

                <div class="info-label">헤딩</div>
                <div class="info-value" id="info-heading">—</div>

                <div class="info-label">속도</div>
                <div class="info-value" id="info-speed">—</div>

                <div class="info-label">배터리</div>
                <div class="info-value" id="info-battery">—</div>

                <div class="info-label">마지막 수신</div>
                <div class="info-value" id="info-timestamp">—</div>
            </div>
        </div>

        <!-- 실시간 센서 데이터 패널 -->
        <div class="panel">
            <h2>📊 실시간 센서 데이터</h2>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('overview', this)">개요</button>
                <button class="tab-btn" onclick="switchTab('gps', this)">GPS</button>
                <button class="tab-btn" onclick="switchTab('imu', this)">IMU</button>
                <button class="tab-btn" onclick="switchTab('sensors', this)">센서</button>
            </div>

            <div id="tab-overview" class="tab-content active">
                <div id="sensors-container">
                    <div class="empty-state">
                        <p>센서 데이터를 기다리는 중...</p>
                    </div>
                </div>
            </div>

            <div id="tab-gps" class="tab-content">
                <div id="gps-data">
                    <div class="empty-state">
                        <p>GPS 데이터를 기다리는 중...</p>
                    </div>
                </div>
            </div>

            <div id="tab-imu" class="tab-content">
                <div id="imu-data">
                    <div class="empty-state">
                        <p>IMU 데이터를 기다리는 중...</p>
                    </div>
                </div>
            </div>

            <div id="tab-sensors" class="tab-content">
                <div id="detailed-sensors">
                    <div class="empty-state">
                        <p>센서 목록을 기다리는 중...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 히스토리 차트 패널 -->
    <div class="panel" id="chart-panel" style="display:none;">
        <h2>📈 센서 히스토리</h2>
        <div class="chart-container" id="chart-container">
            <div class="empty-state">히스토리 데이터 없음</div>
        </div>
    </div>
</main>

<script>
const REGISTRY_BASE = localStorage.getItem('cowater.dashboard.registryUrl') || 'http://127.0.0.1:8280';
const MOTH_WS_BASE = localStorage.getItem('cowater.dashboard.mothWsBase') || 'wss://cobot.center:8287';

let deviceId = null;
let deviceName = null;
let deviceType = null;
let registryId = null;
let registryDevice = null;
let wsConnections = {};
let reconnectTimers = {};
let sensorData = {};
let batteryHistory = [];

function resolveWsUrl(endpoint) {
    if (!endpoint) return '';
    const raw = String(endpoint).trim();
    if (!raw) return '';
    if (/^wss?:\/\//i.test(raw)) return raw;
    return `${MOTH_WS_BASE}${raw}`;
}

async function fetchDeviceSnapshot() {
    const resp = await fetch(`${REGISTRY_BASE}/devices/${encodeURIComponent(deviceId)}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
}

async function loadDeviceInfo() {
    deviceId = sessionStorage.getItem('cowater.device.id');
    deviceName = sessionStorage.getItem('cowater.device.name');
    deviceType = sessionStorage.getItem('cowater.device.type');
    registryId = sessionStorage.getItem('cowater.device.registryId');

    if (!deviceId || !deviceName) {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#f87171;font-size:1.2rem;">디바이스 정보를 찾을 수 없습니다.<br><a href="index.html" style="color:#60a5fa;text-decoration:underline;margin-top:20px;display:block;">대시보드로 돌아가기</a></div>';
        return;
    }

    document.getElementById('device-name').textContent = deviceName;
    document.getElementById('device-type').textContent = (deviceType || '—').replace(/_/g, ' ');
    document.getElementById('info-device-id').textContent = deviceId;
    document.getElementById('info-registry-id').textContent = registryId || '—';

    try {
        registryDevice = await fetchDeviceSnapshot();
        if (registryDevice?.name) {
            document.getElementById('device-name').textContent = registryDevice.name;
        }
        if (registryDevice?.device_type) {
            document.getElementById('device-type').textContent = String(registryDevice.device_type || '—').replace(/_/g, ' ');
        }
        document.getElementById('info-registry-id').textContent = registryDevice?.id || registryId || '—';

        if (Number.isFinite(Number(registryDevice?.latitude))) {
            document.getElementById('info-latitude').textContent = Number(registryDevice.latitude).toFixed(5);
        }
        if (Number.isFinite(Number(registryDevice?.longitude))) {
            document.getElementById('info-longitude').textContent = Number(registryDevice.longitude).toFixed(5);
        }
        if (Number.isFinite(Number(registryDevice?.last_battery_percent))) {
            document.getElementById('info-battery').textContent = Number(registryDevice.last_battery_percent).toFixed(0) + '%';
        }
    } catch (err) {
        console.warn('[Registry] 디바이스 스냅샷 조회 실패:', err);
    }

    connectToSensorStream();
}

function connectToSensorStream() {
    const tracks = Array.isArray(registryDevice?.tracks) ? registryDevice.tracks : [];
    if (tracks.length === 0) {
        showConnectionStatus(false, '트랙 정보 없음 — API 조회 실패 또는 미등록');
        return;
    }

    tracks.forEach((track) => {
        const trackType = String(track?.type || '').toUpperCase();
        const trackName = String(track?.name || '').trim();
        const socketKey = `${trackType}:${trackName}`;
        const wsUrl = resolveWsUrl(track?.endpoint);
        if (!wsUrl) return;

        console.log(`[Moth] ${trackType}/${trackName || '-'} 스트림 연결 시작:`, wsUrl);

        if (wsConnections[socketKey]) {
            wsConnections[socketKey].onclose = null;
            wsConnections[socketKey].close();
        }

        const ws = new WebSocket(wsUrl);
        wsConnections[socketKey] = ws;

        ws.onopen = () => {
            console.log(`[Moth] ${trackType}/${trackName || '-'} 스트림 연결 성공`);
            showConnectionStatus(true, `${trackType} 스트림 연결됨`);
        };

        ws.onmessage = async (ev) => {
            try {
                const rawText = typeof ev.data === 'string' ? ev.data : await ev.data.text();
                if (!rawText || rawText.trim() === 'ping') return;
                const payload = JSON.parse(rawText);
                handleTelemetryPayload(payload);
            } catch (e) {
                console.warn(`[Moth] ${trackType} 메시지 파싱 실패:`, e);
            }
        };

        ws.onerror = () => {
            console.error(`[Moth] ${trackType} 스트림 에러`);
        };

        ws.onclose = () => {
            console.warn(`[Moth] ${trackType} 스트림 연결 종료, 5초 후 재연결...`);
            showConnectionStatus(false, `${trackType} 스트림 연결 종료`);
            reconnectTimers[socketKey] = setTimeout(() => connectToSensorStream(), 5000);
        };
    });
}

function handleTelemetryPayload(payload) {
    // pub 엔드포인트에서 오는 통합 텔레메트리 페이로드:
    // { device_id, agent_id, timestamp, latitude, longitude, battery_percent, motion, depth_m, position }
    if (!payload || typeof payload !== 'object') return;

    const timestamp = new Date().toLocaleTimeString();
    document.getElementById('info-timestamp').textContent = timestamp;

    // 위치
    if (payload.latitude !== undefined) {
        document.getElementById('info-latitude').textContent = payload.latitude.toFixed(5);
        sensorData.gps = Object.assign(sensorData.gps || {}, {
            latitude: payload.latitude,
            longitude: payload.longitude,
            altitude: payload.position?.altitude,
            timestamp
        });
    }
    if (payload.longitude !== undefined) {
        document.getElementById('info-longitude').textContent = payload.longitude.toFixed(5);
    }

    // 배터리
    if (payload.battery_percent !== undefined) {
        document.getElementById('info-battery').textContent = payload.battery_percent.toFixed(0) + '%';
        sensorData.battery = { percent: payload.battery_percent, timestamp };
        // 히스토리에 기록
        batteryHistory.push({ value: payload.battery_percent, time: new Date() });
        if (batteryHistory.length > 30) batteryHistory.shift();
        renderChart();
    }

    // 모션 (track payload는 heading/speed가 top-level로 올 수 있음)
    if (payload.motion !== undefined) {
        const motion = payload.motion;
        if (motion.heading !== undefined) document.getElementById('info-heading').textContent = motion.heading.toFixed(1) + '°';
        if (motion.speed !== undefined) document.getElementById('info-speed').textContent = motion.speed.toFixed(2) + ' m/s';
        sensorData.motion = { ...motion, timestamp };
    } else if (payload.heading !== undefined || payload.speed !== undefined) {
        const motion = {
            heading: payload.heading,
            speed: payload.speed,
        };
        if (motion.heading !== undefined) document.getElementById('info-heading').textContent = Number(motion.heading).toFixed(1) + '°';
        if (motion.speed !== undefined) document.getElementById('info-speed').textContent = Number(motion.speed).toFixed(2) + ' m/s';
        sensorData.motion = { ...(sensorData.motion || {}), ...motion, timestamp };
    }

    // 수심
    if (payload.depth_m !== undefined) {
        document.getElementById('info-altitude').textContent = payload.depth_m.toFixed(1) + ' m (수심)';
        sensorData.pressure = { depth_m: payload.depth_m, timestamp };
    } else if (payload.depth !== undefined) {
        document.getElementById('info-altitude').textContent = Number(payload.depth).toFixed(1) + ' m (수심)';
        sensorData.pressure = { depth_m: Number(payload.depth), timestamp };
    } else if (payload.position?.altitude !== undefined) {
        document.getElementById('info-altitude').textContent = payload.position.altitude.toFixed(1) + ' m';
    }

    renderSensorData();
    showConnectionStatus(true, '센서 데이터 수신 중');
}

function renderSensorData() {
    const container = document.getElementById('sensors-container');
    let html = '';

    // GPS 센서
    if (sensorData.gps) {
        const gps = sensorData.gps;
        html += `
            <div class="sensor-card">
                <div class="sensor-header">
                    <span class="sensor-name">📍 GPS</span>
                    <span class="sensor-type">gps</span>
                </div>
                <div class="sensor-value">
                    ${gps.latitude?.toFixed(5) || '—'}, ${gps.longitude?.toFixed(5) || '—'}
                </div>
                <div class="sensor-timestamp">고도: ${gps.altitude?.toFixed(1) || '—'} m</div>
                <div class="sensor-timestamp">수신: ${gps.timestamp || '—'}</div>
            </div>
        `;
    }

    // IMU 센서
    if (sensorData.imu) {
        const imu = sensorData.imu;
        html += `
            <div class="sensor-card">
                <div class="sensor-header">
                    <span class="sensor-name">🧭 IMU</span>
                    <span class="sensor-type">imu</span>
                </div>
                <div style="font-size:0.8rem;color:#cbd5e1;">
                    Roll: ${imu.roll?.toFixed(1) || '—'}° |
                    Pitch: ${imu.pitch?.toFixed(1) || '—'}° |
                    Yaw: ${imu.yaw?.toFixed(1) || '—'}°
                </div>
                <div class="sensor-timestamp">수신: ${imu.timestamp || '—'}</div>
            </div>
        `;
    }

    // 기압/수심 센서
    if (sensorData.pressure) {
        const pressure = sensorData.pressure;
        html += `
            <div class="sensor-card">
                <div class="sensor-header">
                    <span class="sensor-name">📏 깊이</span>
                    <span class="sensor-type">pressure</span>
                </div>
                <div class="sensor-value">
                    ${pressure.depth_m?.toFixed(1) || '—'} m
                </div>
                <div class="sensor-timestamp">압력: ${pressure.pressure_pa?.toFixed(0) || '—'} Pa</div>
                <div class="sensor-timestamp">수신: ${pressure.timestamp || '—'}</div>
            </div>
        `;
    }

    // 온도 센서
    if (sensorData.temperature) {
        const temp = sensorData.temperature;
        html += `
            <div class="sensor-card">
                <div class="sensor-header">
                    <span class="sensor-name">🌡️ 온도</span>
                    <span class="sensor-type">temperature</span>
                </div>
                <div class="sensor-value">
                    ${temp.temperature_c?.toFixed(1) || '—'} °C
                </div>
                <div class="sensor-timestamp">수신: ${temp.timestamp || '—'}</div>
            </div>
        `;
    }

    // 배터리 센서
    if (sensorData.battery) {
        const battery = sensorData.battery;
        const percent = battery.percent !== undefined ? battery.percent : battery.level;
        html += `
            <div class="sensor-card">
                <div class="sensor-header">
                    <span class="sensor-name">🔋 배터리</span>
                    <span class="sensor-type">battery</span>
                </div>
                <div class="sensor-value">
                    ${percent?.toFixed(0) || '—'}%
                </div>
                <div class="sensor-timestamp">수신: ${battery.timestamp || '—'}</div>
            </div>
        `;
    }

    if (!html) {
        html = '<div class="empty-state"><p>센서 데이터를 기다리는 중...</p></div>';
    }

    container.innerHTML = html;

    // GPS 탭 갱신
    if (sensorData.gps) {
        document.getElementById('gps-data').innerHTML = `
            <div class="info-grid">
                <div class="info-label">위도</div>
                <div class="info-value">${sensorData.gps.latitude?.toFixed(6) || '—'}</div>
                <div class="info-label">경도</div>
                <div class="info-value">${sensorData.gps.longitude?.toFixed(6) || '—'}</div>
                <div class="info-label">고도</div>
                <div class="info-value">${sensorData.gps.altitude?.toFixed(1) || '—'} m</div>
                <div class="info-label">정확도</div>
                <div class="info-value">${sensorData.gps.accuracy?.toFixed(1) || '—'} m</div>
                <div class="info-label">수신</div>
                <div class="info-value">${sensorData.gps.timestamp || '—'}</div>
            </div>
        `;
    }

    // IMU 탭 갱신
    if (sensorData.imu) {
        document.getElementById('imu-data').innerHTML = `
            <div class="info-grid">
                <div class="info-label">Roll</div>
                <div class="info-value">${sensorData.imu.roll?.toFixed(2) || '—'} °</div>
                <div class="info-label">Pitch</div>
                <div class="info-value">${sensorData.imu.pitch?.toFixed(2) || '—'} °</div>
                <div class="info-label">Yaw</div>
                <div class="info-value">${sensorData.imu.yaw?.toFixed(2) || '—'} °</div>
                <div class="info-label">Acc X</div>
                <div class="info-value">${sensorData.imu.accel_x?.toFixed(3) || '—'} m/s²</div>
                <div class="info-label">Acc Y</div>
                <div class="info-value">${sensorData.imu.accel_y?.toFixed(3) || '—'} m/s²</div>
                <div class="info-label">Acc Z</div>
                <div class="info-value">${sensorData.imu.accel_z?.toFixed(3) || '—'} m/s²</div>
                <div class="info-label">수신</div>
                <div class="info-value">${sensorData.imu.timestamp || '—'}</div>
            </div>
        `;
    }

    // 상세 센서 탭 갱신
    let detailedSensorsHtml = '';
    Object.entries(sensorData).forEach(([type, data]) => {
        detailedSensorsHtml += `
            <div class="sensor-card">
                <div class="sensor-header">
                    <span class="sensor-name">${type.toUpperCase()}</span>
                    <span class="sensor-type">${type}</span>
                </div>
                <pre style="background:#0f172a;padding:8px;border-radius:4px;font-size:0.7rem;overflow-x:auto;color:#4ade80;">${JSON.stringify(data, null, 2)}</pre>
            </div>
        `;
    });
    if (detailedSensorsHtml) {
        document.getElementById('detailed-sensors').innerHTML = detailedSensorsHtml;
    }
}

function switchTab(tabName, clickedBtn) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

    const tabEl = document.getElementById(`tab-${tabName}`);
    if (tabEl) tabEl.classList.add('active');
    if (clickedBtn) clickedBtn.classList.add('active');
}

function showConnectionStatus(connected, text) {
    const alertEl = document.getElementById('connection-alert');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const connectionText = document.getElementById('connection-text');

    if (connected) {
        alertEl.style.display = 'none';
        statusDot.className = 'status-dot online';
        statusText.textContent = '온라인';
        statusText.className = 'status-value status-ok';
    } else {
        alertEl.style.display = 'flex';
        statusDot.className = 'status-dot offline';
        statusText.textContent = '오프라인';
        statusText.className = 'status-value status-error';
        connectionText.textContent = text;
    }
}

function refreshSensorData() {
    console.log('[Refresh] 센서 스트림 재연결');
    sensorData = {};
    renderSensorData();
    Object.keys(reconnectTimers).forEach((track) => {
        clearTimeout(reconnectTimers[track]);
        delete reconnectTimers[track];
    });
    Object.keys(wsConnections).forEach((track) => {
        const ws = wsConnections[track];
        if (!ws) return;
        ws.onclose = null;
        ws.close();
    });
    wsConnections = {};
    connectToSensorStream();
}

function renderChart() {
    if (batteryHistory.length < 2) return;
    const panel = document.getElementById('chart-panel');
    panel.style.display = 'block';
    panel.querySelector('h2').textContent = '📈 배터리 히스토리';
    const container = document.getElementById('chart-container');
    const max = 100;
    container.innerHTML = batteryHistory.map(d => {
        const height = Math.max(2, (d.value / max * 100)).toFixed(1);
        const color = d.value > 50 ? '#4ade80' : d.value > 20 ? '#fbbf24' : '#f87171';
        const time = d.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `<div class="chart-bar" style="height:${height}%;background:${color};" title="${d.value.toFixed(1)}% @ ${time}"><span class="chart-bar-label">${d.value.toFixed(0)}</span></div>`;
    }).join('');
}

// 페이지 로드
window.onload = loadDeviceInfo;

// 언로드 시 WebSocket 종료
window.addEventListener('beforeunload', () => {
    Object.keys(reconnectTimers).forEach((track) => {
        clearTimeout(reconnectTimers[track]);
        delete reconnectTimers[track];
    });
    Object.values(wsConnections).forEach((ws) => {
        if (ws) ws.close();
    });
});
</script>
