<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 해양 무인 작전 체계 시각화 PoC</title>
    <style>
      /* === 전역 스타일 === */
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        color: #e2e8f0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        user-select: none;
      }
      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }

      /* === UI 패널 공통 === */
      .panel {
        position: absolute;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 15px;
        backdrop-filter: blur(8px);
        z-index: 10;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
      }
      #left-panel {
        top: 20px;
        left: 20px;
        width: 260px;
      }
      #right-panel {
        top: 20px;
        right: 20px;
        width: 340px;
      }

      /* === 패널 토글(접기/펼치기) 애니메이션 요소 === */
      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        padding-bottom: 10px;
        border-bottom: 1px solid #475569;
        margin-bottom: 10px;
        user-select: none;
      }
      .panel.collapsed .panel-header {
        border-bottom: none;
        padding-bottom: 0;
        margin-bottom: 0;
      }
      .panel-header h3 {
        margin: 0 !important;
        border: none !important;
        padding: 0 !important;
        font-size: 1.1rem;
        color: #fff;
      }
      .toggle-icon {
        color: #94a3b8;
        font-size: 0.8rem;
        transition: transform 0.3s ease;
      }
      .panel.collapsed .toggle-icon {
        transform: rotate(-90deg);
      }

      .panel-content {
        max-height: 80vh;
        overflow-y: auto;
        transition:
          max-height 0.3s ease,
          opacity 0.3s ease,
          margin 0.3s;
        opacity: 1;
      }
      .panel.collapsed .panel-content {
        max-height: 0;
        opacity: 0;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      h3 {
        margin: 0 0 15px 0;
        font-size: 1.2rem;
        color: #fff;
        border-bottom: 1px solid #475569;
        padding-bottom: 8px;
      }
      h4 {
        margin: 15px 0 5px 0;
        font-size: 0.9rem;
        color: #cbd5e1;
      }
      hr {
        border: none;
        border-top: 1px solid #334155;
        margin: 15px 0;
      }

      /* === 컨트롤 요소 === */
      select,
      input[type="range"] {
        width: 100%;
        padding: 6px;
        background: #1e293b;
        color: white;
        border: 1px solid #475569;
        border-radius: 4px;
        outline: none;
        margin-bottom: 5px;
      }
      .control-value {
        font-size: 0.8rem;
        color: #94a3b8;
        text-align: right;
        display: block;
      }

      /* === 우측 탭 메뉴 === */
      .tabs {
        display: flex;
        margin-bottom: 10px;
        border-bottom: 1px solid #334155;
      }
      .tab-btn {
        flex: 1;
        background: transparent;
        color: #94a3b8;
        border: none;
        padding: 8px 5px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s;
        border-bottom: 2px solid transparent;
      }
      .tab-btn:hover {
        color: #fff;
      }
      .tab-btn.active {
        color: #60a5fa;
        border-bottom: 2px solid #60a5fa;
        font-weight: bold;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      /* === 리스트 아이템 === */
      .list-item {
        background: rgba(30, 41, 59, 0.6);
        margin-bottom: 8px;
        padding: 10px;
        border-radius: 6px;
        border-left: 4px solid #475569;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.85rem;
      }
      .list-item:hover {
        background: rgba(51, 65, 85, 0.8);
      }
      .list-item.selected {
        border-left-color: #60a5fa;
        background: rgba(51, 65, 85, 0.9);
      }
      .list-item .title {
        font-weight: bold;
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
      }

      /* 데이터 패킷 스타일 */
      .data-packet {
        font-family: monospace;
        font-size: 0.8rem;
        color: #4ade80;
        background: rgba(0, 0, 0, 0.5);
        padding: 4px;
        border-radius: 3px;
        margin-top: 4px;
      }
      .data-packet::before {
        content: ">> ";
        color: #60a5fa;
      }

      /* 상태별 라벨 색상 */
      .status-active {
        color: #4ade80;
      }
      .status-warning {
        color: #fbbf24;
      }
      .status-critical {
        color: #f87171;
      }

      /* === 경보 아이템 특수 스타일 === */
      .alert-warning {
        border-left-color: #fbbf24;
      }
      .alert-critical {
        border-left-color: #f87171;
        animation: pulse-bg 2s infinite;
      }
      @keyframes pulse-bg {
        0% {
          background: rgba(30, 41, 59, 0.6);
        }
        50% {
          background: rgba(248, 113, 113, 0.2);
        }
        100% {
          background: rgba(30, 41, 59, 0.6);
        }
      }

      /* === 라벨 및 툴팁 === */
      #labels-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 5;
        overflow: hidden;
      }
      .object-label {
        position: absolute;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: bold;
        transform: translate(-50%, -100%);
        border: 1px solid #475569;
        white-space: nowrap;
        text-shadow: 1px 1px 2px black;
      }
      #tooltip {
        position: absolute;
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 10px;
        border-radius: 6px;
        font-size: 0.85rem;
        pointer-events: none;
        display: none;
        z-index: 100;
        border: 1px solid #60a5fa;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        white-space: nowrap;
      }

      /* === 단축키 안내 === */
      .shortcuts {
        font-size: 0.7rem;
        color: #64748b;
        line-height: 1.5;
        margin-top: 15px;
      }
      .shortcuts kbd {
        background: #334155;
        padding: 2px 5px;
        border-radius: 3px;
        color: #e2e8f0;
      }

      /* 사용자 커스텀 스크롤바 */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* === 상단 호버 헤더 === */
      #header-trigger {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 8px;
        z-index: 50;
        pointer-events: all;
      }
      #header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        z-index: 49;
        background: rgba(10, 17, 32, 0.92);
        border-bottom: 1px solid rgba(96, 165, 250, 0.25);
        backdrop-filter: blur(12px);
        transform: translateY(-100%);
        transition: transform 0.3s ease;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #header.visible {
        transform: translateY(0);
      }
      .header-nav {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .header-btn {
        background: rgba(30, 41, 59, 0.7);
        color: #f8fafc;
        border: 1px solid #334155;
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.78rem;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .header-btn:hover {
        background: rgba(51, 65, 85, 0.9);
        border-color: #60a5fa;
      }
      .header-btn.active {
        border-color: #60a5fa;
        color: #60a5fa;
      }

      /* === 서버 오프라인 배너 === */
      #offline-banner {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 100;
        background: rgba(239, 68, 68, 0.9);
        color: white;
        text-align: center;
        padding: 8px;
        font-size: 0.85rem;
        display: none;
      }

      /* === 미니맵 패널 === */
      #minimap-panel {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 260px;
        height: 260px;
        border: 3px solid #334155;
        border-radius: 50%;
        overflow: hidden;
        z-index: 10;
        box-shadow:
          0 4px 15px rgba(0, 0, 0, 0.6),
          inset 0 0 20px rgba(96, 165, 250, 0.3);
        background: #0f172a;
        transform: translateZ(0);
        cursor: grab;
      }
      #minimap-panel:active {
        cursor: grabbing;
      }
      #minimap-container {
        position: absolute;
        top: -70px;
        left: -70px;
        width: 400px;
        height: 400px;
        transform-origin: center;
      }
      #minimap {
        width: 100%;
        height: 100%;
        background: #0f172a;
      }

      /* 레이더 십자선 */
      .radar-crosshair {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 12;
        background:
          linear-gradient(rgba(96, 165, 250, 0.3) 1px, transparent 1px)
            center/100% 50% no-repeat,
          linear-gradient(90deg, rgba(96, 165, 250, 0.3) 1px, transparent 1px)
            center/50% 100% no-repeat;
      }

      /* === 로딩 UI === */
      #loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(15, 23, 42, 0.95);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        backdrop-filter: blur(4px);
      }
      #loading-overlay.hidden {
        display: none;
      }
      #loading-bar {
        width: 300px;
        height: 6px;
        background: #1e293b;
        border-radius: 3px;
        border: 1px solid #475569;
        overflow: hidden;
        margin-bottom: 15px;
      }
      #loading-progress {
        height: 100%;
        background: linear-gradient(
          90deg,
          #60a5fa 0%,
          #3b82f6 50%,
          #60a5fa 100%
        );
        width: 0%;
        transition: width 0.3s ease;
      }
      #loading-text {
        color: #cbd5e1;
        font-size: 0.9rem;
        text-align: center;
        font-family: "Courier New", monospace;
      }
    </style>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body>
    <div id="header-trigger"></div>
    <div id="header">
      <div style="display: flex; align-items: center; gap: 12px">
        <span style="font-size: 1rem; font-weight: bold; color: #60a5fa"
          >CoWater</span
        >
        <span style="font-size: 0.75rem; color: #64748b"
          >해양 무인 시스템 작전 플랫폼</span
        >
      </div>
      <div class="header-nav">
        <button class="header-btn active">🌐 3D 작전뷰</button>
        <button class="header-btn" onclick="location.href = 'ops.html'">
          ⚠️ 운영 관제
        </button>
      </div>
    </div>
    <div id="offline-banner">
      ⚠️ Device Registry 서버에 연결할 수 없습니다. 서버 상태를 확인하세요.
    </div>

    <div id="canvas-container"></div>
    <div id="labels-container"></div>
    <div id="tooltip"></div>

    <div id="loading-overlay">
      <div id="loading-bar">
        <div id="loading-progress"></div>
      </div>
      <div id="loading-text">지형 데이터 로딩 중...</div>
    </div>

    <div id="left-panel" class="panel">
      <div class="panel-header" onclick="uiManager.togglePanel('left')">
        <h3>해양 작전 제어판</h3>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="panel-content">
        <div id="stats-container"></div>
        <hr />
        <h4>지도 스타일 (미니맵)</h4>
        <select id="map-style">
          <option value="satellite">위성 지도 (Satellite)</option>
          <option value="dark">전술 다크 (지상/해면 구분)</option>
          <option value="ocean">해양 수심도 (Ocean Base)</option>
        </select>

        <h4>표시 깊이 필터</h4>
        <input
          type="range"
          id="depth-filter"
          min="-200"
          max="0"
          value="-200"

        />
        <span class="control-value" id="depth-value">-200m ~ 0m 표시</span>
        <div class="shortcuts">
          <strong>단축키</strong><br />
          <kbd>1</kbd>/<kbd>2</kbd> 객체/통신선 선택<br />

          <kbd>L</kbd> 라벨 ON/OFF<br />
        </div>

    </div>

    <div id="right-panel" class="panel">
      <div class="panel-header" onclick="uiManager.togglePanel('right')">
        <h3>정보 & 경보 현황</h3>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="panel-content">
        <div class="tabs">
          <button
            class="tab-btn active"
            onclick="uiManager.switchTab('objects')"
          >
            📡 디바이스 (<span id="obj-count">0</span>)
          </button>
          <button class="tab-btn" onclick="uiManager.switchTab('links')">
            🔗 링크 (<span id="link-count">0</span>)
          </button>
          <button class="tab-btn" onclick="uiManager.switchTab('alerts')">
            ⚠️ 경보 (<span id="alert-count">0</span>)
          </button>
        </div>
        <div id="tab-objects" class="tab-content active">
          <div
            id="selected-detail"
            style="margin-bottom: 15px; display: none"
          ></div>
          <div id="object-list-container"></div>
        </div>
        <div id="tab-links" class="tab-content">
          <div
            id="link-selected-detail"
            style="margin-bottom: 15px; display: none"
          ></div>
          <div id="link-list-container"></div>
        </div>
        <div id="tab-alerts" class="tab-content">
          <div id="alert-list-container">
            <div style="text-align: center; color: #64748b; padding: 20px">
              발생한 경보가 없습니다.
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="minimap-panel" oncontextmenu="return false;">
      <div id="minimap-container">
        <div id="minimap"></div>
      </div>
      <div class="radar-crosshair"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
      const REGISTRY_BASE = "http://127.0.0.1:8280";
      const MOTH_WS_BASE = "wss://cobot.center:8287";
      const LOCAL_ALERTS_STORAGE_KEY = "cowater.dashboard.localAlerts";
      const LOCAL_DEVICE_DIRECTORY_KEY = "cowater.dashboard.deviceDirectory";
      const LOCAL_REGISTRY_DEVICES_KEY = "cowater.dashboard.registryDevices";

      const COLORS = {
        controlCenter: 0xff6b6b,
        ship: 0x4ecdc4,
        usv: 0xffd93d,
        drone: 0xffd93d,
        rov: 0x6bcf7f,
        auv: 0x95a5ff,
        alert_warning: 0xff9800,
        alert_critical: 0xf44336,
        link_rf: 0x60a5fa,
        link_tether: 0x94a3b8,
        link_acoustic: 0x2dd4bf,
        link_satellite: 0xc084fc,
        link_a2a: 0xfbbf24,
        commBuoy: 0xf97316,
        powerTower: 0xeab308,
        glider: 0xa855f7,
        submarine: 0x334155,
        sensorNode: 0x14b8a6,
      };

      const ENV_COLORS = {
        sky: 0x87ceeb,
        waterSurface: 0x1da2d8,
        deepWater: 0x001e36,
      };

      const mapState = {
        map: null,
        markers: {},
        lines: {},
        currentTileLayer: null,
        baseLat: 35.15,
        baseLng: 129.15,
        scale: 0.000012,
        isProgrammaticMove: false,
        terrainMeshes: {}, // 타일별 메시 캐시: key='x,y,z', value={mesh, elevations}
        loadedTiles: new Set(), // 로드된 타일 좌표 기록
        zoom: 13,
        lastCameraPos: { x: 0, z: 0 },
        tileRadius: 2,
        tileSize: 256,
        isLoadingTiles: false,
      };

      const state = {
        time: 0,
        depthFilter: -200,
        showLabels: true,
        showGrid: true,
        selectedId: null,
        hoveredId: null,
        objects: [],
        links: [],
        alerts: [],
        tethers: [],
        usingRegistryData: false,
      };

      const trackStreamSockets = {};
      const trackStreamRetryTimers = {};

      // Resource management infrastructure
      const activeWebSockets = new Map();
      const activeTimers = new Map();
      const attachedListeners = new Map();

      function attachListener(element, eventType, handler) {
        const key = `${element?.id || 'window'}.${eventType}`;
        if (!attachedListeners.has(key)) {
          attachedListeners.set(key, { element, eventType, handler });
          element.addEventListener(eventType, handler);
        }
      }

      function closeWebSocket(key) {
        const ws = activeWebSockets.get(key);
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
          try { ws.close(); } catch (e) { console.debug('WebSocket close error:', e); }
        }
        activeWebSockets.delete(key);
      }

      function scheduleTimer(key, fn, delay) {
        clearTimer(key);
        activeTimers.set(key, setTimeout(fn, delay));
      }

      function clearTimer(key) {
        const timer = activeTimers.get(key);
        if (timer) clearTimeout(timer);
        activeTimers.delete(key);
      }

      function cleanupAllResources() {
        // Close all WebSockets
        for (const key of activeWebSockets.keys()) {
          closeWebSocket(key);
        }
        // Clear all timers
        const timerKeys = Array.from(activeTimers.keys());
        for (const key of timerKeys) {
          clearTimer(key);
        }
        // Clear old-style WebSocket sockets
        for (const key in trackStreamSockets) {
          const ws = trackStreamSockets[key];
          if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            try { ws.close(); } catch (e) {}
          }
        }
        // Clear old-style timers
        for (const key in trackStreamRetryTimers) {
          clearTimeout(trackStreamRetryTimers[key]);
        }
        // Remove event listeners
        for (const { element, eventType, handler } of attachedListeners.values()) {
          try { element.removeEventListener(eventType, handler); } catch (e) {}
        }
        attachedListeners.clear();
        // Cleanup Three.js
        if (typeof cleanupScene === 'function') {
          try { cleanupScene(); } catch (e) { console.debug('Scene cleanup error:', e); }
        }
        // Remove this handler
        window.removeEventListener('beforeunload', cleanupAllResources);
      }

      window.addEventListener('beforeunload', cleanupAllResources);

      const LINK_ACTIVE_WINDOW_MS = 7000;
      const LINK_DEGRADED_WINDOW_MS = 20000;
      const LINK_RECENT_EVENTS_MAX = 6;
      const REALTIME_FRESH_WINDOW_MS = 10000;
      const MOTION_WINDOW_MS = 5000;
      const TRAIL_WINDOW_MS = 30000;
      const TRAIL_SAMPLE_MS = 500;
      const TRAIL_MAX_POINTS = 120;
      const DEVICE_MODEL_SCALE = 0.15;
      const VIRTUAL_SYSTEM_SCALE_MULTIPLIER = 10;
      const VIRTUAL_SYSTEM_ID = "system-3d-core";
      const VIRTUAL_SYSTEM_POSITION = { x: -90, y: 0, z: 80 };
      const TETHER_DASH_SIZE = 4;
      const TETHER_GAP_SIZE = 3;
      const LINK_DASH_SIZE = 4;
      const LINK_GAP_SIZE = 3;
      const LINK_PACKET_RADIUS = 0.12;
      const LINK_PACKET_LENGTH = 3.2;
      const LINK_PACKET_COUNT = 5;
      const TRAIL_DASH_SIZE = 0.1;
      const TRAIL_GAP_SIZE = 0.1;
      const TERRAIN_TILE_ZOOM = 17;
      const ELEVATION_TILE_MAX_ZOOM = 15;

      function getRenderableObjects() {
        return state.objects.filter((obj) => obj.connected !== false);
      }

      function getVisibleDeviceObjects() {
        return state.objects.filter(
          (obj) => obj.connected !== false && !obj.virtualSystem,
        );
      }

      function getSortedObjects() {
        return [...getVisibleDeviceObjects()].sort((left, right) => {
          const connectedDiff =
            Number(right.connected !== false) -
            Number(left.connected !== false);
          if (connectedDiff !== 0) return connectedDiff;
          return String(left.name || "").localeCompare(
            String(right.name || ""),
            "ko",
          );
        });
      }

      function findObjectById(id) {
        return state.objects.find(
          (obj) => obj.id === id || String(obj.id) === String(id),
        );
      }

      function findRenderableObjectById(id) {
        return getRenderableObjects().find(
          (obj) => obj.id === id || String(obj.id) === String(id),
        );
      }

      function findObjectByRegistryOrId(deviceId) {
        if (deviceId === null || deviceId === undefined) return null;
        const key = String(deviceId).trim();
        if (!key) return null;

        return state.objects.find(
          (obj) =>
            String(obj.id) === key || String(obj.registryId) === key,
        );
      }

      function isFreshRealtime(obj) {
        return Boolean(
          obj &&
          obj.lastRealtimeAt &&
          Date.now() - obj.lastRealtimeAt <= REALTIME_FRESH_WINDOW_MS,
        );
      }

      function applyRealtimePayloadToObject(obj, payload) {
        if (!obj || !payload || typeof payload !== "object") return;

        const now = Date.now();
        let touched = false;

        const latRaw = payload.latitude ?? payload.lat;
        const lonRaw = payload.longitude ?? payload.lon ?? payload.lng;
        const lat = Number(latRaw);
        const lon = Number(lonRaw);
        if (Number.isFinite(lat) && Number.isFinite(lon)) {
          obj.position.x = (lon - mapState.baseLng) / mapState.scale;
          obj.position.z = (mapState.baseLat - lat) / mapState.scale;
          obj.lastRealtimePositionAt = now;
          touched = true;
        }

        const depthRaw = payload.depth ?? payload.depth_m;
        const depth = Number(depthRaw);
        if (Number.isFinite(depth)) {
          obj.position.y = -Math.abs(depth);
          obj.lastRealtimeDepthAt = now;
          touched = true;
        }

        const headingRaw = payload.heading ?? payload.course ?? payload.yaw;
        const heading = Number(headingRaw);
        if (Number.isFinite(heading)) {
          obj.heading = heading;
          obj.lastRealtimeHeadingAt = now;
          touched = true;
        }

        const speedRaw = payload.speed ?? payload.velocity;
        const speed = Number(speedRaw);
        if (Number.isFinite(speed)) {
          obj.speed = speed;
          obj.lastRealtimeSpeedAt = now;
          touched = true;
        }

        const batteryRaw = payload.battery_percent ?? payload.battery;
        const battery = Number(batteryRaw);
        if (Number.isFinite(battery)) {
          obj.battery = battery;
          obj.lastRealtimeBatteryAt = now;
          touched = true;
        }

        if (touched) obj.lastRealtimeAt = now;
      }

      function metersPerWorldUnit() {
        const latRad = ((mapState.baseLat || 0) * Math.PI) / 180;
        const metersPerDegLat = 111320;
        const metersPerDegLon = Math.max(1, 111320 * Math.cos(latRad));
        return ((metersPerDegLat + metersPerDegLon) / 2) * mapState.scale;
      }

      function headingToArrow(heading) {
        const normalized = (((Number(heading) || 0) % 360) + 360) % 360;
        const arrows = ["↑", "↗", "→", "↘", "↓", "↙", "←", "↖"];
        return arrows[Math.round(normalized / 45) % 8];
      }

      function recordMotionSample(obj, now) {
        if (!obj) return;
        if (!Array.isArray(obj.motionHistory)) obj.motionHistory = [];

        const last = obj.motionHistory[obj.motionHistory.length - 1];
        if (last && now - last.ts < TRAIL_SAMPLE_MS) return;

        const point = {
          ts: now,
          x: obj.position.x,
          y: obj.position.y,
          z: obj.position.z,
        };
        obj.motionHistory.push(point);

        const minTs = now - TRAIL_WINDOW_MS;
        while (
          obj.motionHistory.length > 0 &&
          obj.motionHistory[0].ts < minTs
        ) {
          obj.motionHistory.shift();
        }

        if (obj.motionHistory.length > TRAIL_MAX_POINTS) {
          obj.motionHistory.splice(
            0,
            obj.motionHistory.length - TRAIL_MAX_POINTS,
          );
        }
      }

      function computeMotionDistanceMeters(obj, windowMs) {
        if (
          !obj ||
          !Array.isArray(obj.motionHistory) ||
          obj.motionHistory.length < 2
        )
          return 0;
        const minTs = Date.now() - windowMs;
        const points = obj.motionHistory.filter((p) => p.ts >= minTs);
        if (points.length < 2) return 0;

        let totalUnits = 0;
        for (let i = 1; i < points.length; i++) {
          const dx = points[i].x - points[i - 1].x;
          const dy = points[i].y - points[i - 1].y;
          const dz = points[i].z - points[i - 1].z;
          totalUnits += Math.hypot(dx, dy, dz);
        }
        return totalUnits * metersPerWorldUnit();
      }

      function disposeTrail(obj) {
        if (!obj || !obj.trailLine) return;
        try {
          if (obj.trailGeometry) obj.trailGeometry.dispose();
          if (obj.trailMaterial) obj.trailMaterial.dispose();
          if (scene) scene.remove(obj.trailLine);
        } catch (e) {
          console.debug('Trail disposal error:', e);
        }
        obj.trailLine = null;
        obj.trailGeometry = null;
        obj.trailMaterial = null;
      }

      function ensureObjectTrail(obj) {
        if (!obj) return;
        // Clean up existing trail if updating
        if (obj.trailLine) {
          disposeTrail(obj);
        }

        const positions = new Float32Array(TRAIL_MAX_POINTS * 3);
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute(
          "position",
          new THREE.BufferAttribute(positions, 3),
        );
        geometry.setDrawRange(0, 0);

        const material = new THREE.LineDashedMaterial({
          color: COLORS[obj.type] || 0x60a5fa,
          dashSize: TRAIL_DASH_SIZE,
          gapSize: TRAIL_GAP_SIZE,
          transparent: true,
          opacity: 0.45,
        });
        const line = new THREE.Line(geometry, material);
        line.frustumCulled = false;
        scene.add(line);

        obj.trailLine = line;
        obj.trailPositions = positions;
        obj.trailGeometry = geometry;
        obj.trailMaterial = material;
      }

      function updateObjectTrail(obj) {
        if (!obj || !obj.trailLine || !Array.isArray(obj.motionHistory)) return;

        const history = obj.motionHistory;
        const count = Math.min(history.length, TRAIL_MAX_POINTS);
        const start = history.length - count;
        const posAttr = obj.trailLine.geometry.attributes.position;

        for (let i = 0; i < count; i++) {
          const p = history[start + i];
          const idx = i * 3;
          obj.trailPositions[idx] = p.x;
          obj.trailPositions[idx + 1] = p.y + obj.meshOffset;
          obj.trailPositions[idx + 2] = p.z;
        }

        obj.trailLine.geometry.setDrawRange(0, count);
        posAttr.needsUpdate = true;
        obj.trailLine.computeLineDistances();

        const fresh = isFreshRealtime(obj);
        obj.trailLine.material.opacity = fresh ? 0.5 : 0.22;
        obj.trailLine.visible = count > 1 && obj.mesh && obj.mesh.visible;
      }

      function readCachedRegistryDevices() {
        try {
          const raw = localStorage.getItem(LOCAL_REGISTRY_DEVICES_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (err) {
          console.warn("cached registry devices parse failed:", err);
          return [];
        }
      }

      function persistRegistryDevices(devices) {
        localStorage.setItem(
          LOCAL_REGISTRY_DEVICES_KEY,
          JSON.stringify(devices),
        );
      }

      function persistDashboardAlerts() {
        const payload = state.alerts.map((alert) => ({
          alert_id: alert.id,
          event_id: alert.eventId || null,
          alert_type: alert.type || "unknown",
          message: alert.message,
          severity: String(alert.severity || "INFORMATION").toUpperCase(),
          status: alert.status || "waiting",
          source_system: alert.source_system || "3d_dashboard",
          source_role: alert.source_role || "dashboard",
          source_agent_id: alert.source_agent_id || null,
          target_agent_id: alert.target_agent_id || alert.platformId || null,
          target_display_name: alert.target_display_name || null,
          recommended_action: alert.recommended_action || null,
          requires_user_approval: Boolean(alert.requires_user_approval),
          auto_remediated: Boolean(alert.auto_remediated),
          route_mode: alert.route_mode || "dashboard_local",
          metadata: {
            ...(alert.metadata || {}),
            platformId: alert.platformId || null,
          },
          dashboard_origin: "3d_dashboard",
          created_at: alert.created_at || new Date().toISOString(),
          updated_at: new Date().toISOString(),
        }));

        localStorage.setItem(LOCAL_ALERTS_STORAGE_KEY, JSON.stringify(payload));
      }

      function persistDeviceDirectory(devices) {
        const payload = devices.map((device) => ({
          id: device.id,
          name: device.name,
          device_type: device.device_type || device.type || null,
          connected: device.connected !== false,
          agent: device.agent || null,
        }));
        localStorage.setItem(
          LOCAL_DEVICE_DIRECTORY_KEY,
          JSON.stringify(payload),
        );
      }

      function parseFiniteNumber(value, fallback = undefined) {
        const parsed = Number.parseFloat(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function validateDevice(device) {
        if (!device || typeof device !== 'object') {
          console.warn('Invalid device:', device);
          return null;
        }
        // Support both old (connected) and new (connectivity_status) format
        const connStatus = device.connectivity_status || (device.connected !== false ? 'online' : 'offline');
        return {
          id: device.id,
          registry_id: device.registry_id || device.id,
          name: String(device.name || 'Unknown'),
          device_type: String(device.device_type || 'unknown').toUpperCase(),
          layer: String(device.layer || ''),
          connected: device.connected !== false,
          connectivity_status: connStatus, // New field: online/lost/offline
          latitude: parseFiniteNumber(device.latitude),
          longitude: parseFiniteNumber(device.longitude),
          altitude: parseFiniteNumber(device.altitude, 0),
          depth: parseFiniteNumber(device.depth),
          heading: parseFiniteNumber(device.heading, 0),
          speed: parseFiniteNumber(device.speed, 0),
          battery: parseFiniteNumber(device.last_battery_percent ?? device.battery),
          agent: device.agent || {},
          tracks: Array.isArray(device.tracks) ? device.tracks : [],
          connectivity: String(device.connectivity || ''),
          parent_id: device.parent_id ?? null,
          is_submerged: Boolean(device.is_submerged),
          force_parent_routing: Boolean(device.force_parent_routing),
        };
      }

      async function fetchDevicesFromRegistry() {
        try {
          const resp = await fetch(`${REGISTRY_BASE}/devices`);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          const devices = Array.isArray(data) ? data : [];
          const visibleDevices = devices
            .map(validateDevice)
            .filter(device => device !== null && String(device?.device_type || "").toUpperCase() !== "SYSTEM");
          document.getElementById("offline-banner").style.display = "none";
          persistRegistryDevices(visibleDevices);
          return visibleDevices;
        } catch (e) {
          console.warn("Registry unavailable:", e.message);
          const cachedDevices = readCachedRegistryDevices();
          document.getElementById("offline-banner").style.display = "block";
          document.getElementById("offline-banner").innerText =
            cachedDevices.length > 0
              ? "⚠️ Device Registry 서버에 연결할 수 없어 마지막 실제 디바이스 상태를 표시합니다."
              : "⚠️ Device Registry 서버에 연결할 수 없습니다. 등록된 실제 디바이스 데이터가 없습니다.";
          return cachedDevices;
        }
      }

      function applyInitialMapCenterFromFirstDevice(devices) {
        if (!Array.isArray(devices) || devices.length === 0) return;
        const firstConnected = devices.find(
          (device) => device && device.connected !== false,
        );
        const first = firstConnected || devices[0] || {};
        const lat = Number(first.latitude);
        const lng = Number(first.longitude);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
        mapState.baseLat = lat;
        mapState.baseLng = lng;
      }

      function mapRegistryToScenario(reg) {
        const lat = Number.isFinite(reg.latitude) ? reg.latitude : mapState.baseLat;
        const lon = Number.isFinite(reg.longitude) ? reg.longitude : mapState.baseLng;
        const x = (lon - mapState.baseLng) / mapState.scale;
        const z = (mapState.baseLat - lat) / mapState.scale;
        const altitude = Number.isFinite(reg.altitude) ? reg.altitude : 0;
        const depth =
          Number.isFinite(reg.depth)
            ? -Math.abs(reg.depth)
            : altitude < 0
              ? altitude
              : 0;
        const role = (
          reg.agent?.role ||
          reg.device_type ||
          "usv"
        ).toLowerCase();
        // device_type 매핑: usv, auv, rov, control_ship, ship
        const typeMap = {
          usv: "usv",
          auv: "auv",
          rov: "rov",
          control_ship: "ship",
          ship: "ship",
          drone: "drone",
        };
        const deviceType = typeMap[role] || "usv";
        return {
          id: reg.id || `dev-${reg.name}`,
          registryId: reg.registry_id || reg.id,
          name: reg.name,
          type: deviceType,
          position: { x, y: depth, z },
          heading: Number.isFinite(reg.heading) ? reg.heading : 0,
          speed: Number.isFinite(reg.speed) ? reg.speed : 0,
          battery:
            Number.isFinite(reg.last_battery_percent)
              ? reg.last_battery_percent
              : Number.isFinite(reg.battery)
                ? reg.battery
                : undefined,
          status: reg.connected === false ? "offline" : "active",
          connected: reg.connected !== false,
          registry: reg,
          lastRealtimeAt: 0,
          lastRealtimePositionAt: 0,
          lastRealtimeDepthAt: 0,
          lastRealtimeHeadingAt: 0,
          lastRealtimeSpeedAt: 0,
          lastRealtimeBatteryAt: 0,
        };
      }

      function resolveLinkTypeFromDevice(device) {
        if (device?.force_parent_routing) {
          return "link_tether";
        }

        const deviceType = String(device?.device_type || "").toUpperCase();
        if (deviceType === "AUV" && Boolean(device?.is_submerged)) {
          return "link_acoustic";
        }

        const connectivity = String(device?.connectivity || "").toLowerCase();
        if (connectivity.includes("wired")) {
          return "link_tether";
        }
        if (connectivity.includes("acoustic")) {
          return "link_acoustic";
        }
        if (connectivity.includes("satellite")) {
          return "link_satellite";
        }
        return "link_rf";
      }

      function deriveActiveLinksFromRegistry(devices) {
        if (!Array.isArray(devices) || devices.length === 0) return [];

        const byRegistryId = new Map();
        devices.forEach((device) => {
          if (device.registry_id !== undefined && device.registry_id !== null) {
            byRegistryId.set(String(device.registry_id), device);
          }
        });

        const links = [];

        devices.forEach((child) => {
          if (String(child.layer || "").toLowerCase() !== "lower") return;

          const parentRef = child.parent_id;
          if (parentRef === null || parentRef === undefined) return;

          // 서버 parent assignment 기준: parent_id(registry numeric id)로만 연결
          const parent = byRegistryId.get(String(parentRef)) || null;
          if (!parent) return;

          // 잘못된 매핑으로 자기 자신 링크가 생성되는 경우 방지
          if (
            String(parent.id) === String(child.id) ||
            String(parent.registry_id) === String(child.registry_id)
          ) {
            return;
          }

          links.push({
            id: `link-${parent.id}-${child.id}`,
            source: parent.id,
            target: child.id,
            type: resolveLinkTypeFromDevice(child),
            status:
              child.connected === false || parent.connected === false
                ? "down"
                : "active",
            name: `${parent.name} ↔ ${child.name}`,
            packets: [],
            totalMessages: 0,
            lastMessageAt: null,
            lastChannel: null,
            recentEvents: [],
          });
        });

        return links;
      }

      function summarizeFlowPayload(payload) {
        if (!payload || typeof payload !== "object") return "payload 없음";

        // a2a_event 구조 (새 방식: 디바이스 직접 발행)
        const a2aEvent =
          payload.a2a_event && typeof payload.a2a_event === "object"
            ? payload.a2a_event
            : null;
        if (a2aEvent) {
          const msgType = String(a2aEvent.type || "").trim();
          const action = String(a2aEvent.action || "").trim();
          const taskId = String(a2aEvent.task_id || "").trim();
          const chunks = [];
          if (msgType) chunks.push(`type=${msgType}`);
          if (action) chunks.push(`action=${action}`);
          if (taskId) chunks.push(`task=${taskId.slice(0, 8)}`);
          return chunks.length > 0 ? chunks.join(", ") : "A2A 메시지";
        }

        const sensors =
          payload.sensors && typeof payload.sensors === "object"
            ? payload.sensors
            : null;
        const a2aData =
          sensors && sensors.a2a && typeof sensors.a2a === "object"
            ? sensors.a2a
            : null;
        if (a2aData) {
          const msgType = String(
            a2aData.message_type || a2aData.type || "",
          ).trim();
          const taskId = String(a2aData.task_id || "").trim();
          const action = String(a2aData.action || a2aData.command || "").trim();
          const route = String(a2aData.route_mode || "").trim();
          const chunks = [];
          if (msgType) chunks.push(`type=${msgType}`);
          if (action) chunks.push(`action=${action}`);
          if (taskId) chunks.push(`task=${taskId}`);
          if (route) chunks.push(`route=${route}`);
          if (chunks.length > 0) return chunks.join(", ");
        }

        const preferred = [
          "track",
          "track_name",
          "track_type",
          "command",
          "action",
          "status",
          "latitude",
          "longitude",
          "depth",
          "depth_m",
          "battery_percent",
          "speed",
          "heading",
        ];
        const chunks = [];
        preferred.forEach((key) => {
          if (payload[key] !== undefined && chunks.length < 4) {
            const value =
              typeof payload[key] === "number"
                ? Number(payload[key])
                    .toFixed(3)
                    .replace(/\.000$/, "")
                : String(payload[key]);
            chunks.push(`${key}=${value}`);
          }
        });
        if (chunks.length === 0) {
          Object.keys(payload)
            .slice(0, 3)
            .forEach((key) => chunks.push(`${key}=${String(payload[key])}`));
        }
        return chunks.join(", ");
      }

      function isA2AFlowEvent(channel, payload) {
        if (!payload || typeof payload !== "object") return false;
        // a2a_event 키 존재 → 명확한 A2A 이벤트 (새 방식)
        if (payload.a2a_event && typeof payload.a2a_event === "object")
          return true;
        return false;
      }

      function ensureVirtualSystemObject() {
        const existing = findObjectById(VIRTUAL_SYSTEM_ID);
        if (existing) return existing;

        const systemObj = {
          id: VIRTUAL_SYSTEM_ID,
          registryId: VIRTUAL_SYSTEM_ID,
          name: "시스템 관제",
          type: "sensorNode",
          position: { ...VIRTUAL_SYSTEM_POSITION },
          heading: 0,
          speed: 0,
          battery: undefined,
          status: "active",
          connected: true,
          virtualSystem: true,
          lastRealtimeAt: 0,
          lastRealtimePositionAt: 0,
          lastRealtimeDepthAt: 0,
          lastRealtimeHeadingAt: 0,
          lastRealtimeSpeedAt: 0,
          lastRealtimeBatteryAt: 0,
        };

        state.objects.push(systemObj);
        return systemObj;
      }

      function ensureDirectA2ALink(fromObj, toObj) {
        if (!fromObj || !toObj) return null;
        if (String(fromObj.id) === String(toObj.id)) return null;

        // 송신/수신 방향성을 보존한다.
        const srcObj = fromObj;
        const dstObj = toObj;
        const linkId = `link-a2a-${srcObj.id}-${dstObj.id}`;
        let link = state.links.find((item) => item.id === linkId);
        if (link) return link;

        link = {
          id: linkId,
          source: srcObj.id,
          target: dstObj.id,
          type: "link_a2a",
          status: "idle",
          name: `${srcObj.name} → ${dstObj.name}`,
          packets: [],
          totalMessages: 0,
          lastMessageAt: null,
          lastChannel: null,
          recentEvents: [],
        };
        state.links.push(link);
        return link;
      }

      function noteLinkTraffic(deviceId, channel, payload) {
        if (!isA2AFlowEvent(channel, payload)) return;

        const a2aEvent = payload.a2a_event;
        const fromId = a2aEvent && a2aEvent.from;
        const toId = a2aEvent && a2aEvent.to;

        // from/to가 명확할 때만 링크를 기록한다.
        if (!fromId || !toId || String(fromId) === String(toId)) return;

        const fromObj = findObjectByRegistryOrId(fromId);
        const toObj = findObjectByRegistryOrId(toId);
        if (!fromObj || !toObj) return;

        const link = ensureDirectA2ALink(fromObj, toObj);
        if (!link) return;

        const now = Date.now();
        link.totalMessages = Number(link.totalMessages || 0) + 1;
        link.lastMessageAt = now;
        link.lastChannel = channel;
        link.recentEvents = Array.isArray(link.recentEvents)
          ? link.recentEvents
          : [];
        link.recentEvents.unshift({
          ts: now,
          channel,
          summary: summarizeFlowPayload(payload),
        });
        if (link.recentEvents.length > LINK_RECENT_EVENTS_MAX) {
          link.recentEvents.length = LINK_RECENT_EVENTS_MAX;
        }
        link.packets = link.recentEvents.map((event) => {
          const ageSec = ((Date.now() - event.ts) / 1000).toFixed(1);
          return `[${event.channel}] ${event.summary} (${ageSec}s 전)`;
        });
      }

      function refreshLinkStatuses() {
        const now = Date.now();
        state.links.forEach((link) => {
          const sourceObj = findObjectById(link.source);
          const targetObj = findObjectById(link.target);
          if (
            (sourceObj && sourceObj.connected === false) ||
            (targetObj && targetObj.connected === false)
          ) {
            link.status = "down";
            return;
          }

          const lastTs = Number(link.lastMessageAt || 0);
          if (!lastTs) {
            link.status = "idle";
            return;
          }

          const ageMs = now - lastTs;
          if (ageMs <= LINK_ACTIVE_WINDOW_MS) {
            link.status = "active";
          } else if (ageMs <= LINK_DEGRADED_WINDOW_MS) {
            link.status = "degraded";
          } else {
            link.status = "idle";
          }
        });
      }

      function subscribeMothTelemetry() {
        // Close existing connection if any
        closeWebSocket('moth-healthcheck');

        // healthcheck MEB 채널 구독 — 위치/배터리 실시간 업데이트
        const wsUrl = `${MOTH_WS_BASE}/pang/ws/meb?channel=instant&name=healthcheck&source=base&track=base`;
        const ws = new WebSocket(wsUrl);
        activeWebSockets.set('moth-healthcheck', ws);

        ws.onopen = () => {
          ws.send(
            JSON.stringify({
              type: "subscribe",
              channel: "device.healthcheck",
              channel_type: "meb",
            }),
          );
          console.log("[Moth] healthcheck MEB 구독 시작");
        };

        ws.onmessage = async (e) => {
          try {
            const rawText =
              typeof e.data === "string" ? e.data : await e.data.text();
            if (!rawText || rawText.trim() === "ping") return;
            const raw = JSON.parse(rawText);
            // MEB publish 메시지에서 payload 추출
            const payload =
              raw.payload || (raw.device_id !== undefined ? raw : null);
            if (!payload || payload.device_id === undefined) return;

            const deviceId = payload.device_id;
            // Registry 디바이스는 id가 숫자형, 로컬 시나리오는 문자열
            const obj = findObjectByRegistryOrId(deviceId);
            if (!obj) return;

            applyRealtimePayloadToObject(obj, payload);
            if (payload.route_mode !== undefined)
              obj.routeMode = payload.route_mode;
          } catch (err) {
            console.error("[Moth] healthcheck 파싱 오류:", err);
          }
        };

        ws.onerror = () => console.warn("[Moth] healthcheck MEB 연결 오류");
        ws.onclose = () => scheduleTimer('moth-healthcheck-retry', subscribeMothTelemetry, 5000);
      }

      function subscribeDeviceTrackStreams(devices) {
        // 각 device의 track endpoint를 API 응답 그대로 사용해 구독
        devices.forEach((device) => {
          if (!device.tracks || !Array.isArray(device.tracks)) return;

          device.tracks.forEach((track) => {
            const trackType = String(track?.type || "").toUpperCase();
            const trackName = String(track?.name || "").trim();
            const endpoint = String(track?.endpoint || "").trim();
            if (!trackType || !endpoint) return;

            const deviceId = device.id;
            const socketKey = `track:${deviceId}:${trackType}:${trackName}`;
            const retryKey = `track-retry:${deviceId}:${trackType}:${trackName}`;

            // 이미 연결 시도 중/연결된 소켓은 중복 생성하지 않음
            const prevSocket = trackStreamSockets[socketKey] || activeWebSockets.get(socketKey);
            if (
              prevSocket &&
              (prevSocket.readyState === WebSocket.OPEN ||
                prevSocket.readyState === WebSocket.CONNECTING)
            ) {
              return;
            }

            // 서버가 제공한 endpoint를 그대로 사용 (상대경로는 MOTH base에 결합)
            let wsUrl = endpoint;
            if (!/^wss?:\/\//i.test(wsUrl)) {
              wsUrl = `${MOTH_WS_BASE}${wsUrl}`;
            }

            const ws = new WebSocket(wsUrl);
            trackStreamSockets[socketKey] = ws;
            activeWebSockets.set(socketKey, ws);

            ws.onopen = () => {
              console.log(
                `[Moth] Track ${trackType} 구독: device_id=${deviceId}, track=${trackName || "-"} `,
              );
            };

            ws.onmessage = async (e) => {
              try {
                const rawText =
                  typeof e.data === "string" ? e.data : await e.data.text();
                if (!rawText || rawText.trim() === "ping") return;
                const parsed = JSON.parse(rawText);
                const payload =
                  parsed &&
                  typeof parsed === "object" &&
                  parsed.payload &&
                  typeof parsed.payload === "object"
                    ? parsed.payload
                    : parsed;
                const payloadDeviceId =
                  payload?.device_id ?? parsed?.device_id ?? deviceId;
                if (!payloadDeviceId) return;

                const obj = findObjectByRegistryOrId(payloadDeviceId);
                if (!obj) return;

                noteLinkTraffic(
                  payloadDeviceId,
                  `${trackType}${trackName ? `:${trackName}` : ""}`,
                  payload,
                );
                applyRealtimePayloadToObject(obj, payload);
              } catch (err) {
                console.error(`[Moth] Track ${trackType} 파싱 오류:`, err);
              }
            };

            ws.onerror = () =>
              console.warn(`[Moth] Track ${trackType} 연결 오류`);
            ws.onclose = () => {
              console.warn(`[Moth] Track ${trackType} 연결 종료`);
              delete trackStreamSockets[socketKey];
              activeWebSockets.delete(socketKey);
              clearTimer(retryKey);
              scheduleTimer(retryKey, () => {
                subscribeDeviceTrackStreams([device]);
              }, 5000);
            };
          });
        });
      }

      let scene, camera, renderer, controls;
      let seaMesh;

      raycaster.params.Line.threshold = 0.4;

      function showLoadingProgress(percent, text) {
        document.getElementById("loading-progress").style.width =
          percent * 100 + "%";
        document.getElementById("loading-text").innerText = text;
      }

      function hideLoadingOverlay() {

      function createSharpCanvasTexture(canvas) {
        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearMipmapLinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.generateMipmaps = true;
        if (renderer && renderer.capabilities) {
          texture.anisotropy = Math.min(
            16,
            renderer.capabilities.getMaxAnisotropy(),
          );
        }
        texture.needsUpdate = true;
        return texture;
      }

      function normalizeTileXY(x, y, zoom) {
        const limit = Math.pow(2, zoom);
        const wrappedX = ((x % limit) + limit) % limit;
        const clampedY = Math.max(0, Math.min(limit - 1, y));
        return { x: wrappedX, y: clampedY };
      }

      function init3DEnvironment() {
        const container = document.getElementById("canvas-container");
        scene = new THREE.Scene();
        scene.background = new THREE.Color(ENV_COLORS.sky);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
