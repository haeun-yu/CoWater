      function applyInitialCameraFocus() {
        if (!camera || !controls) return;

        const renderables = getRenderableObjects().filter((obj) => obj.mesh);
        if (renderables.length === 0) {
          controls.target.set(0, 0, 0);
          mapState.lastCameraPos = { x: 0, z: 0 };
          controls.update();
          return;
        }

        const anchor =
          renderables.find((obj) => obj.type === "ship") || renderables[0];
        const points = renderables.map((obj) => obj.mesh.position.clone());
        const box = new THREE.Box3().setFromPoints(points);
        const boundsCenter = box.getCenter(new THREE.Vector3());
        const boundsSize = box.getSize(new THREE.Vector3());

        const center = boundsCenter.clone().lerp(anchor.mesh.position, 0.6);
        const spread = Math.max(boundsSize.x, boundsSize.z, 30);
        const vertical = Math.max(22, spread * 0.6);
        const backward = Math.max(35, spread * 1.1);

        controls.target.copy(center);
        camera.position.set(
          center.x + backward * 0.65,
          center.y + vertical,
          center.z + backward,
        );
        mapState.lastCameraPos = { x: center.x, z: center.z };
        controls.update();
      }

      function createEnvironment() {
        // 수면/그리드 제거 - 지도가 배경 역할을 함
      }

      async function createRealWorldTerrain() {
        // 초기 데이터만 사용, 나머지는 동적 로딩
        mapState.zoom = TERRAIN_TILE_ZOOM;
        const TILE_RADIUS = 1; // 초기 로드 최소화 (3x3 타일 = 9개, 전: 25개)
        const TILE_SIZE = 256;
        const CANVAS_SIZE = (TILE_RADIUS * 2 + 1) * TILE_SIZE;

        const cx = Math.floor(
          ((mapState.baseLng + 180) / 360) * Math.pow(2, mapState.zoom),
        );
        const cy = Math.floor(
          ((1 -
            Math.log(
              Math.tan((mapState.baseLat * Math.PI) / 180) +
                1 / Math.cos((mapState.baseLat * Math.PI) / 180),
            ) /
              Math.PI) /
            2) *
            Math.pow(2, mapState.zoom),
        );

        const colorCanvas = document.createElement("canvas");
        colorCanvas.width = colorCanvas.height = CANVAS_SIZE;
        const colorCtx = colorCanvas.getContext("2d");

        const elevCanvas = document.createElement("canvas");
        elevCanvas.width = elevCanvas.height = CANVAS_SIZE;
        const elevCtx = elevCanvas.getContext("2d");

        const tiles = [];
        for (let x = -TILE_RADIUS; x <= TILE_RADIUS; x++) {
          for (let y = -TILE_RADIUS; y <= TILE_RADIUS; y++) {
            tiles.push({ x, y });
          }
        }

        let loaded = 0;
        const totalTiles = tiles.length * 2;

        const tilePromises = tiles.map(({ x, y }) => {
          const colorTile = normalizeTileXY(cx + x, cy + y, mapState.zoom);
          const elevZoom = Math.min(ELEVATION_TILE_MAX_ZOOM, mapState.zoom);
          const elevScale = Math.pow(2, mapState.zoom - elevZoom);
          const elevTile = normalizeTileXY(
            Math.floor((cx + x) / elevScale),
            Math.floor((cy + y) / elevScale),
            elevZoom,
          );
          const drawX = (x + TILE_RADIUS) * TILE_SIZE;
          const drawY = (y + TILE_RADIUS) * TILE_SIZE;

          const colorPromise = new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${mapState.zoom}/${colorTile.y}/${colorTile.x}`;
            img.onload = () => {
              colorCtx.drawImage(img, drawX, drawY);
              loaded++;
              showLoadingProgress(
                (loaded / totalTiles) * 50,
                "위성 이미지 로딩...",
              );
              resolve();
            };
            img.onerror = () => {
              loaded++;
              showLoadingProgress(
                (loaded / totalTiles) * 50,
                "위성 이미지 로딩...",
              );
              resolve();
            };
          });

          const elevPromise = new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = `https://s3.amazonaws.com/elevation-tiles-prod/terrarium/${elevZoom}/${elevTile.x}/${elevTile.y}.png`;
            img.onload = () => {
              elevCtx.drawImage(img, drawX, drawY);
              loaded++;
              showLoadingProgress(
                50 + (loaded / totalTiles) * 50,
                "고도 데이터 로딩...",
              );
              resolve();
            };
            img.onerror = () => {
              loaded++;
              showLoadingProgress(
                50 + (loaded / totalTiles) * 50,
                "고도 데이터 로딩...",
              );
              resolve();
            };
          });

          return Promise.all([colorPromise, elevPromise]);
        });

        await Promise.all(tilePromises);
        showLoadingProgress(1, "지형 생성 중...");

        const elevData = elevCtx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        const elevations = new Float32Array(CANVAS_SIZE * CANVAS_SIZE);
        let minElev = Infinity,
          maxElev = -Infinity;

        for (let i = 0; i < elevData.data.length; i += 4) {
          const r = elevData.data[i];
          const g = elevData.data[i + 1];
          const b = elevData.data[i + 2];
          const elev = r * 256 + g + b / 256 - 32768;
          elevations[i / 4] = elev;
          if (elev < minElev) minElev = elev;
          if (elev > maxElev) maxElev = elev;
        }

        const dispCanvas = document.createElement("canvas");
        dispCanvas.width = dispCanvas.height = CANVAS_SIZE;
        const dispCtx = dispCanvas.getContext("2d");
        const dispData = dispCtx.createImageData(CANVAS_SIZE, CANVAS_SIZE);

        for (let i = 0; i < elevations.length; i++) {
          const elev = elevations[i];
          const normalizedElev = Math.max(
            0,
            Math.min(255, ((elev + 500) / 1500) * 255),
          );

          const px = i % CANVAS_SIZE;
          const py = Math.floor(i / CANVAS_SIZE);
          const fadeMargin = 200;
          const distToEdgeX = Math.min(px, CANVAS_SIZE - 1 - px);
          const distToEdgeY = Math.min(py, CANVAS_SIZE - 1 - py);
          let fadeFactor =
            Math.min(distToEdgeX / fadeMargin, 1.0) *
            Math.min(distToEdgeY / fadeMargin, 1.0);
          fadeFactor = fadeFactor * fadeFactor * (3 - 2 * fadeFactor);

          const val = normalizedElev * fadeFactor;
          dispData.data[i * 4] = val;
          dispData.data[i * 4 + 1] = val;
          dispData.data[i * 4 + 2] = val;
          dispData.data[i * 4 + 3] = 255;
        }
        dispCtx.putImageData(dispData, 0, 0);

        // 지도 전체 표시 (투명도 처리 없음)

        const lonMin =
          ((cx - TILE_RADIUS) / Math.pow(2, mapState.zoom)) * 360 - 180;
        const lonMax =
          ((cx + TILE_RADIUS + 1) / Math.pow(2, mapState.zoom)) * 360 - 180;
        const nMin =
          Math.PI -
          (2 * Math.PI * (cy - TILE_RADIUS)) / Math.pow(2, mapState.zoom);
        const latMax =
          (180 / Math.PI) * Math.atan(0.5 * (Math.exp(nMin) - Math.exp(-nMin)));
        const nMax =
          Math.PI -
          (2 * Math.PI * (cy + TILE_RADIUS + 1)) / Math.pow(2, mapState.zoom);
        const latMin =
          (180 / Math.PI) * Math.atan(0.5 * (Math.exp(nMax) - Math.exp(-nMax)));

        const planeWidth = (lonMax - lonMin) / mapState.scale;
        const planeHeight = (latMax - latMin) / mapState.scale;

        const offsetX =
          ((lonMin + lonMax) / 2 - mapState.baseLng) / mapState.scale;
        const offsetZ =
          (mapState.baseLat - (latMin + latMax) / 2) / mapState.scale;

        const geo = new THREE.PlaneGeometry(planeWidth, planeHeight, 512, 512);
        const terrainTexture = createSharpCanvasTexture(colorCanvas);
        const terrain = new THREE.Mesh(
          geo,
          new THREE.MeshBasicMaterial({
            map: terrainTexture,
            transparent: true,
            opacity: 0.6,
            depthWrite: false,
            depthTest: true,
          }),
        );

        terrain.rotation.x = -Math.PI / 2;
        terrain.position.set(offsetX, 0, offsetZ); // 정확한 지도 위치에 배치
        terrain.frustumCulled = false;
        scene.add(terrain);

        console.log("Terrain positioned at:", offsetX, offsetZ);

        terrain.updateMatrixWorld(true);
        ["controlCenter", "sensorNode"].forEach((type) => {
          state.objects
            .filter((o) => o.type === type)
            .forEach((obj) => {
              if (obj.virtualSystem) {
                obj.position.y = 0;
                return;
              }
              const u = (obj.position.x - offsetX) / planeWidth + 0.5;
              const v = (obj.position.z - offsetZ) / planeHeight + 0.5;
              if (u >= 0 && u <= 1 && v >= 0 && v <= 1) {
                const elevIdx =
                  Math.floor(v * (CANVAS_SIZE - 1)) * CANVAS_SIZE +
                  Math.floor(u * (CANVAS_SIZE - 1));
                const elevValue = elevations[elevIdx] || 0;
                obj.position.y =
                  elevValue + (obj.type === "controlCenter" ? 10 : 0);
              } else {
                obj.position.y = obj.type === "controlCenter" ? 10 : -190;
              }
            });
        });

        // 초기 타일 기록
        for (let x = -TILE_RADIUS; x <= TILE_RADIUS; x++) {
          for (let y = -TILE_RADIUS; y <= TILE_RADIUS; y++) {
            mapState.loadedTiles.add(`${cx + x},${cy + y},${mapState.zoom}`);
          }
        }

        hideLoadingOverlay();
      }

      // 동적 타일 로딩 함수
      async function loadDynamicTiles() {
        if (mapState.isLoadingTiles) return;

        // 카메라 위치 기반 필요 타일 계산
        const curLat = mapState.baseLat - controls.target.z * mapState.scale;
        const curLng = mapState.baseLng + controls.target.x * mapState.scale;

        const cx = Math.floor(
          ((curLng + 180) / 360) * Math.pow(2, mapState.zoom),
        );
        const cy = Math.floor(
          ((1 -
            Math.log(
              Math.tan((curLat * Math.PI) / 180) +
                1 / Math.cos((curLat * Math.PI) / 180),
            ) /
              Math.PI) /
            2) *
            Math.pow(2, mapState.zoom),
        );

        // 카메라 이동 거리 확인 (과도한 업데이트 방지)
        const camDist = Math.hypot(
          controls.target.x - mapState.lastCameraPos.x,
          controls.target.z - mapState.lastCameraPos.z,
        );
        if (camDist < 10) return; // 10 단위 이상 이동할 때만 업데이트

        mapState.lastCameraPos = { x: controls.target.x, z: controls.target.z };

        const tilesToLoad = [];
        for (let x = -mapState.tileRadius; x <= mapState.tileRadius; x++) {
          for (let y = -mapState.tileRadius; y <= mapState.tileRadius; y++) {
            const tileKey = `${cx + x},${cy + y},${mapState.zoom}`;
            if (!mapState.loadedTiles.has(tileKey)) {
              tilesToLoad.push({ x: cx + x, y: cy + y });
            }
          }
        }

        if (tilesToLoad.length === 0) return;

        mapState.isLoadingTiles = true;

        // 비동기로 타일 로드 (UI 블로킹 방지)
        await Promise.all(
          tilesToLoad.map((tile) =>
            loadSingleTile(tile.x, tile.y, mapState.zoom),
          ),
        );

        mapState.isLoadingTiles = false;
      }

      // 단일 타일 로드 함수
      async function loadSingleTile(tileX, tileY, zoom) {
        const TILE_SIZE = 256;
        const normalizedColor = normalizeTileXY(tileX, tileY, zoom);
        const elevZoom = Math.min(ELEVATION_TILE_MAX_ZOOM, zoom);
        const elevScale = Math.pow(2, zoom - elevZoom);
        const normalizedElev = normalizeTileXY(
          Math.floor(tileX / elevScale),
          Math.floor(tileY / elevScale),
          elevZoom,
        );
        const tileKey = `${normalizedColor.x},${normalizedColor.y},${zoom}`;

        return new Promise(async (resolve) => {
          try {
            const colorCanvas = document.createElement("canvas");
            colorCanvas.width = colorCanvas.height = TILE_SIZE;
            const colorCtx = colorCanvas.getContext("2d");

            const elevCanvas = document.createElement("canvas");
            elevCanvas.width = elevCanvas.height = TILE_SIZE;
            const elevCtx = elevCanvas.getContext("2d");

            // 위성 이미지 로드
            const colorImg = await new Promise((res) => {
              const img = new Image();
              img.crossOrigin = "Anonymous";
              img.src = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${normalizedColor.y}/${normalizedColor.x}`;
              img.onload = () => {
                colorCtx.drawImage(img, 0, 0);
                res(true);
              };
              img.onerror = () => res(false);
            });

            // 고도 데이터 로드
            const elevImg = await new Promise((res) => {
              const img = new Image();
              img.crossOrigin = "Anonymous";
              img.src = `https://s3.amazonaws.com/elevation-tiles-prod/terrarium/${elevZoom}/${normalizedElev.x}/${normalizedElev.y}.png`;
              img.onload = () => {
                elevCtx.drawImage(img, 0, 0);
                res(true);
              };
              img.onerror = () => res(false);
            });

            // 고도 데이터 처리
            const elevData = elevCtx.getImageData(0, 0, TILE_SIZE, TILE_SIZE);
            const elevations = new Float32Array(TILE_SIZE * TILE_SIZE);
            for (let i = 0; i < elevData.data.length; i += 4) {
              const r = elevData.data[i];
              const g = elevData.data[i + 1];
              const b = elevData.data[i + 2];
              elevations[i / 4] = r * 256 + g + b / 256 - 32768;
            }

            // 3D 메시 생성
            const lonMin = (normalizedColor.x / Math.pow(2, zoom)) * 360 - 180;
            const lonMax =
              ((normalizedColor.x + 1) / Math.pow(2, zoom)) * 360 - 180;
            const nMin =
              Math.PI - (2 * Math.PI * normalizedColor.y) / Math.pow(2, zoom);
            const latMax =
              (180 / Math.PI) *
              Math.atan(0.5 * (Math.exp(nMin) - Math.exp(-nMin)));
            const nMax =
              Math.PI -
              (2 * Math.PI * (normalizedColor.y + 1)) / Math.pow(2, zoom);
            const latMin =
              (180 / Math.PI) *
              Math.atan(0.5 * (Math.exp(nMax) - Math.exp(-nMax)));

            const planeWidth = (lonMax - lonMin) / mapState.scale;
            const planeHeight = (latMax - latMin) / mapState.scale;
            const offsetX =
              ((lonMin + lonMax) / 2 - mapState.baseLng) / mapState.scale;
            const offsetZ =
              (mapState.baseLat - (latMin + latMax) / 2) / mapState.scale;

            const geo = new THREE.PlaneGeometry(
              planeWidth,
              planeHeight,
              64,
              64,
            );
            const tileTexture = createSharpCanvasTexture(colorCanvas);
            const mesh = new THREE.Mesh(
              geo,
              new THREE.MeshBasicMaterial({
                map: tileTexture,
                transparent: true,
                opacity: 0.6,
                depthWrite: false,
                depthTest: true,
              }),
            );

            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(offsetX, 0, offsetZ);
            mesh.frustumCulled = false;
            scene.add(mesh);

            // 캐시 저장
            mapState.terrainMeshes[tileKey] = { mesh, elevations };
            mapState.loadedTiles.add(tileKey);
          } catch (err) {
            console.warn(`Failed to load tile ${tileKey}:`, err);
          }
          resolve();
        });
      }

      function buildDeviceModel(type, mainColorHex) {
        const group = new THREE.Group();
        let meshOffset = 0;

        const mainMat = new THREE.MeshStandardMaterial({
          color: mainColorHex,
          roughness: 0.6,
          metalness: 0.3,
        });
        const darkMat = new THREE.MeshStandardMaterial({
          color: 0x333333,
          roughness: 0.8,
        });
        const whiteMat = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          roughness: 0.5,
        });
        const glassMat = new THREE.MeshStandardMaterial({
          color: 0x112233,
          roughness: 0.1,
          metalness: 0.8,
        });

        if (type === "ship") {
          meshOffset = 2;
          const hull = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 20), mainMat);
          hull.position.y = 1;
          const bowGeo = new THREE.CylinderGeometry(0, 4.24, 6, 4);
          bowGeo.rotateY(Math.PI / 4);
          bowGeo.rotateX(Math.PI / 2);
          const bow = new THREE.Mesh(bowGeo, mainMat);
          bow.position.set(0, 1, 13);
          const bridge = new THREE.Mesh(
            new THREE.BoxGeometry(5, 6, 6),
            whiteMat,
          );
          bridge.position.set(0, 7, -3);
          const mast = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.2, 8),
            darkMat,
          );
          mast.position.set(0, 14, -3);
          group.add(hull, bow, bridge, mast);
        } else if (type === "usv") {
          meshOffset = 1;
          const hull = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 8), mainMat);
          const mast = new THREE.Mesh(
            new THREE.CylinderGeometry(0.1, 0.1, 3),
            darkMat,
          );
          mast.position.set(0, 2.5, -1);
          group.add(hull, mast);
        } else if (type === "drone") {
          meshOffset = 0;
          const body = new THREE.Mesh(
            new THREE.CylinderGeometry(1.5, 1.5, 1, 8),
            mainMat,
          );
          const arm1 = new THREE.Mesh(
            new THREE.BoxGeometry(0.4, 0.4, 8),
            darkMat,
          );
          const arm2 = new THREE.Mesh(
            new THREE.BoxGeometry(8, 0.4, 0.4),
            darkMat,
          );
          const rGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.1, 16);
          const rMat = new THREE.MeshStandardMaterial({
            color: 0xaaaaaa,
            transparent: true,
            opacity: 0.5,
          });
          const r1 = new THREE.Mesh(rGeo, rMat);
          r1.position.set(0, 0.3, 4);
          const r2 = new THREE.Mesh(rGeo, rMat);
          r2.position.set(0, 0.3, -4);
          const r3 = new THREE.Mesh(rGeo, rMat);
          r3.position.set(4, 0.3, 0);
          const r4 = new THREE.Mesh(rGeo, rMat);
          r4.position.set(-4, 0.3, 0);
          group.add(body, arm1, arm2, r1, r2, r3, r4);
        } else if (type === "rov") {
          meshOffset = 0;
          const frame = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 5), mainMat);
          const light = new THREE.Mesh(
            new THREE.CylinderGeometry(0.5, 0.5, 0.5),
            whiteMat,
          );
          light.rotateX(Math.PI / 2);
          light.position.set(0, 0, 2.5);
          const t1 = new THREE.Mesh(
            new THREE.CylinderGeometry(0.6, 0.6, 2),
            darkMat,
          );
          t1.rotateX(Math.PI / 2);
          t1.position.set(-2.5, 0, -1);
          const t2 = new THREE.Mesh(
            new THREE.CylinderGeometry(0.6, 0.6, 2),
            darkMat,
          );
          t2.rotateX(Math.PI / 2);
          t2.position.set(2.5, 0, -1);
          group.add(frame, light, t1, t2);
        } else if (type === "auv") {
          meshOffset = 0;
          const body = new THREE.Mesh(
            new THREE.CylinderGeometry(1.2, 1.2, 10, 16),
            mainMat,
          );
          body.rotateX(Math.PI / 2);
          const nose = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 16, 16),
            mainMat,
          );
          nose.position.set(0, 0, 5);
          const tail = new THREE.Mesh(
            new THREE.ConeGeometry(1.2, 3, 16),
            mainMat,
          );
          tail.rotateX(-Math.PI / 2);
          tail.position.set(0, 0, -6.5);
          const f1 = new THREE.Mesh(
            new THREE.BoxGeometry(0.2, 4, 1.5),
            darkMat,
          );
          f1.position.set(0, 0, -6);
          const f2 = new THREE.Mesh(
            new THREE.BoxGeometry(4, 0.2, 1.5),
            darkMat,
          );
          f2.position.set(0, 0, -6);
          group.add(body, nose, tail, f1, f2);
        } else if (type === "glider") {
          meshOffset = 0;
          const body = new THREE.Mesh(
            new THREE.CylinderGeometry(0.8, 0.8, 8, 16),
            mainMat,
          );
          body.rotateX(Math.PI / 2);
          const wing = new THREE.Mesh(
            new THREE.BoxGeometry(10, 0.2, 2),
            darkMat,
          );
          group.add(body, wing);
        } else if (type === "submarine") {
          meshOffset = 0;
          const body = new THREE.Mesh(
            new THREE.CylinderGeometry(3, 3, 25, 16),
            darkMat,
          );
          body.rotateX(Math.PI / 2);
          const sail = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 4), mainMat);
          sail.position.set(0, 3.5, 5);
          group.add(body, sail);
        } else if (type === "commBuoy") {
          meshOffset = 1;
          const base = new THREE.Mesh(
            new THREE.CylinderGeometry(1.5, 1.5, 2, 16),
            mainMat,
          );
          const antenna = new THREE.Mesh(
            new THREE.CylinderGeometry(0.1, 0.1, 5),
            darkMat,
          );
          antenna.position.y = 3.5;
          group.add(base, antenna);
        } else if (type === "powerTower") {
          meshOffset = 2;
          const platform = new THREE.Mesh(
            new THREE.BoxGeometry(10, 4, 10),
            mainMat,
          );
          const pillar = new THREE.Mesh(
            new THREE.CylinderGeometry(1, 1, 15),
            whiteMat,
          );
          pillar.position.y = 9.5;
          group.add(platform, pillar);
        } else if (type === "sensorNode") {
          meshOffset = -0.5;
          const base = new THREE.Mesh(new THREE.BoxGeometry(5, 1, 5), darkMat);
          const dome = new THREE.Mesh(
            new THREE.SphereGeometry(2, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2),
            mainMat,
          );
          dome.position.y = 0.5;
          group.add(base, dome);
        } else if (type === "controlCenter") {
          meshOffset = 10;
          const b1 = new THREE.Mesh(new THREE.BoxGeometry(20, 20, 25), mainMat);
          const b2 = new THREE.Mesh(
            new THREE.BoxGeometry(12, 35, 12),
            whiteMat,
          );
          b2.position.set(-6, 7.5, -12);
          const rd = new THREE.Mesh(
            new THREE.SphereGeometry(6, 16, 16),
            whiteMat,
          );
          rd.position.set(-6, 28, -12);
          const w = new THREE.Mesh(new THREE.BoxGeometry(15, 6, 26), glassMat);
          w.position.set(-3, 4, 0);
          group.add(b1, b2, rd, w);
        } else {
          const defaultMesh = new THREE.Mesh(
            new THREE.BoxGeometry(5, 5, 5),
            mainMat,
          );
          group.add(defaultMesh);
        }

        group.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        return { group, meshOffset };
      }

      function initObjects() {
        getRenderableObjects().forEach((data) => {
          const { group, meshOffset } = buildDeviceModel(
            data.type,
            COLORS[data.type] || 0xaaaaaa,
          );
          const modelScale = data.virtualSystem
            ? DEVICE_MODEL_SCALE * VIRTUAL_SYSTEM_SCALE_MULTIPLIER
            : DEVICE_MODEL_SCALE;
          const scaledMeshOffset = meshOffset * modelScale;
          group.scale.setScalar(modelScale);
          group.position.set(
            data.position.x,
            data.position.y + scaledMeshOffset,
            data.position.z,
          );
          group.rotation.y = THREE.MathUtils.degToRad(-data.heading);
          group.userData = { id: data.id, isObject: true };
          scene.add(group);

          group.traverse((child) => {
            if (child.isMesh) child.userData = { id: data.id, isObject: true };
          });

          const labelEl = document.createElement("div");
          labelEl.className = "object-label";
          labelEl.innerText = data.name;
          document.getElementById("labels-container").appendChild(labelEl);

          Object.assign(data, {
            mesh: group,
            meshOffset: scaledMeshOffset,
            labelEl: labelEl,
            hasAlert: false,
            motionHistory: [],
            lastTrailSampleAt: 0,
            trailLine: null,
            trailPositions: null,
          });

          ensureObjectTrail(data);
        });

        getRenderableObjects().forEach((obj) => {
          if (obj.tetherTarget) {
            const lineMat = new THREE.LineDashedMaterial({
              color: 0x94a3b8,
              dashSize: TETHER_DASH_SIZE,
              gapSize: TETHER_GAP_SIZE,
              transparent: true,
              opacity: 0.75,
            });
            const line = new THREE.Line(
              new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(),
                new THREE.Vector3(),
              ]),
              lineMat,
            );
            scene.add(line);
            state.tethers.push({
              source: obj.id,
              target: obj.tetherTarget,
              line: line,
            });
          }
        });

        state.links.forEach((link) => {
          const lineMat = new THREE.LineDashedMaterial({
            color: COLORS[link.type],
            dashSize: LINK_DASH_SIZE,
            gapSize: LINK_GAP_SIZE,
            transparent: true,
            opacity: 0.45,
            blending: THREE.AdditiveBlending,
          });
          const lineGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(),
            new THREE.Vector3(),
          ]);
          const lineMesh = new THREE.Line(lineGeo, lineMat);
          lineMesh.userData = { id: link.id, isLink: true };
          scene.add(lineMesh);

          const packetGeo = new THREE.CylinderGeometry(
            LINK_PACKET_RADIUS,
            LINK_PACKET_RADIUS,
            LINK_PACKET_LENGTH,
            8,
          );
          packetGeo.rotateX(Math.PI / 2);

          const particles = [];
          const numPackets = LINK_PACKET_COUNT;
          for (let i = 0; i < numPackets; i++) {
            const packetMat = new THREE.MeshBasicMaterial({
              color: 0xffffff,
              transparent: true,
              opacity: 0.75,
              blending: THREE.AdditiveBlending,
            });
            const pMesh = new THREE.Mesh(packetGeo, packetMat);
            scene.add(pMesh);
            particles.push({ mesh: pMesh, progress: i * (1.0 / numPackets) });
          }

          link.mesh = lineMesh;
          link.particles = particles;
        });
      }

      function updateSimulation(delta) {
        const time = state.time;
        const simDelta = delta;
        refreshLinkStatuses();

        getRenderableObjects().forEach((obj) => {
          if (["controlCenter", "sensorNode"].includes(obj.type)) {
            if (obj.virtualSystem) {
              obj.mesh.position.set(obj.position.x, 0, obj.position.z);
            } else {
              obj.mesh.position.set(
                obj.position.x,
                obj.position.y + obj.meshOffset,
                obj.position.z,
              );
            }
          } else if (["powerTower", "commBuoy"].includes(obj.type)) {
            obj.mesh.position.set(
              obj.position.x,
              0 + obj.meshOffset,
              obj.position.z,
            );
          } else if (
            ["ship", "auv", "submarine", "glider"].includes(obj.type)
          ) {
            if (!isFreshRealtime(obj)) {
              const rad = THREE.MathUtils.degToRad(-obj.heading);
              const moveSpd = obj.speed * simDelta * 0.1;
              obj.position.x += Math.sin(rad) * moveSpd;
              obj.position.z += Math.cos(rad) * moveSpd;

              if (
                Math.abs(obj.position.x) > 300 ||
                Math.abs(obj.position.z) > 300
              ) {
                obj.heading = (obj.heading + 180) % 360;
              }
            }
            let yOffset = 0;
            if (["submarine", "glider"].includes(obj.type))
              yOffset = Math.sin(time + obj.position.x) * 2;
            obj.mesh.position.set(
              obj.position.x,
              obj.position.y + obj.meshOffset + yOffset,
              obj.position.z,
            );
            obj.mesh.rotation.y = THREE.MathUtils.degToRad(-obj.heading || 0);
          } else if (["drone", "usv"].includes(obj.type)) {
            if (!isFreshRealtime(obj) && obj.hoverCenter) {
              const radius = 50;
              obj.position.x =
                obj.hoverCenter.x + Math.sin(time * 0.2) * radius;
              obj.position.z =
                obj.hoverCenter.z + Math.cos(time * 0.2) * radius;
              const dx =
                Math.sin(time * 0.2 + 0.1) * radius -
                Math.sin(time * 0.2) * radius;
              const dz =
                Math.cos(time * 0.2 + 0.1) * radius -
                Math.cos(time * 0.2) * radius;
              obj.heading = THREE.MathUtils.radToDeg(Math.atan2(-dx, -dz));
            }
            if (!isFreshRealtime(obj) && obj.type === "drone")
              obj.position.y = 40 + Math.sin(time * 3) * 2;
            obj.mesh.position.set(
              obj.position.x,
              obj.position.y + obj.meshOffset,
              obj.position.z,
            );
            obj.mesh.rotation.y = THREE.MathUtils.degToRad(-obj.heading || 0);
          } else {
            obj.mesh.position.set(
              obj.position.x,
              obj.position.y + obj.meshOffset,
              obj.position.z,
            );
          }

          obj.mesh.visible = obj.position.y >= state.depthFilter;
          obj.labelEl.style.display =
            state.showLabels && obj.mesh.visible ? "block" : "none";

          const now = Date.now();
          recordMotionSample(obj, now);
          updateObjectTrail(obj);

          const isSelected = obj.id === state.selectedId;
          let targetEmissive = 0x000000;
          let targetIntensity = 0;

          if (obj.hasAlert) {
            targetEmissive = COLORS.alert_critical;
            targetIntensity = Math.sin(time * 8) * 0.5 + 0.5;
          } else if (isSelected || obj.id === state.hoveredId) {
            targetEmissive = 0xffffff;
            targetIntensity = isSelected ? 0.5 : 0.2;
          }

          obj.mesh.traverse((child) => {
            if (child.isMesh && child.material) {
              child.material.emissive.setHex(targetEmissive);
              child.material.emissiveIntensity = targetIntensity;
            }
          });
        });

        state.tethers.forEach((t) => {
          const s = findRenderableObjectById(t.source),
            tgt = findRenderableObjectById(t.target);
          if (s && tgt) {
            const pos = t.line.geometry.attributes.position.array;
            pos[0] = s.mesh.position.x;
            pos[1] = s.mesh.position.y;
            pos[2] = s.mesh.position.z;
            pos[3] = tgt.mesh.position.x;
            pos[4] = tgt.mesh.position.y;
            pos[5] = tgt.mesh.position.z;
            t.line.geometry.attributes.position.needsUpdate = true;
            t.line.computeLineDistances();
            t.line.visible = s.mesh.visible && tgt.mesh.visible;
          }
        });

        state.links.forEach((link) => {
          // 동적으로 추가된 링크(A2A 등)에 메쉬가 없으면 lazily 생성
          if (!link.mesh) {
            const linkColor = COLORS[link.type] || COLORS["link_rf"];
            const lineMat = new THREE.LineDashedMaterial({
              color: linkColor,
              dashSize: LINK_DASH_SIZE,
              gapSize: LINK_GAP_SIZE,
              transparent: true,
              opacity: 0.45,
              blending: THREE.AdditiveBlending,
            });
            const lineGeo = new THREE.BufferGeometry().setFromPoints([
              new THREE.Vector3(),
              new THREE.Vector3(),
            ]);
            const lineMesh = new THREE.Line(lineGeo, lineMat);
            lineMesh.userData = { id: link.id, isLink: true };
            scene.add(lineMesh);

            const packetGeo = new THREE.CylinderGeometry(
              LINK_PACKET_RADIUS,
              LINK_PACKET_RADIUS,
              LINK_PACKET_LENGTH,
              8,
            );
            packetGeo.rotateX(Math.PI / 2);
            const particles = [];
            for (let i = 0; i < LINK_PACKET_COUNT; i++) {
              const packetMat = new THREE.MeshBasicMaterial({
                color: linkColor,
                transparent: true,
                opacity: 0.75,
                blending: THREE.AdditiveBlending,
              });
              const pMesh = new THREE.Mesh(packetGeo, packetMat);
              scene.add(pMesh);
              particles.push({
                mesh: pMesh,
                progress: i * (1.0 / LINK_PACKET_COUNT),
              });
            }
            link.mesh = lineMesh;
            link.particles = particles;
          }

          const sObj = findRenderableObjectById(link.source);
          const tObj = findRenderableObjectById(link.target);

          if (sObj && tObj) {
            const isVisible = sObj.mesh.visible && tObj.mesh.visible;
            link.mesh.visible = isVisible;

            const p1 = sObj.mesh.position.clone();
            const p2 = tObj.mesh.position.clone();

            if (sObj.type === "controlCenter") p1.y += 20;
            if (tObj.type === "controlCenter") p2.y += 20;
            if (sObj.type === "ship") p1.y += 10;
            if (tObj.type === "ship") p2.y += 10;

            const posAttr = link.mesh.geometry.attributes.position;
            posAttr.array[0] = p1.x;
            posAttr.array[1] = p1.y;
            posAttr.array[2] = p1.z;
            posAttr.array[3] = p2.x;
            posAttr.array[4] = p2.y;
            posAttr.array[5] = p2.z;
            posAttr.needsUpdate = true;

            link.mesh.computeLineDistances();

            const isSelected =
              link.id === state.selectedId || link.id === state.hoveredId;
            const flowScale =
              link.status === "active"
                ? 1
                : link.status === "degraded"
                  ? 0.35
                  : 0.08;
            link.mesh.material.opacity = isSelected
              ? 0.82
              : link.status === "active"
                ? 0.45
                : link.status === "degraded"
                  ? 0.28
                  : 0.14;

            link.mesh.material.dashOffset -= simDelta * 11 * flowScale;

            link.particles.forEach((p) => {
              p.mesh.visible =
                isVisible && link.status !== "down" && link.status !== "idle";
              p.progress += simDelta * 0.15 * flowScale;
              if (p.progress > 1.0) p.progress = 0;

              p.mesh.position.lerpVectors(p1, p2, p.progress);
              p.mesh.lookAt(p2);

              p.mesh.material.color.setHex(
                isSelected ? 0xffffff : COLORS[link.type],
              );

              const scaleBase = isSelected ? 0.9 : 0.45;
              p.mesh.scale.set(
                scaleBase,
                scaleBase,
                scaleBase + Math.sin(time * 10) * 0.12,
              );
            });
          }
        });

        if (state.showLabels) {
          getRenderableObjects().forEach((obj) => {
            if (!obj.mesh.visible) return;

            const moved5sMeters = computeMotionDistanceMeters(
              obj,
              MOTION_WINDOW_MS,
            );
            const moveColor =
              moved5sMeters >= 3
                ? "#fbbf24"
                : moved5sMeters >= 0.5
                  ? "#22d3ee"
                  : "#94a3b8";
            const rtAgeSec = obj.lastRealtimeAt
              ? (Date.now() - obj.lastRealtimeAt) / 1000
              : null;
            const freshness =
              rtAgeSec === null
                ? "NO RT"
                : rtAgeSec <= REALTIME_FRESH_WINDOW_MS / 1000
                  ? "LIVE"
                  : `STALE ${rtAgeSec.toFixed(1)}s`;
            const speedKn = Number(obj.speed || 0).toFixed(1);
            obj.labelEl.innerHTML = `${obj.name}<br><span style="font-size:0.68rem; color:${moveColor};">Δ5s ${moved5sMeters.toFixed(1)}m ${headingToArrow(obj.heading)} ${speedKn}kn ${freshness}</span>`;

            const pos = obj.mesh.position.clone();
            pos.y += obj.type === "drone" ? 5 : 8;
            pos.project(camera);
            if (pos.z > 1) {
              obj.labelEl.style.display = "none";
              return;
            }
            obj.labelEl.style.left = `${(pos.x * 0.5 + 0.5) * window.innerWidth}px`;
            obj.labelEl.style.top = `${(pos.y * -0.5 + 0.5) * window.innerHeight}px`;
          });
        }

        if (camera.position.y < 0) {
          scene.background.setHex(ENV_COLORS.deepWater);
          scene.fog.color.setHex(ENV_COLORS.deepWater);
          scene.fog.density = 0.005;
        } else {
          scene.background.setHex(ENV_COLORS.sky);
          scene.fog.color.setHex(ENV_COLORS.sky);
          scene.fog.density = 0.002;
        }

        controls.update();
      }

      function initMap() {
        mapState.map = L.map("minimap", {
          zoomControl: false,
          attributionControl: false,
          dragging: false,
          touchZoom: false,
          doubleClickZoom: false,
          scrollWheelZoom: false,
          boxZoom: false,
          keyboard: false,
        }).setView([mapState.baseLat, mapState.baseLng], 15);

        mapState.currentTileLayer = L.tileLayer(
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          { maxZoom: 18 },
        ).addTo(mapState.map);

        const createIcon = (c) =>
          L.divIcon({
            className: "custom-div-icon",
            html: `<div style="background-color:#${c.toString(16).padStart(6, "0")}; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.8);"></div>`,
            iconSize: [16, 16],
            iconAnchor: [8, 8],
          });

        getRenderableObjects().forEach((obj) => {
          const marker = L.marker(
            [
              mapState.baseLat - obj.position.z * mapState.scale,
              mapState.baseLng + obj.position.x * mapState.scale,
            ],
            { icon: createIcon(COLORS[obj.type] || 0xffffff) },
          ).addTo(mapState.map);
          marker.bindTooltip(obj.name, { direction: "top", offset: [0, -10] });
          marker.on("click", () => {
            uiManager.selectObject(obj.id);
            const t = findRenderableObjectById(obj.id);
            if (t) {
              camera.position
                .copy(t.mesh.position)
                .add(new THREE.Vector3(0, 20, 32));
              controls.target.copy(t.mesh.position);
            }
          });
          mapState.markers[obj.id] = marker;
        });

        state.links.forEach((link) => {
          const colorStr =
            "#" + COLORS[link.type].toString(16).padStart(6, "0");
          const polyline = L.polyline([], {
            color: colorStr,
            weight: 2,
            dashArray: "5, 5",
          }).addTo(mapState.map);
          mapState.lines[link.id] = polyline;
        });

        const panel = document.getElementById("minimap-panel");
        let isDragging = false,
          isRotating = false,
          lastX = 0,
          lastY = 0;

        panel.addEventListener("mousedown", (e) => {
          if (e.button === 0) isDragging = true;
          if (e.button === 2) isRotating = true;
          lastX = e.clientX;
          lastY = e.clientY;
        });

        window.addEventListener("mousemove", (e) => {
          if (!isDragging && !isRotating) return;
          const dx = e.clientX - lastX,
            dy = e.clientY - lastY;
          lastX = e.clientX;
          lastY = e.clientY;

          if (isRotating) {
            const angle = dx * 0.01,
              x = camera.position.x - controls.target.x,
              z = camera.position.z - controls.target.z;
            camera.position.x =
              controls.target.x + x * Math.cos(angle) - z * Math.sin(angle);
            camera.position.z =
              controls.target.z + x * Math.sin(angle) + z * Math.cos(angle);
            controls.update();
          }
          if (isDragging) {
            const f = new THREE.Vector3(0, 0, -1)
              .applyQuaternion(camera.quaternion)
              .setY(0)
              .normalize();
            const r = new THREE.Vector3(1, 0, 0)
              .applyQuaternion(camera.quaternion)
              .setY(0)
              .normalize();

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, target);
            const dist = camera.position.distanceTo(target || controls.target);

            const panSpeed = dist * 0.003;
            const move = new THREE.Vector3()
              .addScaledVector(r, -dx * panSpeed)
              .addScaledVector(f, dy * panSpeed);
            controls.target.add(move);
            camera.position.add(move);
            controls.update();
          }
        });
        window.addEventListener("mouseup", () => {
          isDragging = isRotating = false;
        });
        panel.addEventListener("wheel", (e) => {
          e.preventDefault();
          mapState.map.setZoom(
            mapState.map.getZoom() + (e.deltaY > 0 ? -1 : 1),
          );
        });
      }

      function updateMap() {
        if (!mapState.map) return;
        getRenderableObjects().forEach((obj) => {
          const marker = mapState.markers[obj.id];
          if (marker) {
            marker.setLatLng([
              mapState.baseLat - obj.position.z * mapState.scale,
              mapState.baseLng + obj.position.x * mapState.scale,
            ]);
            if (state.selectedId === obj.id) marker.openTooltip();
            else if (marker.isTooltipOpen()) marker.closeTooltip();
          }
        });

        state.links.forEach((link) => {
          // 동적으로 추가된 링크(A2A 등) lazily polyline 생성
          if (!mapState.lines[link.id] && mapState.map) {
            const colorStr =
              "#" +
              (COLORS[link.type] || COLORS["link_rf"])
                .toString(16)
                .padStart(6, "0");
            const polyline = L.polyline([], {
              color: colorStr,
              weight: 2,
              dashArray: "5, 5",
            }).addTo(mapState.map);
            mapState.lines[link.id] = polyline;
          }
          const polyline = mapState.lines[link.id];
          const sObj = findRenderableObjectById(link.source);
          const tObj = findRenderableObjectById(link.target);
          if (polyline && sObj && tObj) {
            const sLat = mapState.baseLat - sObj.position.z * mapState.scale;
            const sLng = mapState.baseLng + sObj.position.x * mapState.scale;
            const tLat = mapState.baseLat - tObj.position.z * mapState.scale;
            const tLng = mapState.baseLng + tObj.position.x * mapState.scale;
            polyline.setLatLngs([
              [sLat, sLng],
              [tLat, tLng],
            ]);

            if (link.id === state.selectedId)
              polyline.setStyle({ weight: 4, opacity: 1 });
            else polyline.setStyle({ weight: 2, opacity: 0.6 });
          }
        });

        mapState.map.setView(
          [
            mapState.baseLat - controls.target.z * mapState.scale,
            mapState.baseLng + controls.target.x * mapState.scale,
          ],
          mapState.map.getZoom(),
          { animate: false },
        );
        const camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);
        document.getElementById("minimap-container").style.transform =
          `rotate(${-Math.atan2(camDir.x, -camDir.z) * (180 / Math.PI)}deg)`;
      }

      const uiManager = {
        init: function () {
          // 헤더 호버 로직
          const header = document.getElementById("header");
          const trigger = document.getElementById("header-trigger");
          let hideTimer;
          trigger.addEventListener("mouseenter", () => {
            clearTimeout(hideTimer);
            header.classList.add("visible");
          });
          header.addEventListener("mouseenter", () => clearTimeout(hideTimer));
          header.addEventListener("mouseleave", () => {
            hideTimer = setTimeout(
              () => header.classList.remove("visible"),
              300,
            );
          });

          document
            .getElementById("map-style")
            .addEventListener("change", (e) => {
              if (mapState.currentTileLayer)
                mapState.map.removeLayer(mapState.currentTileLayer);
              let url =
                "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}";
              if (e.target.value === "dark")
                url =
                  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
              if (e.target.value === "ocean")
                url =
                  "https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}";
              mapState.currentTileLayer = L.tileLayer(url, {
                maxZoom: 18,
              }).addTo(mapState.map);
            });

          document
            .getElementById("depth-filter")
            .addEventListener("input", (e) => {
              state.depthFilter = parseInt(e.target.value);
              document.getElementById("depth-value").innerText =
                `${state.depthFilter}m ~ 0m 표시`;
            });
          this.renderStats();
          this.renderObjectList();
        },
        togglePanel: function (side) {
          const panel = document.getElementById(`${side}-panel`);
          if (panel) panel.classList.toggle("collapsed");
        },
        switchTab: function (tabName) {
          document
            .querySelectorAll(".tab-btn")
            .forEach((btn) => btn.classList.remove("active"));
          document
            .querySelectorAll(".tab-content")
            .forEach((content) => content.classList.remove("active"));
          const idx = ["objects", "links", "alerts"].indexOf(tabName);
          if (idx >= 0)
            document.querySelectorAll(".tab-btn")[idx].classList.add("active");
          document.getElementById(`tab-${tabName}`)?.classList.add("active");
          if (tabName === "links") this.renderLinkList();
        },
        selectObject: function (id) {
          state.selectedId = id;
          this.renderObjectList();
          this.renderSelectedDetail();
          const isLink = state.links.some(
            (link) => String(link.id) === String(id),
          );
          this.switchTab(isLink ? "links" : "objects");
        },
        openDeviceDetail: function (id) {
          const obj = findObjectById(id);
          if (!obj) return;
          sessionStorage.setItem("cowater.device.id", String(obj.id));
          sessionStorage.setItem("cowater.device.name", obj.name);
          sessionStorage.setItem("cowater.device.type", obj.type);
          sessionStorage.setItem(
            "cowater.device.registryId",
            String(obj.registryId ?? obj.id),
          );
          const params = new URLSearchParams({
            id: String(obj.id),
            name: String(obj.name || ""),
            type: String(obj.type || ""),
            registryId: String(obj.registryId ?? obj.id),
          });
          window.open(`device.html?${params.toString()}`, "_blank");
        },
        renderStats: function () {
          const types = {
            ship: 0,
            rov: 0,
            auv: 0,
            drone: 0,
            usv: 0,
            control_ship: 0,
          };
          const visibleDevices = getVisibleDeviceObjects();
          visibleDevices.forEach((o) => {
            if (types[o.type] !== undefined) types[o.type]++;
          });
          document.getElementById("stats-container").innerHTML =
            `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>활성 디바이스:</span> <strong>${visibleDevices.length}개</strong></div><div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>전체 디바이스:</span> <strong>${visibleDevices.length}개</strong></div><div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>통신 링크:</span> <strong>${state.links.length}개</strong></div><div style="font-size:0.85rem; color:#94a3b8; display:grid; grid-template-columns: 1fr 1fr;"><div>함정: ${types.ship}</div><div>드론/USV: ${types.drone + types.usv}</div><div>ROV: ${types.rov}</div><div>AUV: ${types.auv}</div></div><div style="margin-top:10px; color:${state.alerts.length > 0 ? "#f87171" : "#4ade80"}">발생 경보: ${state.alerts.length}건</div>`;
          document.getElementById("link-count").innerText = state.links.length;
        },
        renderObjectList: function () {
          let html = "";
          getSortedObjects().forEach((obj) => {
            const batteryText =
              obj.battery !== undefined ? Math.round(obj.battery) + "%" : "N/A";
            const statusClass =
              obj.connected === false
                ? "status-warning"
                : obj.hasAlert
                  ? "status-critical"
                  : "status-active";
            const statusText = obj.connected === false ? "OFF" : "●";
            html += `<div class="list-item ${obj.id === state.selectedId ? "selected" : ""}" onclick="uiManager.selectObject('${obj.id}')"><div class="title"><span>${obj.name}</span><span class="${statusClass}">${statusText}</span></div><div style="display:flex; justify-content:space-between; color:#94a3b8;"><span>Depth: ${Math.round(obj.position.y)}m</span><span>Bat: ${batteryText}</span></div></div>`;
          });
          document.getElementById("object-list-container").innerHTML =
            html ||
            '<div style="text-align:center; color:#64748b; padding:20px;">표시할 실제 디바이스가 없습니다.</div>';
          document.getElementById("obj-count").innerText =
            getVisibleDeviceObjects().length;
        },
        renderLinkList: function () {
          let html = "";
          state.links.forEach((link) => {
            const colorStr =
              "#" + COLORS[link.type].toString(16).padStart(6, "0");
            const statusText =
              link.status === "down"
                ? "링크 끊김"
                : link.status === "degraded"
                  ? "A2A 트래픽 감소"
                  : link.status === "active"
                    ? "A2A 메시지 수신중"
                    : "A2A 유휴";
            const statusColor =
              link.status === "down"
                ? "#f87171"
                : link.status === "degraded"
                  ? "#f59e0b"
                  : link.status === "active"
                    ? "#4ade80"
                    : "#94a3b8";
            const lastAge = link.lastMessageAt
              ? `${((Date.now() - link.lastMessageAt) / 1000).toFixed(1)}s 전`
              : "수신 없음";
            html += `<div class="list-item ${link.id === state.selectedId ? "selected" : ""}" style="border-left-color: ${colorStr}" onclick="uiManager.selectObject('${link.id}')"><div class="title"><span>🔗 ${link.name}</span></div><div style="font-size:0.75rem; color:${statusColor};">${statusText} · 누적 ${link.totalMessages || 0} msg · 최근 ${lastAge}</div></div>`;
          });
          document.getElementById("link-list-container").innerHTML =
            html ||
            '<div style="text-align:center; color:#64748b; padding:20px;">활성 통신 링크가 없습니다.</div>';
          document.getElementById("link-count").innerText = state.links.length;
        },
        renderSelectedDetail: function () {
          const objectDetailEl = document.getElementById("selected-detail");
          const linkDetailEl = document.getElementById("link-selected-detail");
          const obj = findObjectById(state.selectedId);
          const link = state.links.find((l) => l.id === state.selectedId);

          if (!obj && !link) {
            objectDetailEl.style.display = "none";
            if (linkDetailEl) linkDetailEl.style.display = "none";
            return;
          }

          if (obj) {
            objectDetailEl.style.display = "block";
            if (linkDetailEl) linkDetailEl.style.display = "none";
            const batteryText =
              obj.battery !== undefined ? obj.battery.toFixed(1) + "%" : "N/A";
            const statusClass =
              obj.connected === false
                ? "status-warning"
                : obj.hasAlert
                  ? "status-critical"
                  : "status-active";
            const statusText =
              obj.connected === false
                ? "오프라인"
                : obj.hasAlert
                  ? "위험 감지"
                  : "정상 작동";
            objectDetailEl.innerHTML = `<div style="background: rgba(15, 23, 42, 0.9); padding: 12px; border-radius: 6px; border: 1px solid #60a5fa;"><h4 style="margin-top:0; color:#60a5fa;">${obj.name}</h4><div style="font-size:0.85rem; display:grid; grid-template-columns: 100px 1fr; gap: 4px;"><span style="color:#94a3b8">타입:</span><span>${obj.type.toUpperCase()}</span><span style="color:#94a3b8">좌표:</span><span>(${obj.position.x.toFixed(1)}, ${obj.position.y.toFixed(1)}, ${obj.position.z.toFixed(1)})</span><span style="color:#94a3b8">속력:</span><span>${obj.speed} knots</span><span style="color:#94a3b8">헤딩:</span><span>${Math.round(obj.heading)}°</span><span style="color:#94a3b8">배터리:</span><span>${batteryText}</span><span style="color:#94a3b8">상태:</span><span class="${statusClass}">${statusText}</span></div><div style="margin-top:10px;"><button onclick="uiManager.openDeviceDetail('${obj.id}')" style="background:rgba(96,165,250,0.15);border:1px solid #60a5fa;color:#60a5fa;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;">📋 상세보기 →</button></div></div><hr>`;
          } else if (link) {
            objectDetailEl.style.display = "none";
            if (linkDetailEl) linkDetailEl.style.display = "block";
            const sObj = findObjectById(link.source);
            const tObj = findObjectById(link.target);
            const colorStr =
              "#" + COLORS[link.type].toString(16).padStart(6, "0");

            const packetList = Array.isArray(link.packets) ? link.packets : [];
            const packetHtml =
              packetList.length > 0
                ? packetList
                    .map((p) => `<div class="data-packet">${p}</div>`)
                    .join("")
                : '<div class="data-packet" style="color:#64748b;">아직 수신된 실시간 데이터가 없습니다.</div>';
            const lastSeen = link.lastMessageAt
              ? `${new Date(link.lastMessageAt).toLocaleTimeString()} (${((Date.now() - link.lastMessageAt) / 1000).toFixed(1)}s 전)`
              : "없음";

            if (!linkDetailEl) return;
            linkDetailEl.innerHTML = `
                        <div style="background: rgba(15, 23, 42, 0.9); padding: 12px; border-radius: 6px; border: 1px solid ${colorStr};">
                            <h4 style="margin-top:0; color:${colorStr};">📡 ${link.name}</h4>
                            <div style="font-size:0.85rem; margin-bottom: 10px;">
                                <span style="color:#94a3b8">연결: </span> <strong style="color:white">${sObj ? sObj.name : "Unknown"}</strong> ↔ <strong style="color:white">${tObj ? tObj.name : "Unknown"}</strong>
                            </div>
                            <div style="font-size:0.8rem; color:#cbd5e1; margin-bottom:8px;">상태: ${link.status || "idle"} · 누적 메시지: ${link.totalMessages || 0} · 최근 채널: ${link.lastChannel || "-"} · 마지막 수신: ${lastSeen}</div>
                            <div style="color:#94a3b8; font-size: 0.8rem; margin-bottom: 5px;">실시간 A2A 전송 데이터:</div>
                            <div style="background: #000; padding: 8px; border-radius: 4px; border: 1px solid #334155; max-height: 100px; overflow-y: auto;">
                                ${packetHtml}
                            </div>
                        </div><hr>
                    `;
          }
        },
        addAlert: function (alertData) {
          alertData.created_at =
            alertData.created_at || new Date().toISOString();
          alertData.status = alertData.status || "waiting";
          alertData.source_system = alertData.source_system || "3d_dashboard";
          if (!alertData.target_display_name && alertData.platformId) {
            const targetObj = findObjectById(alertData.platformId);
            if (targetObj) alertData.target_display_name = targetObj.name;
          }
          state.alerts.push(alertData);
          document.getElementById("alert-count").innerText =
            state.alerts.length;
          persistDashboardAlerts();
          const container = document.getElementById("alert-list-container");
          if (state.alerts.length === 1) container.innerHTML = "";
          const el = document.createElement("div");
          el.className = `list-item ${String(alertData.severity).toUpperCase() === "CRITICAL" ? "alert-critical" : "alert-warning"}`;
          el.innerHTML = `<div class="title"><span>${alertData.message}</span></div><div style="font-size:0.75rem; color:#94a3b8;">Time: ${new Date().toLocaleTimeString()} | Target: ${alertData.platformId}</div>`;
          el.onclick = () => {
            this.selectObject(alertData.platformId);
            const obj = findRenderableObjectById(alertData.platformId);
            if (obj) {
              controls.target.copy(obj.mesh.position);
              camera.position.set(
                obj.mesh.position.x,
                obj.mesh.position.y + 24,
                obj.mesh.position.z + 36,
              );
            }
          };
          container.insertBefore(el, container.firstChild);
          this.renderStats();
          if (state.selectedId === alertData.platformId)
            this.renderSelectedDetail();
        },
      };

      function onMouseMove(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const allIntersectables = [
          ...getRenderableObjects()
            .map((o) => o.mesh)
            .filter(Boolean),
          ...state.links.map((l) => l.mesh).filter(Boolean),
        ];
        const intersects = raycaster.intersectObjects(allIntersectables, true);

        const tooltip = document.getElementById("tooltip");
        if (intersects.length > 0) {
          document.body.style.cursor = "pointer";
          let hitObj = intersects[0].object;
          while (hitObj && !hitObj.userData.id) hitObj = hitObj.parent;

          if (hitObj) {
            state.hoveredId = hitObj.userData.id;
            const obj = findObjectById(state.hoveredId);
            const link = state.links.find((l) => l.id === state.hoveredId);

            tooltip.style.display = "block";
            tooltip.style.left = event.clientX + 15 + "px";
            tooltip.style.top = event.clientY + 15 + "px";

            if (obj) {
              tooltip.innerHTML = `<strong>${obj.name}</strong><br>Type: ${obj.type}<br>Depth: ${Math.round(obj.position.y)}m`;
            } else if (link) {
              tooltip.innerHTML = `<strong>🔗 ${link.name}</strong><br>데이터 스트림 확인하기 (Click)`;
            }
          }
        } else {
          document.body.style.cursor = "default";
          state.hoveredId = null;
          tooltip.style.display = "none";
        }
      }

      function onClick() {
        uiManager.selectObject(state.hoveredId || null);
      }

      window.addEventListener("keydown", (e) => {
        if (document.activeElement.tagName === "INPUT") return;
        const targetList = [...state.objects, ...state.links];
        const idx = targetList.findIndex((o) => o.id === state.selectedId);
        switch (e.key.toLowerCase()) {
          case "1":
            if (targetList.length > 0)
              uiManager.selectObject(
                targetList[(idx - 1 + targetList.length) % targetList.length]
                  .id,
              );
            break;
          case "2":
            if (targetList.length > 0)
              uiManager.selectObject(
                targetList[(idx + 1) % targetList.length].id,
              );
            break;
          case "f":
            if (state.selectedId) {
              const obj = findRenderableObjectById(state.selectedId);
              if (obj) {
                camera.position
                  .copy(obj.mesh.position)
                  .add(new THREE.Vector3(0, 20, 32));
                controls.target.copy(obj.mesh.position);
              }
            }
            break;
          case "l":
            state.showLabels = !state.showLabels;
            if (!state.showLabels)
              state.objects.forEach((o) => (o.labelEl.style.display = "none"));
            break;
          case "z":
            document.getElementById("depth-filter").value = -200;
            document
              .getElementById("depth-filter")
              .dispatchEvent(new Event("input"));
            break;
        }
      });

      const clock = new THREE.Clock();
      let tileUpdateCounter = 0;
      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        state.time += delta;
        updateSimulation(delta);
        if (Math.floor(state.time * 10) % 10 === 0 && state.selectedId)
          uiManager.renderSelectedDetail();
        updateMap();

        // 매 30프레임마다 동적 타일 로딩 확인 (성능 최적화)
        tileUpdateCounter++;
        if (tileUpdateCounter >= 30) {
          tileUpdateCounter = 0;
          loadDynamicTiles();
        }

        renderer.render(scene, camera);
      }

      window.onload = async () => {
        localStorage.removeItem(LOCAL_ALERTS_STORAGE_KEY);

        // Registry에서 디바이스 가져오기
        const registryDevices = await fetchDevicesFromRegistry();

        // 초기 지도 중심은 첫 번째 디바이스 위치를 사용
        applyInitialMapCenterFromFirstDevice(registryDevices);

        init3DEnvironment();

        if (registryDevices.length > 0) {
          state.objects = registryDevices.map(mapRegistryToScenario);
          // 링크는 실제 A2A 송수신(from/to) 관측 시에만 생성한다.
          state.links = [];
          ensureVirtualSystemObject();
          persistRegistryDevices(registryDevices);
          persistDeviceDirectory(registryDevices);
          state.usingRegistryData = true;
        } else {
          state.objects = [];
          state.links = [];
          persistDeviceDirectory([]);
          state.usingRegistryData = false;
        }

        initObjects();
        applyInitialCameraFocus();
        uiManager.init();
        initMap();

        // Moth telemetry 구독
        subscribeMothTelemetry();

        // 각 device의 track별 pub 스트림 구독
        if (registryDevices.length > 0) {
          subscribeDeviceTrackStreams(registryDevices);
        }

        animate();
      };
    </script>
  </body>
</html>
