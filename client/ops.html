<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>CoWater 운영 관제 - Mission Dashboard</title>
    <style>
      :root {
        --bg: #07101e;
        --surface: rgba(13, 22, 40, 0.92);
        --text: #e2e8f0;
        --accent: #60a5fa;
        --danger: #f87171;
        --ok: #4ade80;
        --warning: #fbbf24;
        --pending: #94a3b8;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: linear-gradient(180deg, #060e1c 0%, #0a1628 100%);
        color: var(--text);
        font-family: "Segoe UI", Inter, sans-serif;
        min-height: 100vh;
        font-size: 13px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        height: 56px;
        background: rgba(6, 14, 28, 0.98);
        border-bottom: 2px solid rgba(96, 165, 250, 0.2);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .logo-text {
        font-size: 18px;
        font-weight: 700;
        color: #60a5fa;
      }
      .nav {
        display: flex;
        gap: 16px;
      }
      .nav a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }
      .controls {
        display: flex;
        gap: 8px;
      }
      button {
        padding: 6px 14px;
        background: rgba(96, 165, 250, 0.1);
        border: 1px solid rgba(96, 165, 250, 0.3);
        color: var(--text);
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.2s;
      }
      button:hover {
        background: rgba(96, 165, 250, 0.2);
      }
      .health {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px 24px;
        flex-wrap: wrap;
        background: rgba(6, 14, 28, 0.5);
        border-bottom: 1px solid rgba(71, 85, 105, 0.2);
      }
      .pill {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        background: rgba(96, 165, 250, 0.1);
        color: var(--text);
        font-weight: 600;
        border: 1px solid rgba(96, 165, 250, 0.2);
      }
      .pill.online {
        color: var(--ok);
        background: rgba(74, 222, 128, 0.12);
        border-color: rgba(74, 222, 128, 0.3);
      }
      .pill.offline {
        color: var(--danger);
        background: rgba(248, 113, 113, 0.12);
        border-color: rgba(248, 113, 113, 0.3);
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
        padding: 12px 24px;
      }
      .stat {
        background: linear-gradient(
          135deg,
          rgba(96, 165, 250, 0.05),
          rgba(96, 165, 250, 0)
        );
        border: 1px solid rgba(96, 165, 250, 0.2);
        border-radius: 6px;
        padding: 14px;
        text-align: center;
      }
      .stat-label {
        font-size: 11px;
        color: #94a3b8;
        font-weight: 500;
      }
      .stat-value {
        font-size: 28px;
        font-weight: 800;
        margin-top: 6px;
        color: #60a5fa;
      }
      .content {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 12px 24px;
        height: calc(100vh - 360px);
      }
      .panel {
        background: linear-gradient(
          135deg,
          var(--surface),
          rgba(13, 22, 40, 0.5)
        );
        border: 1px solid rgba(96, 165, 250, 0.2);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-header {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(96, 165, 250, 0.2);
        font-weight: 700;
        background: rgba(96, 165, 250, 0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .panel-header-title {
        font-size: 13px;
      }
      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .card {
        padding: 10px;
        margin-bottom: 8px;
        background: rgba(96, 165, 250, 0.06);
        border-left: 3px solid var(--accent);
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .card:hover {
        background: rgba(96, 165, 250, 0.12);
        transform: translateX(2px);
      }
      .card-title {
        font-weight: 600;
        font-size: 12px;
      }
      .card-meta {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 3px;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 700;
        margin-right: 4px;
        text-transform: uppercase;
      }
      .badge-pending {
        background: rgba(148, 163, 184, 0.2);
        color: var(--pending);
      }
      .badge-inprogress {
        background: rgba(96, 165, 250, 0.2);
        color: #60a5fa;
      }
      .badge-completed {
        background: rgba(74, 222, 128, 0.2);
        color: var(--ok);
      }
      .badge-failed {
        background: rgba(248, 113, 113, 0.2);
        color: var(--danger);
      }
      .badge-critical {
        background: rgba(248, 113, 113, 0.2);
        color: var(--danger);
      }
      .badge-warning {
        background: rgba(251, 191, 36, 0.2);
        color: var(--warning);
      }
      .badge-ok {
        background: rgba(74, 222, 128, 0.2);
        color: var(--ok);
      }
      .empty {
        text-align: center;
        color: #64748b;
        padding: 24px;
      }
      .detail {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1000;
        width: 90%;
        max-width: 600px;
        max-height: 80vh;
        background: linear-gradient(
          135deg,
          var(--surface),
          rgba(13, 22, 40, 0.5)
        );
        border: 1px solid rgba(96, 165, 250, 0.3);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        flex-direction: column;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
      }
      .detail::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s, visibility 0.2s;
      }
      .detail.visible {
        display: flex;
        pointer-events: auto;
        opacity: 1;
        visibility: visible;
      }
      .detail.visible::before {
        opacity: 1;
        visibility: visible;
      }
      .detail-content {
        overflow-y: auto;
        flex: 1;
      }
      .detail-title {
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .kv {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 8px 16px;
        font-size: 12px;
      }
      .kv-key {
        color: #94a3b8;
        font-weight: 600;
      }
      .kv-val {
        color: var(--text);
      }
      .step {
        margin: 8px 0;
        padding: 10px;
        background: rgba(96, 165, 250, 0.08);
        border-left: 3px solid #60a5fa;
        border-radius: 3px;
        font-size: 11px;
      }
      .progress-bar {
        width: 100%;
        height: 4px;
        background: rgba(96, 165, 250, 0.1);
        border-radius: 2px;
        margin-top: 6px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #60a5fa, #3b82f6);
        border-radius: 2px;
      }
      .mission-steps {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .mission-step {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        padding: 4px 6px;
        background: rgba(96, 165, 250, 0.06);
        border-radius: 3px;
      }
      .mission-step-status {
        width: 16px;
        height: 16px;
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
      }
      .close-detail {
        cursor: pointer;
        color: #94a3b8;
        font-size: 16px;
        font-weight: 700;
      }
      .close-detail:hover {
        color: var(--text);
      }
      .action-buttons {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        border-top: 1px solid rgba(96, 165, 250, 0.2);
        padding-top: 12px;
      }
      .action-buttons button {
        flex: 1;
        padding: 8px 12px;
        font-size: 12px;
      }
      .btn-retry {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.5);
        color: #fbbf24;
      }
      .btn-retry:hover {
        background: rgba(251, 191, 36, 0.25);
      }
      .btn-abort {
        background: rgba(248, 113, 113, 0.15);
        border-color: rgba(248, 113, 113, 0.5);
        color: #f87171;
      }
      .btn-abort:hover {
        background: rgba(248, 113, 113, 0.25);
      }
      .ws-status {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 3px;
        background: rgba(74, 222, 128, 0.2);
        color: #4ade80;
        font-weight: 700;
        display: inline-block;
        margin-left: 8px;
      }
      .ws-status.disconnected {
        background: rgba(248, 113, 113, 0.2);
        color: #f87171;
      }
      .panel-body::-webkit-scrollbar {
        width: 6px;
      }
      .panel-body::-webkit-scrollbar-track {
        background: transparent;
      }
      .panel-body::-webkit-scrollbar-thumb {
        background: rgba(96, 165, 250, 0.2);
        border-radius: 3px;
      }
      .panel-body::-webkit-scrollbar-thumb:hover {
        background: rgba(96, 165, 250, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="logo">
        <div style="font-size: 28px">🌊</div>
        <div class="logo-text">CoWater</div>
      </div>
      <div class="nav">
        <a href="index.html">🗺️ 3D 맵</a>
        <a href="ops.html">📊 운영관제</a>
      </div>
      <div class="controls">
        <button onclick="loadData()">🔄 새로고침</button>
        <button onclick="resetAll()">⚠️ 초기화</button>
        <div class="ws-status disconnected" id="ws-status">
          WebSocket: 연결중…
        </div>
      </div>
    </div>

    <div class="health">
      <span style="font-weight: 600; font-size: 12px; color: #94a3b8"
        >🔌 서비스 상태</span
      >
      <div class="pill offline" id="svc-registry">Registry</div>
      <div class="pill offline" id="svc-system">System</div>
      <div class="pill offline" id="svc-ship">Ship-M</div>
      <div class="pill offline" id="svc-auv">AUV-L</div>
      <div class="pill offline" id="svc-rov">ROV-L</div>
      <div class="pill offline" id="svc-usv">USV-L</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">📡 이벤트</div>
        <div class="stat-value" id="st-events">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">⚠️ 경보</div>
        <div class="stat-value" id="st-alerts">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">🚀 미션</div>
        <div class="stat-value" id="st-missions">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">⏳ 진행중</div>
        <div class="stat-value" id="st-in-progress">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">✅ 완료</div>
        <div class="stat-value" id="st-completed">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">❌ 실패</div>
        <div class="stat-value" id="st-failed">—</div>
      </div>
    </div>

    <div class="content">
      <!-- Left column: Events & Alerts -->
      <div style="display: grid; grid-template-rows: 1fr 1fr; gap: 12px">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-header-title"
              >📡 이벤트 (<span id="ev-count">0</span>)</span
            >
          </div>
          <div class="panel-body" id="ev-list">
            <div class="empty">로딩 중…</div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-header-title"
              >⚠️ 경보 (<span id="al-count">0</span>)</span
            >
          </div>
          <div class="panel-body" id="al-list">
            <div class="empty">로딩 중…</div>
          </div>
        </div>
      </div>

      <!-- Right column: Missions -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-header-title"
            >🚀 미션 추적 (<span id="ms-count">0</span>)</span
          >
        </div>
        <div class="panel-body" id="ms-list">
          <div class="empty">로딩 중…</div>
        </div>
      </div>
    </div>

    <div class="detail" id="detail" onclick="event.stopPropagation()">
      <div class="detail-title">
        <span id="detail-title">상세 정보</span>
        <div class="close-detail" onclick="hideDetail()">✕</div>
      </div>
      <div class="detail-content" id="detail-body" style="margin-top: 12px"></div>
    </div>

    <script>
      const R = "http://127.0.0.1:8280";
      const WS_URL = "ws://127.0.0.1:8280";
      let data = { events: [], alerts: [], responses: [], missions: [] };
      let ws = null;
      let wsReconnectTimer = null;

      // ======================== WebSocket Management ========================

      function connectWebSocket() {
        try {
          ws = new WebSocket(WS_URL + "/ws/dashboard");

          ws.onopen = () => {
            console.log("✅ WebSocket connected");
            document.getElementById("ws-status").textContent =
              "WebSocket: 연결됨";
            document.getElementById("ws-status").className = "ws-status";
            clearTimeout(wsReconnectTimer);
          };

          ws.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);
              console.log("📨 WebSocket message:", msg.type);

              if (msg.type === "initial") {
                data.events = (msg.events || []).reverse();
                data.alerts = (msg.alerts || []).reverse();
                data.missions = (msg.missions || []).reverse();
                console.log(`📦 Initial data: ${data.missions.length} missions`);
                updateUI();
              } else if (msg.type === "mission_update" && msg.data) {
                // Handle real-time mission updates
                const m = msg.data.mission;
                const idx = data.missions.findIndex(
                  (x) => x.mission_id === m.mission_id,
                );
                console.log(`🚀 Mission update: ${m.mission_id} → ${m.status}`);
                if (idx >= 0) {
                  data.missions[idx] = m;
                  console.log(`  Updated at index ${idx}`);
                } else {
                  data.missions.unshift(m);
                  console.log(`  Added as new mission`);
                }
                updateUI();
              } else if (msg.type && msg.type.includes('event') || msg.type.includes('alert')) {
                // Other event/alert updates
                await loadData();
              }
            } catch (e) {
              console.error("❌ WebSocket message error:", e);
            }
          };

          ws.onerror = (error) => {
            console.error("❌ WebSocket error:", error);
            document.getElementById("ws-status").textContent =
              "WebSocket: 오류";
            document.getElementById("ws-status").className =
              "ws-status disconnected";
          };

          ws.onclose = () => {
            console.log("⚠️ WebSocket disconnected");
            document.getElementById("ws-status").textContent =
              "WebSocket: 연결끊김";
            document.getElementById("ws-status").className =
              "ws-status disconnected";
            // Attempt reconnection
            wsReconnectTimer = setTimeout(connectWebSocket, 3000);
          };
        } catch (e) {
          console.error("Failed to connect WebSocket:", e);
          wsReconnectTimer = setTimeout(connectWebSocket, 3000);
        }
      }

      function updateUI() {
        const inProgress = data.missions.filter(
          (m) => m.status === "in_progress",
        ).length;
        const completed = data.missions.filter(
          (m) => m.status === "completed",
        ).length;
        const failed = data.missions.filter(
          (m) => m.status === "failed",
        ).length;

        document.getElementById("st-events").textContent = data.events.length;
        document.getElementById("ev-count").textContent = data.events.length;
        document.getElementById("st-alerts").textContent = data.alerts.length;
        document.getElementById("al-count").textContent = data.alerts.length;
        document.getElementById("st-missions").textContent =
          data.missions.length;
        document.getElementById("ms-count").textContent = data.missions.length;
        document.getElementById("st-in-progress").textContent = inProgress;
        document.getElementById("st-completed").textContent = completed;
        document.getElementById("st-failed").textContent = failed;

        renderEvents();
        renderAlerts();
        renderMissions();
      }

      // ======================== Health & Data Loading ========================

      async function checkHealth() {
        const checks = {
          "svc-registry": R + "/health",
          "svc-system": "http://127.0.0.1:9116/health",
          "svc-ship": "http://127.0.0.1:9115/health",
          "svc-auv": "http://127.0.0.1:9112/health",
          "svc-rov": "http://127.0.0.1:9113/health",
          "svc-usv": "http://127.0.0.1:9111/health",
        };
        for (const [id, url] of Object.entries(checks)) {
          try {
            const r = await fetch(url, { signal: AbortSignal.timeout(1000) });
            document.getElementById(id).className = r.ok
              ? "pill online"
              : "pill offline";
          } catch {
            document.getElementById(id).className = "pill offline";
          }
        }
      }

      async function loadData() {
        try {
          const [events, alerts, responses, missions] = await Promise.all([
            fetch(R + "/events")
              .then((r) => r.json())
              .catch((e) => {
                console.error("Events error:", e);
                return [];
              }),
            fetch(R + "/alerts")
              .then((r) => r.json())
              .catch((e) => {
                console.error("Alerts error:", e);
                return [];
              }),
            fetch(R + "/responses")
              .then((r) => r.json())
              .catch((e) => {
                console.error("Responses error:", e);
                return [];
              }),
            fetch(R + "/missions")
              .then((r) => r.json())
              .catch((e) => {
                console.error("Missions error:", e);
                return [];
              }),
          ]);

          data.events = (events || []).reverse();
          data.alerts = (alerts || []).reverse();
          data.responses = (responses || []).reverse();
          data.missions = (missions || []).reverse();

          updateUI();
          await checkHealth();
        } catch (e) {
          console.error("Load failed:", e);
        }
      }

      function getStatusBadge(status) {
        const badges = {
          pending: "badge-pending",
          in_progress: "badge-inprogress",
          completed: "badge-completed",
          failed: "badge-failed",
          dispatched: "badge-ok",
          CRITICAL: "badge-critical",
          WARNING: "badge-warning",
        };
        const label = {
          pending: "⏳ 대기",
          in_progress: "▶️ 진행",
          completed: "✅ 완료",
          failed: "❌ 실패",
          dispatched: "✅ 전달",
          CRITICAL: "🔴 심각",
          WARNING: "🟡 경고",
        };
        return `<span class="badge ${badges[status] || ""}">${label[status] || status}</span>`;
      }

      function renderEvents() {
        const el = document.getElementById("ev-list");
        if (!data.events.length) {
          el.innerHTML = '<div class="empty">이벤트 없음</div>';
          return;
        }
        el.innerHTML = data.events
          .slice(0, 15)
          .map((e) => {
            const meta = e.metadata || {};
            const raw = meta.raw_event || {};
            return (
              '<div class="card" onclick="showEvent(\'' +
              e.event_id +
              "')\">" +
              '<div class="card-title">' +
              getStatusBadge(e.severity) +
              " " +
              e.event_type +
              "</div>" +
              '<div class="card-meta">신뢰도: ' +
              ((raw.confidence || 0) * 100).toFixed(0) +
              "% | " +
              new Date(e.created_at).toLocaleTimeString("ko-KR") +
              "</div>" +
              "</div>"
            );
          })
          .join("");
      }

      function renderAlerts() {
        const el = document.getElementById("al-list");
        if (!data.alerts.length) {
          el.innerHTML = '<div class="empty">경보 없음</div>';
          return;
        }
        el.innerHTML = data.alerts
          .slice(0, 15)
          .map((a) => {
            const relatedResponse = data.responses.find(
              (r) => r.alert_id === a.alert_id,
            );
            const relatedMission = relatedResponse
              ? data.missions.find(
                  (m) => m.response_id === relatedResponse.response_id,
                )
              : null;
            return (
              '<div class="card" onclick="showAlert(\'' +
              a.alert_id +
              "')\">" +
              '<div class="card-title">' +
              getStatusBadge(a.status) +
              " " +
              getStatusBadge(a.severity) +
              " " +
              a.alert_type +
              "</div>" +
              '<div class="card-meta">' +
              (relatedMission ? "🚀 " + relatedMission.status : "⏳ 응답대기") +
              " | " +
              new Date(a.created_at).toLocaleTimeString("ko-KR") +
              "</div>" +
              "</div>"
            );
          })
          .join("");
      }

      function renderMissions() {
        const el = document.getElementById("ms-list");
        if (!data.missions.length) {
          el.innerHTML = '<div class="empty">미션 없음</div>';
          return;
        }
        el.innerHTML = data.missions
          .slice(0, 20)
          .map((m) => {
            const steps = m.step_states || [];
            const completedSteps = steps.filter(
              (s) => s.status === "completed",
            ).length;
            const progress =
              steps.length > 0
                ? Math.round((completedSteps / steps.length) * 100)
                : 0;
            const startedTime = m.started_at
              ? new Date(m.started_at).toLocaleTimeString("ko-KR")
              : "-";

            return (
              '<div class="card" onclick="showMission(\'' +
              m.mission_id +
              "')\">" +
              '<div class="card-title">' +
              getStatusBadge(m.status) +
              " " +
              m.mission_id.substring(0, 16) +
              "…</div>" +
              '<div class="card-meta">' +
              steps.length +
              "단계 | " +
              completedSteps +
              "완료 | " +
              startedTime +
              "</div>" +
              '<div class="progress-bar"><div class="progress-fill" style="width: ' +
              progress +
              '%"></div></div>' +
              "</div>"
            );
          })
          .join("");
      }

      function showEvent(id) {
        const e = data.events.find((x) => x.event_id === id);
        const meta = e.metadata || {};
        const raw = meta.raw_event || {};
        const loc = meta.location || {};

        document.getElementById("detail-title").textContent =
          e.event_type + " " + getStatusBadge(e.severity);
        document.getElementById("detail-body").innerHTML =
          '<div class="kv">' +
          '<div class="kv-key">이벤트 ID</div><div class="kv-val">' +
          e.event_id +
          "</div>" +
          '<div class="kv-key">심각도</div><div class="kv-val">' +
          e.severity +
          "</div>" +
          '<div class="kv-key">신뢰도</div><div class="kv-val">' +
          ((raw.confidence || 0) * 100).toFixed(1) +
          "%</div>" +
          '<div class="kv-key">설명</div><div class="kv-val">' +
          (raw.description || "—") +
          "</div>" +
          '<div class="kv-key">위치</div><div class="kv-val">' +
          (loc.latitude || "—").toFixed(4) +
          ", " +
          (loc.longitude || "—").toFixed(4) +
          "</div>" +
          '<div class="kv-key">깊이</div><div class="kv-val">' +
          (loc.depth_m || "—") +
          "m</div>" +
          '<div class="kv-key">생성</div><div class="kv-val">' +
          new Date(e.created_at).toLocaleTimeString("ko-KR") +
          "</div>" +
          "</div>";
        document.getElementById("detail").className = "detail visible";
      }

      function showAlert(id) {
        const a = data.alerts.find((x) => x.alert_id === id);
        const e = data.events.find((x) => x.event_id === a.event_id);
        const r = data.responses.find((x) => x.alert_id === a.alert_id);
        const m = r
          ? data.missions.find((x) => x.response_id === r.response_id)
          : null;
        const meta = e ? e.metadata || {} : {};
        const raw = meta.raw_event || {};
        const loc = meta.location || {};

        let stepsHtml = "";
        if (r && r.params && r.params.steps) {
          r.params.steps.forEach((s, i) => {
            stepsHtml +=
              '<div class="step"><strong>단계 ' +
              (i + 1) +
              ": " +
              s.step_id.toUpperCase() +
              "</strong><br/>";
            if (s.tasks) {
              s.tasks.forEach((t) => {
                stepsHtml +=
                  "→ " + t.action + " (" + t.target_device_name + ")<br/>";
              });
            }
            stepsHtml += "</div>";
          });
        }

        document.getElementById("detail-title").textContent =
          a.alert_type +
          " " +
          getStatusBadge(a.status) +
          " " +
          getStatusBadge(a.severity);
        document.getElementById("detail-body").innerHTML =
          '<div class="kv">' +
          '<div class="kv-key">경보 ID</div><div class="kv-val">' +
          a.alert_id +
          "</div>" +
          '<div class="kv-key">상태</div><div class="kv-val">' +
          a.status +
          "</div>" +
          '<div class="kv-key">심각도</div><div class="kv-val">' +
          a.severity +
          "</div>" +
          '<div class="kv-key">신뢰도</div><div class="kv-val">' +
          ((raw.confidence || 0) * 100).toFixed(1) +
          "%</div>" +
          '<div class="kv-key">위치</div><div class="kv-val">' +
          (loc.latitude || "—").toFixed(4) +
          ", " +
          (loc.longitude || "—").toFixed(4) +
          "</div>" +
          '<div class="kv-key">깊이</div><div class="kv-val">' +
          (loc.depth_m || "—") +
          "m</div>" +
          (m
            ? '<div class="kv-key">미션</div><div class="kv-val"><a href="javascript:showMission(\'' +
              m.mission_id +
              '\')" style="color: #60a5fa; text-decoration: underline; cursor: pointer;">' +
              m.mission_id.substring(0, 12) +
              "…</a> (" +
              m.status +
              ")</div>"
            : "") +
          "</div>" +
          (stepsHtml
            ? '<div style="margin-top: 12px;"><strong>📋 미션 단계:</strong>' +
              stepsHtml +
              "</div>"
            : '<div style="margin-top: 12px; color: #94a3b8;">📋 응답 대기 중</div>');
        document.getElementById("detail").className = "detail visible";
      }

      function showMission(id) {
        const m = data.missions.find((x) => x.mission_id === id);
        if (!m) {
          alert("미션을 찾을 수 없습니다");
          return;
        }

        const r = data.responses.find((x) => x.response_id === m.response_id);
        const a = data.alerts.find((x) => x.alert_id === m.alert_id);
        const e = data.events.find((x) => x.event_id === m.event_id);

        const steps = m.step_states || [];
        const completed = steps.filter((s) => s.status === "completed").length;
        const failed = steps.filter((s) => s.status === "failed").length;

        let stepsHtml = '<div class="mission-steps">';
        steps.forEach((s, i) => {
          const statusColor =
            s.status === "completed"
              ? "#4ade80"
              : s.status === "failed"
                ? "#f87171"
                : "#94a3b8";
          const statusIcon =
            s.status === "completed" ? "✓" : s.status === "failed" ? "✕" : "…";
          stepsHtml +=
            '<div class="mission-step">' +
            '<div class="mission-step-status" style="background: ' +
            statusColor +
            '; color: #fff;">' +
            statusIcon +
            "</div>" +
            "<div><strong>" +
            s.step_id.toUpperCase() +
            "</strong> - " +
            (s.status || "pending") +
            "</div>" +
            "</div>";
        });
        stepsHtml += "</div>";

        let completionHtml = "";
        const report = m.completion_report || {};
        if (report && Object.keys(report).length > 0) {
          completionHtml =
            '<div style="margin-top: 12px; padding: 12px; background: rgba(74, 222, 128, 0.1); border-radius: 4px; border-left: 3px solid #4ade80;">' +
            "<strong>📋 완료 보고서</strong>" +
            '<div class="kv" style="margin-top: 6px;">' +
            '<div class="kv-key">총 단계</div><div class="kv-val">' +
            (report.total_steps || steps.length) +
            "</div>" +
            '<div class="kv-key">성공</div><div class="kv-val">' +
            (report.successful_steps || completed) +
            "</div>" +
            '<div class="kv-key">실패</div><div class="kv-val">' +
            (report.failed_steps || failed) +
            "</div>" +
            "</div>" +
            "</div>";
        }

        // Manual Intervention buttons
        let actionButtons = "";
        if (m.status === "in_progress" || m.status === "pending") {
          actionButtons =
            '<div class="action-buttons">' +
            '<button class="btn-abort" onclick="abortMission(\'' +
            m.mission_id +
            "')\">❌ 미션 취소</button>" +
            "</div>";
        } else if (m.status === "failed") {
          actionButtons =
            '<div class="action-buttons">' +
            '<button class="btn-retry" onclick="retryMission(\'' +
            m.mission_id +
            "')\">🔄 재시도</button>" +
            "</div>";
        }

        document.getElementById("detail-title").textContent =
          "Mission " + getStatusBadge(m.status);
        document.getElementById("detail-body").innerHTML =
          '<div class="kv">' +
          '<div class="kv-key">미션 ID</div><div class="kv-val" style="font-family: monospace; font-size: 11px;">' +
          m.mission_id +
          "</div>" +
          '<div class="kv-key">응답 ID</div><div class="kv-val" style="font-family: monospace; font-size: 11px;">' +
          m.response_id.substring(0, 20) +
          "…</div>" +
          '<div class="kv-key">상태</div><div class="kv-val">' +
          getStatusBadge(m.status) +
          "</div>" +
          '<div class="kv-key">진행</div><div class="kv-val">' +
          completed +
          "/" +
          steps.length +
          " 완료</div>" +
          '<div class="kv-key">시작</div><div class="kv-val">' +
          (m.started_at
            ? new Date(m.started_at).toLocaleTimeString("ko-KR")
            : "—") +
          "</div>" +
          '<div class="kv-key">완료</div><div class="kv-val">' +
          (m.completed_at
            ? new Date(m.completed_at).toLocaleTimeString("ko-KR")
            : "—") +
          "</div>" +
          "</div>" +
          '<div style="margin-top: 12px;"><strong>📊 단계 상태:</strong>' +
          stepsHtml +
          "</div>" +
          (r
            ? '<div style="margin-top: 12px; padding: 8px; background: rgba(96, 165, 250, 0.08); border-radius: 3px; border-left: 3px solid #60a5fa;">' +
              "<strong>📍 응답 액션:</strong> " +
              r.action +
              "<br/>" +
              "<strong>원인:</strong> " +
              r.reason +
              "</div>"
            : "") +
          completionHtml +
          actionButtons;
        document.getElementById("detail").className = "detail visible";
      }

      function hideDetail() {
        const detail = document.getElementById("detail");
        detail.classList.remove("visible");
      }

      // Close detail modal when clicking outside (on overlay)
      document.addEventListener("click", function (e) {
        const detail = document.getElementById("detail");
        // Check if detail is visible and click is on the overlay (::before element)
        if (detail.classList.contains("visible")) {
          // If click is NOT on the detail content itself, close it
          if (!e.target.closest(".detail-title") && !e.target.closest(".detail-content")) {
            if (e.target === detail || e.target.closest(".detail") === null) {
              hideDetail();
            }
          }
        }
      });

      // ======================== Manual Intervention ========================

      async function abortMission(missionId) {
        if (!confirm("이 미션을 취소하시겠습니까?")) return;

        try {
          const response = await fetch(
            R +
              "/missions/" +
              missionId +
              "/abort?reason=Manual%20intervention",
            {
              method: "POST",
            },
          );

          if (response.ok) {
            alert("미션 취소 완료");
            await loadData();
            hideDetail();
          } else {
            alert("미션 취소 실패: " + response.statusText);
          }
        } catch (e) {
          alert("미션 취소 중 오류: " + e.message);
        }
      }

      async function retryMission(missionId) {
        if (!confirm("이 미션을 재시도하시겠습니까?")) return;

        try {
          const response = await fetch(R + "/missions/" + missionId, {
            method: "GET",
          });

          if (!response.ok) {
            alert("미션 조회 실패");
            return;
          }

          const mission = await response.json();

          // Update mission status to pending for retry
          const updateResp = await fetch(
            R + "/missions/" + missionId + "/update-status?status=pending",
            {
              method: "POST",
            },
          );

          if (updateResp.ok) {
            alert("미션 재시도 준비 완료");
            await loadData();
            hideDetail();
          } else {
            alert("미션 상태 업데이트 실패: " + updateResp.statusText);
          }
        } catch (e) {
          alert("미션 재시도 중 오류: " + e.message);
        }
      }

      // ======================== Initialization ========================

      async function resetAll() {
        if (!confirm("모든 데이터를 초기화하시겠습니까?")) return;
        try {
          await fetch(R + "/admin/reset", { method: "POST" });
          await new Promise((r) => setTimeout(r, 500));
          await loadData();
          alert("초기화 완료");
        } catch (e) {
          alert("초기화 실패: " + e.message);
        }
      }

      // Initial setup - WebSocket only, no polling
      connectWebSocket();
      loadData();
      // Periodically check health
      setInterval(checkHealth, 5000);
    </script>
  </body>
</html>
