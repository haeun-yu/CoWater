<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoWater Operations</title>
    <style>
      :root {
        --bg: #f4f5ef;
        --card: #fffef8;
        --ink: #17312c;
        --muted: #66756f;
        --line: #d7ddd0;
        --accent: #006d5b;
        --warn: #c85e00;
        --danger: #b03030;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans KR", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(0,109,91,0.12), transparent 28%),
          linear-gradient(180deg, #f6f7f1, #eef1e7);
        color: var(--ink);
      }
      header {
        padding: 24px 20px 14px;
        border-bottom: 1px solid var(--line);
      }
      h1 { margin: 0; font-size: 30px; }
      .sub { margin-top: 6px; color: var(--muted); }
      main {
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 12px 30px rgba(23,49,44,0.06);
      }
      .card h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      input, textarea, select, button {
        font: inherit;
      }
      input, textarea, select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
      }
      textarea { min-height: 92px; resize: vertical; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }
      button.secondary { background: #dde7e1; color: var(--ink); }
      button.warn { background: var(--warn); }
      button.danger { background: var(--danger); }
      .list { display: grid; gap: 10px; }
      .item {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: rgba(255,255,255,0.7);
      }
      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
      }
      .pill {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        background: #e6f2ef;
        color: var(--accent);
        font-size: 11px;
      }
      .pill.online { background: #d4edda; color: #155724; }
      .pill.lost { background: #fff3cd; color: #856404; }
      .pill.offline { background: #f8d7da; color: #721c24; }
      .sensor-status { font-size: 12px; padding: 6px; border-radius: 6px; background: rgba(255,255,255,0.1); }
      .sensor-status.ok { background: rgba(74,222,128,0.15); color: #4ade80; }
      .sensor-status.warn { background: rgba(251,191,36,0.15); color: #fbbf24; }
      .sensor-status.error { background: rgba(248,113,113,0.15); color: #f87171; }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .stat {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
      }
      .stat b { display: block; font-size: 22px; margin-top: 4px; }
      a { color: var(--accent); text-decoration: none; }
      .empty { color: var(--muted); font-size: 14px; }
      @media (max-width: 700px) {
        .stats, .grid2 { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>CoWater Mission Operations</h1>
      <div class="sub">Device Role → Operation Plan → Mission Proposal → Approval → Mission Execution</div>
    </header>
    <main>
      <section class="card">
        <h2>Overview</h2>
        <div class="stats" id="stats"></div>
      </section>

      <section class="card">
        <h2>Role Assignment</h2>
        <label for="role-goal">Goal</label>
        <input id="role-goal" placeholder="예: 항만 주변 기뢰 탐지 및 제거" />
        <div class="actions">
          <button id="recommend-roles">Recommend Roles</button>
          <button class="secondary" id="refresh-overview-1">Refresh</button>
        </div>
        <div class="list" id="roles"></div>
      </section>

      <section class="card">
        <h2>Operation Plan</h2>
        <div class="grid2">
          <div>
            <label for="plan-name">Plan Name</label>
            <input id="plan-name" placeholder="Mine Clearance Plan" />
          </div>
          <div>
            <label for="plan-goal">Goal</label>
            <input id="plan-goal" placeholder="임무 목표" />
          </div>
        </div>
        <label for="plan-location">Location JSON</label>
        <input id="plan-location" placeholder='{"latitude":35.1,"longitude":129.1}' />
        <div class="actions">
          <button id="recommend-plan">Recommend Plan</button>
          <button class="secondary" id="save-plan">Save Plan</button>
        </div>
        <div class="list" id="plans"></div>
      </section>

      <section class="card">
        <h2>Proposal & Approval</h2>
        <label for="proposal-goal">Proposal Goal</label>
        <textarea id="proposal-goal" placeholder="운영자가 검토할 미션 제안 목표"></textarea>
        <label for="proposal-plan">Operation Plan</label>
        <select id="proposal-plan"></select>
        <div class="actions">
          <button id="generate-proposal">Generate Proposal</button>
          <button class="secondary" id="refresh-overview-2">Refresh</button>
        </div>
        <div class="list" id="approvals"></div>
        <div class="list" id="proposals"></div>
      </section>

      <section class="card">
        <h2>Mission Execution</h2>
        <div class="list" id="missions"></div>
      </section>

      <section class="card">
        <h2>Events, Alerts, Insights</h2>
        <div class="list" id="signals"></div>
      </section>

      <section class="card">
        <h2>Device Connectivity Status</h2>
        <div class="list" id="device-connectivity"></div>
      </section>

      <section class="card">
        <h2>Policy Management</h2>
        <label for="policy-name">정책 이름</label>
        <input id="policy-name" placeholder="예: auto_rtb_on_lost" />
        <label for="policy-trigger">트리거 조건</label>
        <input id="policy-trigger" placeholder="예: device.connectivity_status=lost" />
        <div class="actions">
          <button id="create-policy">Create Policy</button>
          <button class="secondary" id="refresh-policies">Refresh</button>
        </div>
        <div class="list" id="policies"></div>
      </section>

      <section class="card">
        <h2>Sensor Monitoring</h2>
        <div class="list" id="sensor-monitoring"></div>
      </section>
    </main>

    <script>
      const REGISTRY = "http://127.0.0.1:8280";
      const SYSTEM = "http://127.0.0.1:9116";

      async function j(url, opts) {
        const res = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...opts,
        });
        if (!res.ok) throw new Error(`${res.status} ${url}`);
        return res.json();
      }

      function parseLocation(input) {
        const raw = input.trim();
        if (!raw) return {};
        try { return JSON.parse(raw); } catch { return {}; }
      }

      function statusPill(status) {
        return `<span class="pill">${status || "unknown"}</span>`;
      }

      function renderStats(data) {
        const stats = data.stats || {};
        const rows = [
          ["Devices", (data.devices || []).length],
          ["Plans", (data.operation_plans || []).length],
          ["Pending Approvals", (data.approvals || []).filter(x => x.status === "pending").length],
          ["Running Missions", (data.missions || []).filter(x => x.status === "running").length],
          ["Completed Missions", stats.completed || 0],
          ["Failed Missions", stats.failed || 0],
        ];
        document.getElementById("stats").innerHTML = rows.map(([k, v]) => `<div class="stat"><div>${k}</div><b>${v}</b></div>`).join("");
      }

      function renderRoles(devices, roles) {
        const roleMap = new Map((roles || []).map(r => [String(r.device_id), r]));
        const html = (devices || []).map(device => {
          const role = roleMap.get(String(device.id)) || roleMap.get(String(device.registry_id));
          return `
            <div class="item">
              <strong>${device.name}</strong> ${statusPill(device.layer || "-")}
              <div class="meta">
                <span>${device.device_type || "-"}</span>
                <span>${role ? role.role_name : "unassigned"}</span>
              </div>
              <div>${role ? role.responsibility : "Role not assigned."}</div>
              <div class="actions">
                <button class="secondary" onclick="applyRole('${device.id}')">Request Role Approval</button>
              </div>
            </div>`;
        }).join("");
        document.getElementById("roles").innerHTML = html || `<div class="empty">No devices.</div>`;
      }

      function renderDeviceConnectivity(devices) {
        const html = (devices || []).map(device => {
          const status = device.connectivity_status || (device.connected ? 'online' : 'offline');
          const statusEmoji = {'online':'🟢','lost':'🟡','offline':'⚫'}[status] || '❓';
          return `
            <div class="item">
              <strong>${device.name}</strong> <span class="pill ${status}">${statusEmoji} ${status.toUpperCase()}</span>
              <div class="meta">
                <span>Type: ${device.device_type || "-"}</span>
                <span>Layer: ${device.layer || "-"}</span>
                <span>Last Seen: ${device.last_seen_at ? new Date(device.last_seen_at).toLocaleString('ko-KR') : "Never"}</span>
              </div>
              ${device.connected === false && status === 'lost' ? `
                <div style="padding:8px;background:rgba(251,191,36,0.1);border-radius:6px;margin-top:6px;color:#c85e00;font-size:12px">
                  ⚠️ Device lost connection and may have pending tasks
                </div>
              ` : ""}
            </div>`;
        }).join("");
        document.getElementById("device-connectivity").innerHTML = html || `<div class="empty">No devices.</div>`;
      }

      function renderPolicies(policies) {
        const html = (policies || []).map(policy => `
          <div class="item">
            <strong>${policy.name}</strong> <span class="pill">${policy.enabled ? 'ENABLED' : 'DISABLED'}</span>
            <div>${policy.description || 'No description'}</div>
            <div class="meta">
              <span>ID: ${policy.id}</span>
              <span>Trigger: ${policy.trigger || "unknown"}</span>
            </div>
            <div class="actions">
              <button class="secondary" onclick="togglePolicy('${policy.id}')">${policy.enabled ? 'Disable' : 'Enable'}</button>
            </div>
          </div>
        `).join("");
        document.getElementById("policies").innerHTML = html || `<div class="empty">No policies configured.</div>`;
      }

      function renderSensorMonitoring(devices, events) {
        const sensorMap = new Map();
        (events || []).forEach(event => {
          if (event.event_type === 'sensor_status_changed') {
            const key = `${event.source_agent_id}_${event.metadata?.sensor_id || 'unknown'}`;
            if (!sensorMap.has(key) || new Date(event.timestamp) > new Date((sensorMap.get(key) || {}).timestamp || 0)) {
              sensorMap.set(key, event);
            }
          }
        });

        const html = Array.from(sensorMap.values()).map(event => {
          const meta = event.metadata || {};
          const statusClass = event.severity === 'CRITICAL' ? 'error' : event.severity === 'WARNING' ? 'warn' : 'ok';
          return `
            <div class="item">
              <strong>${meta.sensor_id || 'Unknown Sensor'}</strong> <span class="sensor-status ${statusClass}">${event.severity || 'INFO'}</span>
              <div class="meta">
                <span>Type: ${meta.sensor_type || "-"}</span>
                <span>Status: ${meta.status || "-"}</span>
                <span>Updated: ${new Date(event.timestamp).toLocaleString('ko-KR')}</span>
              </div>
              <div style="font-size:12px;margin-top:6px">${event.message || ""}</div>
            </div>
          `;
        }).join("");
        document.getElementById("sensor-monitoring").innerHTML = html || `<div class="empty">No sensor events detected.</div>`;
      }

      function renderPlans(plans) {
        const html = (plans || []).map(plan => `
          <div class="item">
            <strong>${plan.name}</strong> ${statusPill(plan.status)}
            <div>${plan.summary || plan.goal || ""}</div>
            <div class="meta">
              <span>${plan.operation_plan_id}</span>
              <span>${(plan.mission_templates || []).length} mission template(s)</span>
            </div>
            ${plan.status !== "active" ? `<div class="actions"><button class="secondary" onclick="activatePlan('${plan.operation_plan_id}')">Activate</button></div>` : ""}
          </div>
        `).join("");
        document.getElementById("plans").innerHTML = html || `<div class="empty">No operation plans.</div>`;
        const select = document.getElementById("proposal-plan");
        select.innerHTML = `<option value="">No Plan</option>` + (plans || []).map(plan => `<option value="${plan.operation_plan_id}">${plan.name}</option>`).join("");
      }

      function renderApprovals(approvals) {
        const html = (approvals || []).map(item => `
          <div class="item">
            <strong>Approval</strong> ${statusPill(item.status)}
            <div>${item.summary}</div>
            <div class="meta">
              <span>${item.approval_id}</span>
              <span>${item.target_type}:${item.target_id}</span>
            </div>
            ${item.status === "pending" ? `
              <div class="actions">
                <button onclick="decideApproval('${item.approval_id}', true)">Approve</button>
                <button class="danger" onclick="decideApproval('${item.approval_id}', false)">Reject</button>
              </div>` : ""}
          </div>
        `).join("");
        document.getElementById("approvals").innerHTML = html || `<div class="empty">No approvals.</div>`;
      }

      function renderProposals(proposals) {
        const html = (proposals || []).map(item => `
          <div class="item">
            <strong>${item.title}</strong> ${statusPill(item.status)}
            <div>${item.summary || item.goal}</div>
            <div class="meta">
              <span>${item.proposal_id}</span>
              <span>${item.mission_type}</span>
              <span>${(item.steps || []).length} step(s)</span>
            </div>
          </div>
        `).join("");
        document.getElementById("proposals").innerHTML = html || `<div class="empty">No mission proposals.</div>`;
      }

      function renderMissions(missions) {
        const html = (missions || []).map(item => `
          <div class="item">
            <strong><a href="mission.html?id=${encodeURIComponent(item.mission_id)}">${item.title}</a></strong> ${statusPill(item.status)}
            <div>${item.goal || item.summary || ""}</div>
            <div class="meta">
              <span>${item.mission_id}</span>
              <span>${item.mission_type}</span>
              <span>${(item.steps || []).length} step(s)</span>
              <span>${(item.device_execution_results || []).length} execution result(s)</span>
            </div>
          </div>
        `).join("");
        document.getElementById("missions").innerHTML = html || `<div class="empty">No missions.</div>`;
      }

      function renderSignals(events, alerts, insights) {
        const rows = [
          ...(insights || []).slice(-3).reverse().map(i => ({ type: "Insight", title: i.summary, body: i.reason_summary, status: i.severity })),
          ...(alerts || []).slice(-3).reverse().map(a => ({ type: "Alert", title: a.alert_type, body: a.message, status: a.severity })),
          ...(events || []).slice(-3).reverse().map(e => ({ type: "Event", title: e.event_type, body: e.message, status: e.severity })),
        ];
        document.getElementById("signals").innerHTML = rows.map(row => `
          <div class="item">
            <strong>${row.type}</strong> ${statusPill(row.status)}
            <div>${row.title}</div>
            <div class="meta"><span>${row.body}</span></div>
          </div>`).join("") || `<div class="empty">No signals.</div>`;
      }

      async function loadOverview() {
        try {
          const overview = await j(`${SYSTEM}/overview`);
          const stats = await j(`${REGISTRY}/missions/stats`);
          const events = await j(`${REGISTRY}/events`);
          const alerts = await j(`${REGISTRY}/alerts`);
          const insights = await j(`${REGISTRY}/insights`);

          // Load policies
          let policies = [];
          try {
            policies = await j(`${REGISTRY}/policies`);
          } catch (e) {
            console.debug("Policies not available:", e);
          }

          const data = { ...overview, stats };
          renderStats(data);
          renderRoles(data.devices, data.device_roles);
          renderPlans(data.operation_plans);
          renderApprovals(data.approvals);
          renderProposals(data.mission_proposals);
          renderMissions(data.missions);
          renderSignals(events, alerts, insights);
          renderDeviceConnectivity(data.devices);
          renderPolicies(policies);
          renderSensorMonitoring(data.devices, events);
          window.__overview = data;
        } catch (e) {
          console.error("Failed to load overview:", e);
        }
      }

      async function applyRole(deviceId) {
        const rec = await j(`${SYSTEM}/device-roles/recommend`, {
          method: "POST",
          body: JSON.stringify({ goal: document.getElementById("role-goal").value }),
        });
        const match = (rec.recommendations || []).find(x => x.device_id === deviceId);
        if (!match) return;
        await j(`${SYSTEM}/device-roles/apply`, {
          method: "POST",
          body: JSON.stringify({ ...match, decided_by: "user" }),
        });
        await loadOverview();
      }

      async function decideApproval(approvalId, approved) {
        await j(`${SYSTEM}/approvals/${approvalId}/decision`, {
          method: "POST",
          body: JSON.stringify({ approved, decided_by: "user" }),
        });
        await loadOverview();
      }

      async function activatePlan(operationPlanId) {
        await j(`${SYSTEM}/operation-plans/${operationPlanId}/activate`, {
          method: "POST",
          body: JSON.stringify({ activated_by: "user" }),
        });
        await loadOverview();
      }

      document.getElementById("recommend-roles").onclick = async () => {
        const goal = document.getElementById("role-goal").value;
        const rec = await j(`${SYSTEM}/device-roles/recommend`, {
          method: "POST",
          body: JSON.stringify({ goal }),
        });
        const list = rec.recommendations || [];
        document.getElementById("roles").innerHTML = list.map(item => `
          <div class="item">
            <strong>${item.device_name}</strong> ${statusPill(item.role_name)}
            <div>${item.responsibility}</div>
            <div class="meta"><span>${item.device_id}</span><span>${item.device_type}</span></div>
          </div>`).join("");
      };

      document.getElementById("recommend-plan").onclick = async () => {
        const body = {
          name: document.getElementById("plan-name").value,
          goal: document.getElementById("plan-goal").value,
          location: parseLocation(document.getElementById("plan-location").value),
        };
        const plan = await j(`${SYSTEM}/operation-plans/recommend`, {
          method: "POST",
          body: JSON.stringify(body),
        });
        document.getElementById("plans").innerHTML = `<div class="item"><strong>${plan.name}</strong> ${statusPill(plan.status)}<div>${plan.summary}</div><pre>${JSON.stringify(plan, null, 2)}</pre></div>`;
      };

      document.getElementById("save-plan").onclick = async () => {
        const body = {
          name: document.getElementById("plan-name").value,
          goal: document.getElementById("plan-goal").value,
          location: parseLocation(document.getElementById("plan-location").value),
        };
        await j(`${SYSTEM}/operation-plans`, {
          method: "POST",
          body: JSON.stringify(body),
        });
        await loadOverview();
      };

      document.getElementById("generate-proposal").onclick = async () => {
        const body = {
          goal: document.getElementById("proposal-goal").value,
          operation_plan_id: document.getElementById("proposal-plan").value || null,
        };
        await j(`${SYSTEM}/mission-proposals/generate`, {
          method: "POST",
          body: JSON.stringify(body),
        });
        await loadOverview();
      };

      async function togglePolicy(policyId) {
        try {
          const policies = await j(`${REGISTRY}/policies`);
          const policy = policies.find(p => p.id === policyId);
          if (!policy) return;
          await j(`${REGISTRY}/policies/${policyId}`, {
            method: "PUT",
            body: JSON.stringify({ ...policy, enabled: !policy.enabled }),
          });
          await loadOverview();
        } catch (e) {
          alert("Failed to toggle policy: " + e.message);
        }
      }

      document.getElementById("create-policy").onclick = async () => {
        const name = document.getElementById("policy-name").value;
        const trigger = document.getElementById("policy-trigger").value;
        if (!name || !trigger) {
          alert("Please fill in all fields");
          return;
        }
        try {
          await j(`${REGISTRY}/policies`, {
            method: "POST",
            body: JSON.stringify({
              name,
              trigger,
              enabled: true,
              description: `Auto-created policy: ${name}`,
            }),
          });
          document.getElementById("policy-name").value = "";
          document.getElementById("policy-trigger").value = "";
          await loadOverview();
        } catch (e) {
          alert("Failed to create policy: " + e.message);
        }
      };

      document.getElementById("refresh-policies").onclick = loadOverview;
      document.getElementById("refresh-overview-1").onclick = loadOverview;
      document.getElementById("refresh-overview-2").onclick = loadOverview;
      loadOverview();

      // WebSocket 구독: 실시간 데이터 업데이트
      const MOTH_BASE = "wss://cobot.center:8287";
      const sockets = {};

      function subscribeToMothChannel(channel) {
        const wsUrl = `${MOTH_BASE}/pang/ws/meb?channel=instant&name=${channel}&source=ops-client&track=ops-client`;
        try {
          const ws = new WebSocket(wsUrl);
          sockets[channel] = ws;

          ws.onopen = () => {
            ws.send(JSON.stringify({ type: "subscribe", channel: channel, channel_type: "meb" }));
            console.log(`[Moth] Subscribed to ${channel}`);
          };

          ws.onmessage = async (e) => {
            try {
              const rawText = typeof e.data === "string" ? e.data : await e.data.text();
              if (!rawText || rawText.trim() === "ping") return;
              const raw = JSON.parse(rawText);
              const payload = raw.payload || raw.data || raw;
              if (!payload) return;

              // 채널별로 해당 UI 업데이트 (Moth에서 받은 데이터 직접 사용)
              if (channel === "overview") {
                const overview = payload;
                if (overview.devices && overview.device_roles !== undefined) {
                  renderRoles(overview.devices, overview.device_roles);
                  renderDeviceConnectivity(overview.devices);
                  renderSensorMonitoring(overview.devices, window.__lastEvents || []);
                }
              } else if (channel === "missions") {
                renderMissions(Array.isArray(payload) ? payload : [payload]);
              } else if (channel === "mission_proposals") {
                renderProposals(Array.isArray(payload) ? payload : [payload]);
              } else if (channel === "approvals") {
                renderApprovals(Array.isArray(payload) ? payload : [payload]);
              } else if (channel === "events") {
                window.__lastEvents = Array.isArray(payload) ? payload : [payload];
              } else if (channel === "alerts") {
                window.__lastAlerts = Array.isArray(payload) ? payload : [payload];
              } else if (channel === "insights") {
                window.__lastInsights = Array.isArray(payload) ? payload : [payload];
              } else if (channel === "policies") {
                renderPolicies(Array.isArray(payload) ? payload : [payload]);
              }

              // signals 업데이트 (events, alerts, insights 모두 필요)
              if (channel === "events" || channel === "alerts" || channel === "insights") {
                renderSignals(
                  window.__lastEvents || [],
                  window.__lastAlerts || [],
                  window.__lastInsights || []
                );
              }
            } catch (err) {
              console.debug(`[Moth] ${channel} parse error:`, err);
            }
          };

          ws.onerror = () => {
            console.warn(`[Moth] ${channel} connection error`);
            setTimeout(() => subscribeToMothChannel(channel), 5000);
          };

          ws.onclose = () => {
            setTimeout(() => subscribeToMothChannel(channel), 5000);
          };
        } catch (err) {
          console.warn(`[Moth] Failed to subscribe ${channel}:`, err);
          setTimeout(() => subscribeToMothChannel(channel), 5000);
        }
      }

      // 모든 채널 구독
      ["overview", "missions", "approvals", "mission_proposals", "events", "alerts", "insights", "policies"]
        .forEach(subscribeToMothChannel);
      window.applyRole = applyRole;
      window.decideApproval = decideApproval;
      window.activatePlan = activatePlan;
      window.togglePolicy = togglePolicy;
    </script>
  </body>
</html>
