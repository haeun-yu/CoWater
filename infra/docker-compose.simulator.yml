version: "3.9"

services:
  # ─────────────────────────────────────────────────────
  # Redis (시뮬레이터 의존성)
  # ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cowater-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-cowater_dev}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_BIND_ADDR:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cowater_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Simulator (선택적 — 개발/훈련 시만 실행)
  # ─────────────────────────────────────────────────────
  simulator:
    build:
      context: ../services/simulator
      dockerfile: Dockerfile
    container_name: cowater-simulator
    restart: "no"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-cowater_dev}@redis:6379}
      MOTH_SERVER_URL: ${MOTH_SERVER_URL:-wss://cobot.center:8287}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      SCENARIO: ${SCENARIO:-demo}
      TIME_SCALE: "3.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
