  # # ─────────────────────────────────────────────────────
  # # Analysis Service (신규 — AI 기반 분석, 호스트 Ollama 사용)
  # # ─────────────────────────────────────────────────────
  # # 참고: 호스트 시스템의 Ollama 서버가 실행 중이어야 함
  # # Mac/Windows Docker Desktop: host.docker.internal:11434 (기본)
