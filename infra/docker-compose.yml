version: "3.9"

services:
  # ─────────────────────────────────────────────────────
  # PostgreSQL + PostGIS + TimescaleDB
  # ─────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: cowater-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cowater
      POSTGRES_USER: cowater
      POSTGRES_PASSWORD: cowater_dev
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./postgres/01_extensions.sql:/docker-entrypoint-initdb.d/01_extensions.sql
      - ./postgres/02_schema.sql:/docker-entrypoint-initdb.d/02_schema.sql
      - ./postgres/03_seed.sql:/docker-entrypoint-initdb.d/03_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cowater -d cowater"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cowater-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Core Backend
  # ─────────────────────────────────────────────────────
  core:
    build:
      context: ../services/core
      dockerfile: Dockerfile
    container_name: cowater-core
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://cowater:cowater_dev@postgres:5432/cowater
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Moth Bridge
  # ─────────────────────────────────────────────────────
  moth-bridge:
    build:
      context: ../services/moth-bridge
      dockerfile: Dockerfile
    container_name: cowater-moth-bridge
    restart: unless-stopped
    environment:
      MOTH_SERVER_URL: wss://cobot.center:8287
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Agent Runtime
  # ─────────────────────────────────────────────────────
  agents:
    build:
      context: ../services/agents
      dockerfile: Dockerfile
    container_name: cowater-agents
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      CORE_API_URL: http://core:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOG_LEVEL: info
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Simulator (선택적 — 개발/훈련 시만 실행)
  # ─────────────────────────────────────────────────────
  simulator:
    build:
      context: ../services/simulator
      dockerfile: Dockerfile
    container_name: cowater-simulator
    restart: "no"
    profiles:
      - simulation
    environment:
      MOTH_SERVER_URL: wss://cobot.center:8287
      SCENARIO: ${SCENARIO:-default}
      LOG_LEVEL: info

  # ─────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile
    container_name: cowater-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - core

volumes:
  postgres_data:
  redis_data:
