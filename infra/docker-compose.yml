  # # ─────────────────────────────────────────────────────
  # analysis-agents:
  #   build:
  #     context: ..
  #     dockerfile: services/analysis-agents/Dockerfile
  #   container_name: cowater-analysis-agents
  #   restart: unless-stopped
  #   environment:
  #     REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@redis:6379}
  #     CORE_API_URL: ${CORE_API_URL:-http://core:8000}
  #     # Mac/Windows: host.docker.internal / Linux: localhost 또는 172.17.0.1
  #     OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
  #     OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
  #     LOG_LEVEL: ${LOG_LEVEL:-info}
  #   ports:
  #     - "7705:8001"
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     core:
  #       condition: service_started

  # # ─────────────────────────────────────────────────────
  # # Response Service (신규 — Alert 생성 및 대응)
  # # ─────────────────────────────────────────────────────
  response-agents:
    build:
      context: ..
      dockerfile: services/response-agents/Dockerfile
    container_name: cowater-response-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@redis:6379}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Port exposed via agent-gateway (7706)
    # ports:
    #   - "7706:8001"
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started

  # # ─────────────────────────────────────────────────────
  # # Report Service (신규 — AI 기반 보고서 생성)
  # # ─────────────────────────────────────────────────────
  report-agents:
    build:
      context: ..
      dockerfile: services/report-agents/Dockerfile
    container_name: cowater-report-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@redis:6379}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://cowater:${POSTGRES_PASSWORD:-cowater_dev}@postgres:5432/cowater}
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      VLLM_URL: ${VLLM_URL:-http://vllm:8000}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-3B-Instruct}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Port exposed via agent-gateway (7709)
    # ports:
    #   - "7709:8001"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      core:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Supervision Service (신규 — Agent 상태 모니터링)
  # ─────────────────────────────────────────────────────
  supervision-agents:
    build:
      context: ..
      dockerfile: services/supervision-agents/Dockerfile
    container_name: cowater-supervision-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@redis:6379}
      HEALTH_CHECK_INTERVAL_SEC: ${HEALTH_CHECK_INTERVAL_SEC:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Learning Service (신규 — 자동 규칙 개선)
  # ─────────────────────────────────────────────────────
  learning-agents:
    build:
      context: ..
      dockerfile: services/learning-agents/Dockerfile
    container_name: cowater-learning-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@redis:6379}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Simulator (선택적 — 개발/훈련 시만 실행)
  # ─────────────────────────────────────────────────────
  simulator:
    build:
      context: ../services/simulator
      dockerfile: Dockerfile
    container_name: cowater-simulator
    restart: "no"
    profiles:
      - simulation
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@redis:6379}
      MOTH_SERVER_URL: ${MOTH_SERVER_URL:-wss://cobot.center:8287}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      SCENARIO: ${SCENARIO:-demo}
      TIME_SCALE: "3.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:7700}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:7700}
        NEXT_PUBLIC_AGENTS_URL: ${NEXT_PUBLIC_AGENTS_URL:-http://localhost:7701}
        NEXT_PUBLIC_POSITION_WS_URL: ${NEXT_PUBLIC_POSITION_WS_URL:-ws://localhost:7703}
        NEXT_PUBLIC_DETECTION_AGENTS_URL: ${NEXT_PUBLIC_DETECTION_AGENTS_URL:-http://localhost:7704}
        NEXT_PUBLIC_ANALYSIS_AGENTS_URL: ${NEXT_PUBLIC_ANALYSIS_AGENTS_URL:-http://localhost:7705}
        NEXT_PUBLIC_RESPONSE_AGENTS_URL: ${NEXT_PUBLIC_RESPONSE_AGENTS_URL:-http://localhost:7706}
        NEXT_PUBLIC_REPORT_AGENTS_URL: ${NEXT_PUBLIC_REPORT_AGENTS_URL:-http://localhost:7709}
        NEXT_PUBLIC_LEARNING_AGENTS_URL: ${NEXT_PUBLIC_LEARNING_AGENTS_URL:-http://localhost:7708}
        NEXT_PUBLIC_SUPERVISION_AGENTS_URL: ${NEXT_PUBLIC_SUPERVISION_AGENTS_URL:-http://localhost:7707}
    container_name: cowater-frontend
    restart: unless-stopped
    ports:
      - "7702:7702"
    depends_on:
      - core

volumes:
  postgres_data:
  redis_data:
  # ollama_data:
  # vllm_data:
