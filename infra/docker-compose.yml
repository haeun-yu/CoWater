version: "3.9"

services:
  agent-gateway:
    image: nginx:1.27-alpine
    container_name: cowater-agent-gateway
    restart: unless-stopped
    environment:
      CONTROL_AGENTS_UPSTREAM: ${CONTROL_AGENTS_UPSTREAM:-http://control-agents:8001}
      DETECTION_AGENTS_UPSTREAM: ${DETECTION_AGENTS_UPSTREAM:-http://detection-agents:8001}
      ANALYSIS_AGENTS_UPSTREAM: ${ANALYSIS_AGENTS_UPSTREAM:-http://analysis-agents:8001}
      RESPONSE_AGENTS_UPSTREAM: ${RESPONSE_AGENTS_UPSTREAM:-http://response-agents:8001}
      REPORT_AGENTS_UPSTREAM: ${REPORT_AGENTS_UPSTREAM:-http://report-agents:8001}
      LEARNING_AGENTS_UPSTREAM: ${LEARNING_AGENTS_UPSTREAM:-http://learning-agents:8001}
      SUPERVISION_AGENTS_UPSTREAM: ${SUPERVISION_AGENTS_UPSTREAM:-http://supervision-agents:8001}
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$$CONTROL_AGENTS_UPSTREAM $$DETECTION_AGENTS_UPSTREAM $$ANALYSIS_AGENTS_UPSTREAM $$RESPONSE_AGENTS_UPSTREAM $$REPORT_AGENTS_UPSTREAM $$LEARNING_AGENTS_UPSTREAM $$SUPERVISION_AGENTS_UPSTREAM' \
          < /etc/nginx/templates/agent-gateway.conf.template \
          > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    volumes:
      - ./nginx/agent-gateway.conf.template:/etc/nginx/templates/agent-gateway.conf.template:ro
    ports:
      - "7701:7701"
      - "7704:7704"
      - "7705:7705"
      - "7706:7706"
      - "7707:7707"
      - "7708:7708"
      - "7709:7709"
    depends_on:
      - control-agents

  # ─────────────────────────────────────────────────────
  # PostgreSQL + PostGIS + TimescaleDB
  # ─────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:2.17.2-pg15
    container_name: cowater-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cowater
      POSTGRES_USER: cowater
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cowater_dev} # 프로덕션: 환경변수로 변경 필수
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./postgres/01_extensions.sql:/docker-entrypoint-initdb.d/01_extensions.sql
      - ./postgres/02_schema.sql:/docker-entrypoint-initdb.d/02_schema.sql
      - ./postgres/03_seed.sql:/docker-entrypoint-initdb.d/03_seed.sql
      - ./postgres/04_migration_dedup.sql:/docker-entrypoint-initdb.d/04_migration_dedup.sql
      - ./postgres/05_learning_reports.sql:/docker-entrypoint-initdb.d/05_learning_reports.sql
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:5432:5432" # 기본: localhost만, 원격: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cowater -d cowater"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cowater-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_BIND_ADDR:-127.0.0.1}:6379:6379" # 기본: localhost만, 원격: 0.0.0.0
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Core Backend
  # ─────────────────────────────────────────────────────
  core:
    build:
      context: ..
      dockerfile: services/core/Dockerfile
    container_name: cowater-core
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://cowater:${POSTGRES_PASSWORD:-cowater_dev}@postgres:5432/cowater}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@redis:6379}
      AGENTS_API_URL: ${AGENTS_API_URL:-http://agents:8001}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${CORE_BIND_ADDR:-127.0.0.1}:7700:8000" # 기본: localhost만, 원격: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Moth Bridge
  # ─────────────────────────────────────────────────────
  moth-bridge:
    build:
      context: ..
      dockerfile: services/moth-bridge/Dockerfile
    container_name: cowater-moth-bridge
    restart: unless-stopped
    environment:
      MOTH_SERVER_URL: ${MOTH_SERVER_URL:-wss://cobot.center:8287}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RAW_PAYLOAD_MODE: ${RAW_PAYLOAD_MODE:-cache}
      RAW_PAYLOAD_PROTOCOLS: ${RAW_PAYLOAD_PROTOCOLS:-ais,ros,mavlink,nmea}
      RAW_PAYLOAD_MAX_BYTES: ${RAW_PAYLOAD_MAX_BYTES:-4096}
      RAW_PAYLOAD_TTL_SEC: ${RAW_PAYLOAD_TTL_SEC:-86400}
    ports:
      - "${MOTH_BIND_ADDR:-127.0.0.1}:7703:8002" # WebSocket relay
    depends_on:
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
