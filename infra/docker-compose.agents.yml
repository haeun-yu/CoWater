version: "3.9"

services:
  agent-gateway:
    image: nginx:1.27-alpine
    container_name: cowater-agent-gateway
    restart: unless-stopped
    environment:
      CONTROL_AGENTS_UPSTREAM: ${CONTROL_AGENTS_UPSTREAM:-http://control-agents:8001}
      DETECTION_AGENTS_UPSTREAM: ${DETECTION_AGENTS_UPSTREAM:-http://detection-agents:8001}
      ANALYSIS_AGENTS_UPSTREAM: ${ANALYSIS_AGENTS_UPSTREAM:-http://analysis-agents:8001}
      RESPONSE_AGENTS_UPSTREAM: ${RESPONSE_AGENTS_UPSTREAM:-http://response-agents:8001}
      REPORT_AGENTS_UPSTREAM: ${REPORT_AGENTS_UPSTREAM:-http://report-agents:8001}
      LEARNING_AGENTS_UPSTREAM: ${LEARNING_AGENTS_UPSTREAM:-http://learning-agents:8001}
      SUPERVISION_AGENTS_UPSTREAM: ${SUPERVISION_AGENTS_UPSTREAM:-http://supervision-agents:8001}
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$$CONTROL_AGENTS_UPSTREAM $$DETECTION_AGENTS_UPSTREAM $$ANALYSIS_AGENTS_UPSTREAM $$RESPONSE_AGENTS_UPSTREAM $$REPORT_AGENTS_UPSTREAM $$LEARNING_AGENTS_UPSTREAM $$SUPERVISION_AGENTS_UPSTREAM' \
          < /etc/nginx/templates/agent-gateway.conf.template \
          > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    volumes:
      - ./nginx/agent-gateway.conf.template:/etc/nginx/templates/agent-gateway.conf.template:ro
    ports:
      - "7701:7701"
      - "7704:7704"
      - "7705:7705"
      - "7706:7706"
      - "7707:7707"
      - "7708:7708"
      - "7709:7709"
    depends_on:
      - control-agents

  # ─────────────────────────────────────────────────────
  # PostgreSQL + PostGIS + TimescaleDB (report-agents 의존성)
  # ─────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: cowater-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cowater
      POSTGRES_USER: cowater
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cowater_dev}
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./postgres/01_extensions.sql:/docker-entrypoint-initdb.d/01_extensions.sql
      - ./postgres/02_schema.sql:/docker-entrypoint-initdb.d/02_schema.sql
      - ./postgres/03_seed.sql:/docker-entrypoint-initdb.d/03_seed.sql
      - ./postgres/04_migration_dedup.sql:/docker-entrypoint-initdb.d/04_migration_dedup.sql
      - ./postgres/05_learning_reports.sql:/docker-entrypoint-initdb.d/05_learning_reports.sql
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cowater -d cowater"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Redis (모든 agents 의존성)
  # ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cowater-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-cowater_dev}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_BIND_ADDR:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cowater_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Core Backend (모든 agents 의존성)
  # ─────────────────────────────────────────────────────
  core:
    build:
      context: ..
      dockerfile: services/core/Dockerfile
    container_name: cowater-core
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://cowater:${POSTGRES_PASSWORD:-cowater_dev}@postgres:5432/cowater}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-cowater_dev}@redis:6379}
      AGENTS_API_URL: ${AGENTS_API_URL:-http://agents:8001}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${CORE_BIND_ADDR:-127.0.0.1}:7700:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Agent Runtime
  # ─────────────────────────────────────────────────────
  control-agents:
    build:
      context: ..
      dockerfile: services/control-agents/Dockerfile
    container_name: cowater-control-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-cowater_dev}@redis:6379}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      CHAT_OLLAMA_MODEL: ${CHAT_OLLAMA_MODEL:-qwen2.5:1.5b}
      OLLAMA_THINK: ${OLLAMA_THINK:-false}
      VLLM_URL: ${VLLM_URL:-http://vllm:8000}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-3B-Instruct}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Detection Service (Event 기반 Detection Agent들)
  # ─────────────────────────────────────────────────────
  detection-agents:
    build:
      context: ..
      dockerfile: services/detection-agents/Dockerfile
    container_name: cowater-detection-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-cowater_dev}@redis:6379}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      CPA_WARNING_NM: ${CPA_WARNING_NM:-2.0}
      CPA_WARNING_TCPA_MIN: ${CPA_WARNING_TCPA_MIN:-20.0}
      CPA_CRITICAL_NM: ${CPA_CRITICAL_NM:-0.5}
      CPA_CRITICAL_TCPA_MIN: ${CPA_CRITICAL_TCPA_MIN:-10.0}
      ANOMALY_ROT_THRESHOLD: ${ANOMALY_ROT_THRESHOLD:-20.0}
      ANOMALY_HEADING_THRESHOLD: ${ANOMALY_HEADING_THRESHOLD:-45.0}
      ANOMALY_SPEED_THRESHOLD: ${ANOMALY_SPEED_THRESHOLD:-5.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "7704:8001"
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Analysis Service (AI 기반 분석)
  # ─────────────────────────────────────────────────────
  analysis-agents:
    build:
      context: ..
      dockerfile: services/analysis-agents/Dockerfile
    container_name: cowater-analysis-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-cowater_dev}@redis:6379}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "7705:8001"
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Response Service (Alert 생성 및 대응)
  # ─────────────────────────────────────────────────────
  response-agents:
    build:
      context: ..
      dockerfile: services/response-agents/Dockerfile
    container_name: cowater-response-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-cowater_dev}@redis:6379}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Report Service (AI 기반 보고서 생성)
  # ─────────────────────────────────────────────────────
  report-agents:
    build:
      context: ..
      dockerfile: services/report-agents/Dockerfile
    container_name: cowater-report-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-cowater_dev}@redis:6379}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://cowater:${POSTGRES_PASSWORD:-cowater_dev}@postgres:5432/cowater}
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      VLLM_URL: ${VLLM_URL:-http://vllm:8000}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-3B-Instruct}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      core:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Learning Service (자동 규칙 개선)
  # ─────────────────────────────────────────────────────
  learning-agents:
    build:
      context: ..
      dockerfile: services/learning-agents/Dockerfile
    container_name: cowater-learning-agents
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-cowater_dev}@redis:6379}
      CORE_API_URL: ${CORE_API_URL:-http://core:8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
