<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06 System Center Dashboard</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="dashboard">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>System Center Dashboard</h1>
        <p class="muted">system_center · regional_orchestrator · mission_orchestrator · device_agent</p>
      </div>
      <div class="header-menu">
        <a href="index.html" data-nav-link="dashboard">Dashboard</a>
        <a href="events.html" data-nav-link="events">Events</a>
        <a href="alerts.html" data-nav-link="alerts">Alerts</a>
        <a href="responses.html" data-nav-link="responses">Responses</a>
      </div>
      <div class="topbar-actions">
        <input id="api-base" value="http://127.0.0.1:9012" aria-label="API base URL">
        <button class="primary" id="refresh" type="button">Refresh</button>
        <button id="sync" type="button">Sync Registry</button>
        <button id="reset" type="button">Reset</button>
      </div>
    </header>

    <main class="main">
      <section class="grid">
        <div class="card">
          <h2 class="title">Status</h2>
          <div id="status">-</div>
        </div>
        <div class="card">
          <h2 class="title">Agent</h2>
          <div id="agent-meta">-</div>
        </div>
      </section>

      <section class="grid">
        <div class="card">
          <h2 class="title">Analysis</h2>
          <div id="analysis-meta">-</div>
        </div>
        <div class="card">
          <h2 class="title">Registry</h2>
          <div id="registry-meta">-</div>
        </div>
      </section>

      <section class="grid">
        <div class="card">
          <h2 class="title">Children</h2>
          <div id="children" class="list"></div>
        </div>
        <div class="card">
          <h2 class="title">Missions</h2>
          <div id="missions" class="list"></div>
        </div>
      </section>

      <section class="card">
        <h2 class="title">Raw State</h2>
        <pre id="state">-</pre>
      </section>
    </main>
  </div>
</body>
</html>
