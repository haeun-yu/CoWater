<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>05 Control Ship Agent</title>
  <style>
    body { margin:0; font-family: Inter, system-ui, sans-serif; background:#07111f; color:#e5eefb; }
    .shell { display:grid; grid-template-columns: 320px 1fr; min-height:100vh; }
    .panel { padding:20px; border-right:1px solid #223047; background:rgba(2,8,23,.7); }
    .main { padding:20px; display:grid; gap:16px; }
    .card { background:rgba(15,23,42,.9); border:1px solid #223047; border-radius:16px; padding:16px; }
    .row { display:grid; gap:8px; margin-top:10px; }
    input, select, textarea, button { font:inherit; }
    input, select, textarea { width:100%; background:#0f172a; color:#e5eefb; border:1px solid #334155; border-radius:10px; padding:10px; }
    button { background:#1e293b; color:#e5eefb; border:1px solid #334155; border-radius:10px; padding:10px 12px; cursor:pointer; }
    button.primary { background:#60a5fa; color:#07111f; font-weight:700; }
    .badge { display:inline-block; background:#1e293b; border:1px solid #334155; border-radius:999px; padding:4px 8px; margin:2px 4px 2px 0; font-size:.78rem; }
    pre { white-space:pre-wrap; word-break:break-word; background:#020617; border:1px solid #334155; border-radius:12px; padding:12px; max-height:220px; overflow:auto; }
    .muted { color:#94a3b8; }
    .list { display:grid; gap:8px; max-height:280px; overflow:auto; }
    .item { border:1px solid #334155; border-radius:12px; padding:10px; background:rgba(30,41,59,.7); }
    @media (max-width: 980px) { .shell { grid-template-columns:1fr; } .panel { border-right:none; border-bottom:1px solid #223047; } }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel">
      <h1>05 Control Ship Agent</h1>
      <p class="muted">중간 조정자 A2A 허브</p>
      <div class="row">
        <label>API Base</label>
        <input id="api-base" value="http://127.0.0.1:9011">
      </div>
      <div class="row" style="grid-template-columns:1fr 1fr;">
        <button class="primary" id="refresh">Refresh</button>
        <button id="reset">Reset</button>
      </div>
      <div class="row">
        <div class="muted">Status</div>
        <div id="status">-</div>
      </div>
      <div class="row">
        <div class="muted">Agent</div>
        <div id="agent-meta">-</div>
      </div>
    </aside>
    <main class="main">
      <section class="card">
        <h2>Children</h2>
        <div id="children" class="list"></div>
      </section>
      <section class="card">
        <h2>Dispatch to Child</h2>
        <div class="row">
          <label>Target Agent ID</label>
          <input id="target-agent" placeholder="usv-01">
        </div>
        <div class="row">
          <label>Target Endpoint</label>
          <input id="target-endpoint" placeholder="http://127.0.0.1:9101">
        </div>
        <div class="row">
          <label>Message Type</label>
          <select id="message-type"><option>task.assign</option><option>status.report</option><option>task.escalate</option></select>
        </div>
        <div class="row">
          <label>Payload JSON</label>
          <textarea id="payload" rows="6">{}</textarea>
        </div>
        <div class="row" style="grid-template-columns:1fr 1fr 1fr;">
          <input id="from-agent" placeholder="regional_orchestrator-01">
          <input id="to-agent" placeholder="device-agent-id">
          <input id="task-id" placeholder="task-001">
        </div>
        <div class="row">
          <button class="primary" id="send">Send A2A</button>
        </div>
      </section>
      <section class="card">
        <h2>Inbox / Outbox</h2>
        <div class="row">
          <div class="muted">Inbox</div>
          <div id="inbox" class="list"></div>
        </div>
        <div class="row">
          <div class="muted">Outbox</div>
          <div id="outbox" class="list"></div>
        </div>
      </section>
      <section class="card">
        <h2>Raw State</h2>
        <pre id="state">-</pre>
      </section>
    </main>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    const apiBase = () => $("api-base").value.trim();
    const api = (path) => new URL(path, apiBase()).toString();
    const j = async (path, opts={}) => {
      const res = await fetch(api(path), { headers: {"Content-Type":"application/json", ...(opts.headers||{})}, ...opts});
      const body = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(body.detail || `HTTP ${res.status}`);
      return body;
    };
    const pretty = (v) => JSON.stringify(v, null, 2);
    const render = (items, id) => { $(id).innerHTML = items.length ? items.map(i => `<div class="item"><div><strong>${i.message_type || i.kind || 'event'}</strong> <span class="muted">${i.task_id || ''}</span></div><div class="muted">${i.from_agent_id || ''} → ${i.to_agent_id || ''}</div><pre>${pretty(i)}</pre></div>`).join('') : '<div class="muted">empty</div>'; };
    async function refresh() {
      const [meta, state] = await Promise.all([j('/meta'), j('/state')]);
      $("status").textContent = state.connected ? 'connected' : 'disconnected';
      $("agent-meta").innerHTML = `<span class="badge">${meta.agent.role}</span><span class="badge">${meta.agent.id}</span><span class="badge">${meta.agent.parent_id}</span>`;
      $("state").textContent = pretty(state);
      render(state.children || [], 'children');
      render(state.inbox || [], 'inbox');
      render(state.outbox || [], 'outbox');
    }
    $("send").onclick = async () => {
      const payloadText = $("payload").value.trim() || '{}';
      let payload = {};
      try { payload = JSON.parse(payloadText); } catch (e) { alert('payload JSON error'); return; }
      await j('/dispatch', { method:'POST', body: JSON.stringify({
        target_agent_id: $("target-agent").value.trim(),
        target_endpoint: $("target-endpoint").value.trim() || null,
        message: {
          message_type: $("message-type").value,
          from_agent_id: $("from-agent").value.trim() || 'regional_orchestrator-01',
          to_agent_id: $("to-agent").value.trim(),
          task_id: $("task-id").value.trim() || null,
          payload,
        }
      })});
      await refresh();
    };
    $("reset").onclick = async () => { await j('/reset', { method:'POST' }); await refresh(); };
    $("refresh").onclick = refresh;
    refresh().catch(e => $("status").textContent = e.message);
  </script>
</body>
</html>
