<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moth Device Simulator Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            border-radius: 6px;
            margin-top: 10px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #10b981;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .device-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .device-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #06b6d4);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .device-card:hover {
            border-color: #0ea5e9;
            background: linear-gradient(135deg, #1e293b 0%, #1a2332 100%);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
        }

        .device-card:hover::before {
            transform: scaleX(1);
        }

        .device-card.active {
            border-color: #0ea5e9;
            background: linear-gradient(135deg, #1a3a4d 0%, #0f2337 100%);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
        }

        .device-card.active::before {
            transform: scaleX(1);
        }

        .device-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .device-icon {
            font-size: 2em;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(14, 165, 233, 0.1);
            border-radius: 8px;
        }

        .device-info h3 {
            font-size: 1.1em;
            margin-bottom: 4px;
            color: #0ea5e9;
        }

        .device-info p {
            font-size: 0.85em;
            color: #94a3b8;
        }

        .device-status {
            display: flex;
            gap: 8px;
            font-size: 0.8em;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            background: rgba(14, 165, 233, 0.15);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 4px;
            color: #0ea5e9;
        }

        .data-panel {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }

        .data-panel.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }

        .panel-header h2 {
            flex: 1;
            font-size: 1.5em;
        }

        .panel-header .close-btn {
            background: #334155;
            border: none;
            color: #e2e8f0;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .panel-header .close-btn:hover {
            background: #475569;
        }

        .data-stream {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #334155;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.5);
        }

        .data-item {
            padding: 12px;
            border-bottom: 1px solid #334155;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.85em;
            color: #cbd5e1;
            transition: all 0.2s;
        }

        .data-item:hover {
            background: rgba(14, 165, 233, 0.1);
        }

        .data-item:last-child {
            border-bottom: none;
        }

        .timestamp {
            color: #64748b;
            font-size: 0.8em;
        }

        .data-value {
            color: #0ea5e9;
            word-break: break-all;
            white-space: pre-wrap;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .no-data {
            padding: 30px;
            text-align: center;
            color: #64748b;
        }

        .device-count {
            font-size: 0.9em;
            color: #94a3b8;
        }

        .update-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-left: 8px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌊 Moth Device Simulator</h1>
            <div class="connection-status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </header>

        <div class="devices-grid" id="devicesGrid">
            <!-- Device cards will be inserted here -->
        </div>

        <div class="data-panel active" id="dataPanel">
            <div class="panel-header">
                <h2 id="panelTitle">Live Data Stream</h2>
                <button class="close-btn" onclick="closeDataPanel()">Close</button>
            </div>
            <div class="data-stream" id="dataStream">
                <div class="no-data">Select a device to view data</div>
            </div>
        </div>
    </div>

    <script>
        // Moth sub: one WebSocket per device track (device_id = track)
        const MOTH_BASE = "wss://cobot.center:8287";
        const MOTH_CHANNEL = "instant";
        const MOTH_NAME   = "cowater-sim-device-streams";
        const MOTH_SOURCE = "base";
        const MOTH_MODE   = "single";

        function mothSubUrl(track) {
            return `${MOTH_BASE}/pang/ws/sub?channel=${MOTH_CHANNEL}&name=${MOTH_NAME}&source=${MOTH_SOURCE}&track=${encodeURIComponent(track)}&mode=${MOTH_MODE}`;
        }

        const deviceSockets = {};   // device_id → WebSocket
        let deviceData = {};
        let selectedDeviceId = null;
        let deviceConfigs = {};

        // Device type to icon mapping
        const deviceIcons = {
            'control_center': '🏢',
            'control_ship': '🚢',
            'ocean_power_tower': '⚡',
            'usv': '🤖',
            'auv': '🚤',
            'rov': '🐠'
        };

        function initDeviceData() {
            // Initialize data structure for all devices
            const allDevices = [
                ...deviceConfigs.static_devices,
                ...deviceConfigs.dynamic_devices
            ];

            allDevices.forEach(device => {
                deviceData[device.device_id] = [];
            });
        }

        function connectDeviceTrack(deviceId) {
            // Moth sub protocol per device track:
            // 1st frame = text (MIME), subsequent frames = binary {envelope, payload}
            const url = mothSubUrl(deviceId);
            console.log(`[${deviceId}] Connecting → ${url}`);

            const ws = new WebSocket(url);
            deviceSockets[deviceId] = ws;

            ws.onopen = () => {
                console.log(`[${deviceId}] Connected`);
                updateConnectionStatus(true);
            };

            ws.onmessage = (event) => {
                if (typeof event.data === 'string') return; // MIME frame — ignore

                event.data.arrayBuffer().then(buf => {
                    try {
                        const message = JSON.parse(new TextDecoder().decode(buf));
                        const envelope = message.envelope || {};
                        const payload  = message.payload  || {};
                        const devId    = envelope.device_id || deviceId;
                        const timestamp = new Date(envelope.timestamp).toLocaleTimeString();

                        if (!deviceData[devId]) deviceData[devId] = [];
                        deviceData[devId].unshift({ timestamp, envelope, payload });
                        if (deviceData[devId].length > 10) deviceData[devId].pop();

                        if (selectedDeviceId === devId) updateDataPanel(devId);
                    } catch (e) {
                        console.error(`[${deviceId}] parse error:`, e);
                    }
                });
            };

            ws.onerror = () => updateConnectionStatus(false);

            ws.onclose = () => {
                console.log(`[${deviceId}] Disconnected — reconnecting in 5s`);
                delete deviceSockets[deviceId];
                updateConnectionStatus(Object.keys(deviceSockets).length > 0);
                setTimeout(() => connectDeviceTrack(deviceId), 5000);
            };
        }

        function connectToMoth() {
            // Open one sub connection per device (each device uses its own track)
            const allDevices = [
                ...deviceConfigs.static_devices,
                ...deviceConfigs.dynamic_devices,
            ];
            allDevices.forEach(device => connectDeviceTrack(device.device_id));
        }

        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');

            if (connected) {
                indicator.classList.add('connected');
                text.textContent = 'Connected to Moth Server';
            } else {
                indicator.classList.remove('connected');
                text.textContent = 'Disconnected - Reconnecting...';
            }
        }

        function loadConfig() {
            // For demo purposes, we'll use the config structure
            // In a real scenario, this would be loaded from the server
            fetch('config.json')
                .then(response => response.json())
                .then(config => {
                    deviceConfigs = config;
                    initDeviceData();
                    renderDeviceCards();
                    connectToMoth();
                })
                .catch(error => {
                    console.error('Error loading config:', error);
                    // Use dummy config for demo
                    deviceConfigs = createDummyConfig();
                    initDeviceData();
                    renderDeviceCards();
                    connectToMoth();
                });
        }

        function createDummyConfig() {
            return {
                "static_devices": [
                    {
                        "device_id": "control-center-01",
                        "device_type": "control_center",
                        "name": "Control Center 01"
                    },
                    {
                        "device_id": "control-ship-01",
                        "device_type": "control_ship",
                        "name": "Control Ship 01"
                    },
                    {
                        "device_id": "ocean-power-tower-01",
                        "device_type": "ocean_power_tower",
                        "name": "Ocean Power Tower 01"
                    }
                ],
                "dynamic_devices": [
                    {
                        "device_id": "usv-01",
                        "device_type": "usv",
                        "name": "USV 01"
                    },
                    {
                        "device_id": "auv-01",
                        "device_type": "auv",
                        "name": "AUV 01"
                    },
                    {
                        "device_id": "rov-01",
                        "device_type": "rov",
                        "name": "ROV 01"
                    }
                ]
            };
        }

        function renderDeviceCards() {
            const grid = document.getElementById('devicesGrid');
            grid.innerHTML = '';

            const allDevices = [
                ...deviceConfigs.static_devices,
                ...deviceConfigs.dynamic_devices
            ];

            allDevices.forEach(device => {
                const card = document.createElement('div');
                card.className = 'device-card';
                card.onclick = () => selectDevice(device.device_id, device.name);

                const isStatic = deviceConfigs.static_devices.some(d => d.device_id === device.device_id);
                const deviceType = isStatic ? 'Static' : 'Dynamic';

                card.innerHTML = `
                    <div class="device-header">
                        <div class="device-icon">${deviceIcons[device.device_type] || '📡'}</div>
                        <div class="device-info">
                            <h3>${device.name}</h3>
                            <p>${device.device_type.replace('_', ' ')}</p>
                        </div>
                    </div>
                    <div class="device-status">
                        <span class="badge">${deviceType}</span>
                        <span class="badge device-count">0 data points</span>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function selectDevice(deviceId, deviceName) {
            selectedDeviceId = deviceId;

            // Update active state on cards
            document.querySelectorAll('.device-card').forEach(card => {
                card.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Update panel
            document.getElementById('panelTitle').textContent = `📊 ${deviceName} - Last 10 Data Points`;
            updateDataPanel(deviceId);
        }

        function updateDataPanel(deviceId) {
            const stream = document.getElementById('dataStream');
            const data = deviceData[deviceId] || [];

            if (data.length === 0) {
                stream.innerHTML = '<div class="no-data">Waiting for data...</div>';
                return;
            }

            stream.innerHTML = data.map((item, index) => `
                <div class="data-item">
                    <div class="timestamp">#${index + 1} • ${item.timestamp} <span class="update-indicator"></span></div>
                    <div class="data-value">${JSON.stringify({envelope: item.envelope, payload: item.payload}, null, 2)}</div>
                </div>
            `).join('');

            // Auto-scroll to top
            stream.scrollTop = 0;
        }

        function closeDataPanel() {
            selectedDeviceId = null;
            document.querySelectorAll('.device-card').forEach(card => {
                card.classList.remove('active');
            });
            document.getElementById('dataStream').innerHTML = '<div class="no-data">Select a device to view data</div>';
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
</body>
</html>
