<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devices - CoWater Device Server</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="devices">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">03</div>
        <div>
          <h1>Device Registry</h1>
          <p>Search, inspect, and delete registered devices.</p>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="api-pill">
          <span>API</span>
          <input data-bind="apiBase" aria-label="API base URL">
        </div>
        <button class="button" id="refresh-devices" type="button">Refresh</button>
      </div>
    </header>

    <nav class="nav">
      <a href="index.html" data-nav-link="dashboard">Dashboard</a>
      <a href="devices.html" data-nav-link="devices">Devices</a>
      <a href="register.html" data-nav-link="register">Register</a>
      <a href="settings.html" data-nav-link="settings">Settings</a>
    </nav>

    <section class="panel">
      <div class="split" style="align-items: end;">
        <div>
          <h2>All Devices</h2>
          <p class="lead">This page focuses on listing and managing the whole registry.</p>
        </div>
        <div class="field">
          <label for="device-search">Search devices</label>
          <input id="device-search" placeholder="name, id, or main track">
        </div>
      </div>
      <div id="devices-error"></div>
      <div class="table-wrap" style="margin-top: 18px;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Device</th>
              <th>Status</th>
              <th>Main Track</th>
              <th>Tracks</th>
              <th>Server</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="devices-body">
            <tr><td colspan="7" class="muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</body>
</html>
