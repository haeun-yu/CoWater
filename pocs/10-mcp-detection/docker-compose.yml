version: '3.9'

services:
  mcp-server:
    image: python:3.12-slim
    working_dir: /workspace/pocs/10-mcp-detection
    volumes:
      - ../..:/workspace
    command: >
      sh -c "pip install -r requirements.txt -q &&
             python src/mcp_server.py"
    ports:
      - "8010:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c=http.client.HTTPConnection('localhost', 8000, timeout=5); c.request('GET', '/'); print(c.getresponse().status)"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp-client:
    image: python:3.12-slim
    working_dir: /workspace/pocs/10-mcp-detection
    volumes:
      - ../..:/workspace
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URL=http://mcp-server:8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: >
      sh -c "pip install -r requirements.txt -q &&
             sleep 5 &&
             python src/mcp_client.py"
    depends_on:
      mcp-server:
        condition: service_healthy
