# 시나리오: 조난 신호 및 대응 (Distress Agent 훈련)
# 어선이 항행 중 엔진 고장 + AIS 침묵 → 조난 신호 발신

vessels:
  - mmsi: "441020000"
    name: "어선 독도01"
    lat: 34.680
    lon: 126.480
    heading: 135
    speed: 6.0
    max_speed: 8.0
    waypoints:
      - { lat: 34.600, lon: 126.580 }
      - { lat: 34.680, lon: 126.480 }

  - mmsi: "441021000"
    name: "구조함 청해"
    lat: 34.800
    lon: 126.300
    heading: 180
    speed: 14.0
    max_speed: 20.0
    waypoints:
      - { lat: 34.700, lon: 126.400 }
      - { lat: 34.800, lon: 126.300 }

  - mmsi: "441022000"
    name: "인근선박 민들레"
    lat: 34.720
    lon: 126.550
    heading: 270
    speed: 9.0
    max_speed: 13.0
    waypoints:
      - { lat: 34.720, lon: 126.300 }
      - { lat: 34.720, lon: 126.550 }

events:
  # t=60s: 어선 엔진 고장
  - at: 60
    mmsi: "441020000"
    type: engine_stop

  # t=90s: AIS 침묵 (배터리 방전 가정)
  - at: 90
    mmsi: "441020000"
    type: ais_silence

  # t=180s: 조난 신호 발신 (DSC — 시뮬레이터에서는 이벤트로 표현)
  # Distress Agent가 이 이벤트를 감지하고 자동 대응
  - at: 180
    mmsi: "441020000"
    type: ais_restore     # 비상용 배터리로 AIS 복구

  # t=600s: 구조함이 어선 방향으로 긴급 항로 변경
  - at: 600
    mmsi: "441021000"
    type: set_waypoint
    lat: 34.640
    lon: 126.540
    speed: 20.0
