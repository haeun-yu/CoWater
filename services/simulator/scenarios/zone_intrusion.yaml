# 시나리오: 금지구역 침입 (Zone Monitor Agent 훈련)
# 선박이 의도적으로 금지구역에 진입 → Zone Monitor 경보

vessels:
  - mmsi: "441030000"
    name: "위반선박 오메가"
    lat: 34.760
    lon: 126.340
    heading: 90
    speed: 8.0
    max_speed: 12.0
    waypoints:
      # 목포항 금지구역(126.37~126.39, 34.77~34.79)을 관통하는 항로
      - { lat: 34.775, lon: 126.380 }
      - { lat: 34.775, lon: 126.420 }
      - { lat: 34.760, lon: 126.340 }

  - mmsi: "441031000"
    name: "감시선 독수리"
    lat: 34.800
    lon: 126.350
    heading: 180
    speed: 12.0
    max_speed: 18.0
    waypoints:
      - { lat: 34.750, lon: 126.400 }
      - { lat: 34.800, lon: 126.350 }

events:
  # t=200s: 위반선박 가속
  - at: 200
    mmsi: "441030000"
    type: set_speed
    speed: 12.0

  # t=400s: 위반 후 AIS 침묵 시도
  - at: 400
    mmsi: "441030000"
    type: ais_silence

  # t=500s: AIS 복구 (감시로 인해)
  - at: 500
    mmsi: "441030000"
    type: ais_restore
