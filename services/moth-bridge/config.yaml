# Moth Bridge 채널 설정
# 각 채널에 대해 연결할 Moth 채널과 사용할 Protocol Adapter를 지정합니다.

channels:
  - name: "ais-coastal"
    moth_channel_type: instant          # instant | static | dynamic
    moth_channel_name: "cowater-ais"
    moth_track: "data"
    moth_source: "base"
    adapter: NMEAAdapter
    platform_type: vessel

  - name: "device-streams"
    moth_channel_type: instant
    moth_channel_name: "cowater-sim-device-streams"
    moth_track: "data"
    moth_source: "base"
    adapter: DeviceStreamAdapter
    platform_type: device
    is_simulator: true

  # 시뮬레이터 채널 예시 — is_simulator: true 설정 시 에이전트 경보 생성 차단 가능
